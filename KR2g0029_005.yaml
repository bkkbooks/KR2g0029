body:
  text: 京口耆舊𫝊卷五湯東野從子喬年范寥陳東竇從周孫時升王揚英張絢郭珣瑜鍾將之吳致堯湯東野字德廣丹陽人崇寧間妖人張懷素謀倡亂東南蜀士范寥知之欲馳入京言狀無以為道里費東野資之懷素伏誅寥起布衣召對授供備庫副使白上臣非湯東野無以見陛下上問東野何人即對鎮江府學內舍生且具道所以資送之恩宰執因言朝廷興學舍法以造士固應學校之士有忠義奮發仰副作成者有詔乘遞馬赴闕既對言契上心即授忠義郎衛尉寺主簿再遷為辟雍丞使陕西河東除直祕閣提舉秦鳳路常平連丁內艱京東盜起起家知淄州入境盜息纍升祕閣修撰將漕江西靖康中知平江車駕幸杭苖劉作難明受赦至東野疑之時張公浚以禮部侍郎參贊御營軍事留平江東野謀於浚欲匿赦不宣浚曰事已如此胡可匿且卒徒觖於望賜吾徒先受禍矣因相與謀隂取故府所藏登極赦書置輿中迎登譙門讀而張之即捐其階禁無敢登者案宋史張浚傳改元赦書至平江浚命守臣湯東野祕不宣據此書東野謀於浚欲匿赦不宣則是謀起東野不由浚命與浚本𫝊互異又取登極赦書易改元赦書張於譙門宋史書其事不詳鶴林玉露詳其事乃不及湯東野之謀皆屬闕誤考劉漫塘集跋湯侍郎勤王録有曰又能辨明受僞命於倉卒之頃詭宣舊赦以慰一時幸利之人而實不虧於臣節數語可為此書左證而散金帛如常時郊賚之數人情略定乃與浚議勤王之師㑹張循王俊提兵往行在所道遇僞詔使還秦隴師薄城下東野大喜夜扣浚開城納俊師未幾間使持僞詔令東野斬二張東野慮俊武人易動即先携見俊與偕謁浚斬使者而禁僞詔於是謀益堅詒書抵吕公頥浩於金陵推為盟主招韓蘄王世忠劉雍公光世皆以兵㑹軍之百頃東野實主之師既東東野獨留為後備皇帝復位以功超拜徽猷閣待制入為工部侍郎浚出撫川陕乞以自副將行留不遣以侍郎兼權建康府駕幸㑹稽同知樞密院周望宣撫浙西將屯軍平江奏非東野莫可為守者再知平江兼本路安撫使進徽猷閣直學士兼制置使東野知望不足與立功辭至七八不得已而行既至調民兵置守城五壁部隊官又遣機宜邵彪王彥環用防城免夫錢募士乃修治城壘樓櫓為戰守之具甚備望束手無策東野所言悉弃不用即以蠟書具所與望議論本末馳奏乞别自將不然祗與俱死奏凡十餘上上手𠡠報曰朕知卿甚深仗卿甚重宜與望協心共力以扞一方勿輕相同異於是不敢復言望果敗事引咎自劾案宋本紀建炎四年二月金游騎至平江周望奔太湖守臣湯東野亦遁云亦遁蓋由於望之奔也但遁與奔雖有前後其失均此書不書遁但云引咎自劾蓋有所諱寢不報而臺評繼上請正失守之罪上為之特下詔曰湯東野昨纍有奏陳措置守禦頗有倫理只緣事權不専遂致失守與其他弃城不同可止落職尋再丐祠上猶對宰執述趙鼎之言謂東野及康允之可任繁劇移江東都轉運使罷奏祠紹興初起知潭州未赴改江淮招討使司參謀官從張俊討李成初成之叛也鄂州李允文擅殺知嶽州袁植又直留綱運欲與成連衡成敗俊欲遂取之憚其彊時有前三省樞密院屬官汪若海者與允文善被罪謫英州案宋史汪若海𫝊時若海通判沅州以讒奪籍謫英州此書不載通判沅州則似竟由樞密院屬官被謫者與汪若海𫝊小異行至臨川東野知其善與允文引之謁俊使詒書允文允文遂伏罪案宋史汪若𫝊東野與若故相得遇若海道中喜甚謂曰李允文反側度非君莫能開其自新若海即馳往諭以成敗逆順示以朝廷威德復談三䇿以動之允文大感悟即舉軍東下據此則是馳往面諭不特詒書己也與此書所云詒書允文互異論平李成功復職為江淮等路制置發運使復奉祠起知揚州㑹僞齊宿遷令張澤拔衆四千自歸朝論以國家方屈好於豫不宜生釁欲還之東野不可章三上得請四千人皆免死以言者落職罷奉祠明年復待制以疾致仕卒東野當奏補先其弟次弟之子然後及已之子時以為難性剛嚴於宗族親舊有恩姪喬年喬年字夀隆博學工文慷慨自負所與交皆一世名人而意氣挺挺常出其上人慕與之交固不計屈伸而喬年智識之明議論之偉人亦自不能不屈入太學升內舍以選為前廊紹興間有誦所為詩於秦丞相檜檜大喜亟諭學官館致之時檜得君専游其門富貴可立致學官喜以告喬年不答詰朝再問之喬年罵曰是主和戎之議使國家屈好於讎敵失信於生民而竊威福以自私者吾方為天下讎之寧能伈伈俔俔出入其門乎是時秦氏之勢熏灼天下聞其言者皆辟易而喬年處之恬然尋以父病謁告歸檜亦不能害也又數年檜薨喬年以春秋經就上舍試故人有為郎官者語喬年曰某聞之要路將以某為考官春秋欲命某題作某意立說於公意如何喬年曰唯既入院試題不異前日而立說皆不類考官意不慊出院亟問之乃知退即易他經案劉漫塘湯貢士行述乾道間何公俌為吏部郎故與君為同忩友君將以春秋試上舍何謂公某題若何公因為道所以翼日何被命考試君即易他經據此則是何俌特索題解於喬年與此書稱郎官以題解授喬年小異後十餘年當淳熙甲午朝論以學校前輩惟喬年與魯秉禮二人將俾學官上其名喬年知而謝曰吾結髮事科舉誓不以僥幸進若爾二十年前附秦丞相久為中書舍人矣議遂寢晚以特恩對策入等授迪功郎韶州推官不赴老於家弟修年字夀真擢紹興二十四年進士第終揚州教授案湯貢士行述喬年後終廬州教授與此書終揚州教授異又案湯貢士行述修年登紹興甲戌進士第分教維揚帥守莫公奉詔經理民兵至數月數與幕府條便宜皆格不行璽書督責莫懼密延君問計君謝非職守所及莫曰闔府誰如君者急人之急君其無辭君不獲已條十事以獻莫讀之喜曰吾乃今知免於戾矣即具以聞不十日報下令淮南民兵條畫多自君發之此事甚有關要又行述稱故人子何公淡為武學諭以書戒食君弗啓緘還之語使者曰歸語而主吾而父執也知父執至而不來見欲折簡致之禮乎何聞而愧之此二事為此書所不載附録於此范寥字信中家丹陽本范蜀公鎮之族年少客遊落魄不羈浮湛俗間翟參政父思之為郡也寥知其父子有風鑒草衣丱角作方外士謁庭下願補書吏之闕思笑遣之汝文適從後見亟請其父延之入與語竒之因留門下其後思立朝位顯要寥藐不相聞思卒汝文持喪無錫一日有客自外慟哭匍匐而入門下大駭問之則寥也汝文德其意館之家遇之甚厚汝文陳白金器數事於几筵寥一夕哭甚哀明日夙興斂之而行莫知所之乃携以抵宜州謁黃公庭堅時庭堅已病嘗有詩云范侯來尋八桂路走避俗人如脫兔為寥作也寥亦有從庭堅城南晚望詩其間有云此邦雖在牂牁南更逺不離天地間人生隨處皆可樂為報中原秪如昨亦以開釋庭堅遲莫之意未幾庭堅卒親友皆已散去獨寥在為辦棺斂仍護其喪還費皆出翟氏其用意委折如此還抵和州知張懷素與知州吳儲及弟侔有逆謀案東都事略大觀元年五月己丑張懷素以吳儲吳侔謀反伏誅不書儲侔官階宋本紀稱朝散郎吳儲承議郎吳侔坐與妖人張懷素謀反伏誅均不書儲知和州九朝編年與宋史同據此書稱知和州吳儲則儲當以朝散郎出知和州宋史及九朝編年但書其散階耳皆不及此書之核實乃變服介左右求為僕𨽻懷素問頗識字否曰不識懷素俾夜宿書室寥入即偃卧未嘗一屬目懷素滋欲試之因責以罪俾持狀入州狀實訴寥者寥即持入謾不省所謂素大喜焉自是凡與儲侔密謀書問惟寥是任寥既盡知其事即佯狂脫去欲遂告變窘於無資知湯東野好事往見之具以告東野竭力資之案九朝編年懷素自稱落魄野人挾左道術游公卿間元祐中見朝散郎吳儲因道儲之福似姚興當為關中主崇寧中到京又見承議郎吳侔妄言星變至是有范寥者知其謀將入京上變而貧不能逹丹陽進士湯東野資遣之其所載懷素謀反狀較宋史東都事略及此書為加詳而范寥之乘間抵隙得以盡知懷素及儲侔反狀則九朝編年又不及此書之詳又考劉漫塘集跋湯侍郎勤王録後有云少師湯公能識范公寥於羇旅中從㬰上變以弭亂萌遂使江淮數千里之民一時免墜塗炭可與此書相證既懷素伏誅徽廟嘉其功欲超進士第一人授文階蔡京以寥上變之日適其在告謂進不因已曰彼素不由學校躐授文階不可第授供備庫副使案九朝編年寥告懷素謀反命中丞余深開封尹林攄及內𫝊官同鞠治而蔡京與懷素遊甚密深攄皆為京地深悉毁京札仍乞奏盡焚往還書疏以安反側蓋以滅迹也據此則蔡京本懷素黨與值寥告變禍且及已其搆憤於寥者甚深其沮寥不得授文階實此故也此書稱寥上變之日適京在告謂進不因已故擯抑之與九朝編年似是而實非暨東野以鎮江府學內舍入對乃授宣義郎衛尉寺主簿寥後纍更職任為潁昌府兵馬鈐轄坐不合收藏蘇軾詩文墨迹不首毁追毁出身以來文字除名勒停後遇赦叙復紹興間嘗知雍州兼雍管安撫卒寥志尚卓犖欲以功名自見方未遇時權以濟義故不徇小節既仕局束武辨志不得伸晚年遂以詩酒自放吕本中韓駒皆嘗與之唱酬陳東字少陽丹陽人以合法貢上庠政和中命太學生習雅樂樂成且命官一時歆艷預者多權要子弟東適以職掌居前列奮然曰吾寧能與乳臭子比以求幸賞辭不就政宣以來羣憸用事蔡京梁師成亂政於內王黼童貫唘侮於外李彥結怨於西北朱勔父子結怨於東南以致邊陲生釁宗社阽危天下皆知元惡大憝在六人者而凶焰赫然無敢擬議靖康初政詔求直言東乃率同舍生上書厯詆六人者指為六賊案靖康𫝊信録稱太學生陳東上書乞誅六賊謂蔡京蔡攸童貫朱勔髙俅盧宗厚與此書及宋史互異證之盡忠録所載原書六賊內無蔡攸髙俅盧宗厚𫝊信録似未足據始同舍生聞其言皆辟易無敢從者既見東書首言堯不去四凶留以遺舜使大明誅賞皆以為辭婉理順從者遂衆東復於衆中自誓以為言幸而中朝廷命東以官不受不中得罪死東不悔陳誼慷慨衆服其誠書既上中外大快京師老稚往往名數六賊京等知罪狀昭揭大禍且至又其時北敵已迫乃挾太上南巡是時東南劇任皆其親黨東以為京等不但紓死意有包藏亟上書乞追回六賊以正典刑别差忠信之臣扈從太上不報月末書再上大意以為羣賊之患在腹心甚於北敵欽宗感悟即邀太上還京盡竄六賊六賊雖竄案宋本紀太學諸生陳東等及都民數萬人伏闕上書事在靖康元年二月辛丑六賊之竄其中王黼安置求州李彥賜死朱勔歸田里俱在是年正月己巳梁師成賜死在是年正月乙未俱在東伏闕上書之前惟安置蔡京於儋州童貫於吉陽軍在其年七月乙亥故宋陳均九朝編年於蔡京童貫之竄殛均書在伏闕上書之後此書於東未伏闕之前即云盡竄六賊又云六賊雖竄則似童蔡亦與王黼等同時並竄者今特據宋史疏明而其用事久朝無正人同時宰執如李邦彥白時中趙野王孝迪蔡懋李梲輩皆阿附致身無能逺謀所議惟割地請和棄城避敵其不主和議者內廷惟李綱一人而在外惟种師道號為宿將知兵時國勢雖危人心猶藉二人以為重邦彥等疾綱異已俾出督戰㑹兵小郤即罷綱相且奪師道兵柄示堅和議人情大沮東不得已復率同舍生伏闕上書斥邦彥等罪乞復用綱而將師道案九朝編年謂太學生陳東伏闕上書請復李綱种師道舊職又東都事略种師道𫝊亦謂東請復綱師道位又云綱復執政此條謂東乞復用綱而將師道則似東以師道為已罷將矣與二書所𫝊略合然考盡忠録所載東書並無請復師道舊職及復將師道等語惟書末有云請閫外之事盡付師道使専之蓋斯時師道為同知樞密院事京畿兩河宣撫使諸道兵馬悉𨽻焉特因姚平仲沮忌致師道言不見用而其以樞密兼宣撫如故故盡忠録所載東書苐請以兵事專任師道實未嘗以其罷舊職而請復之也東都事略九朝編年皆誤以東書有請復師道位等語故反以東為惑於流𫝊而不知東書具在可復按也此𫝊語意頗類二書故並辨之又考東上書在二月初五日而靖康𫝊信録稱种師道罷宣撫使在二月初三日則又似師道去位在東上書之前然考宋本紀种師道之罷書在二月癸丑乃二月十七日是東上書時實未嘗罷也𫝊信録未知何據京師兵民知東等所言實契衆心不期而㑹者十餘萬至毁前欄楯破登聞鼓不得逹時閹宦壅閉非一日㑹朱拱辰等出衆不勝忿蹂躪之東力救不能遏乃歎曰禍在是矣無何京尹殿帥各以兵來同舍生挽之去東曰某去則諸公為戮顧公等何罪吾自視頭已在地上矣㑹事聞欽宗嘉其忠藎遣使宣諭復以用綱師道又令綱師道自出諭衆衆乃散諜知二公復用人心且固即解圍去案東弟參軍南所為行狀謂是日為靖康元年二月初五日考宋本紀此事係之二月辛丑是月朔為丁酉則辛丑乃初五日薛鑑誤以為庚子與行狀及宋本紀俱不合邦彥等怒揭榜通衢斥伏闕上書人為意在作亂學官奉承以東等為脅持君父屏出之幸欽宗聖明御批付開封尹聶山曰陳東言事出於忠義可令還學山出御札與祭酒楊時案九朝編年謂李梲蔡懋王孝恭趙野悉為都人所詬梲懋大恨之請置於法又密諭國子司業黃哲令屏諸生聶山聞而救止之上意少解此條載欽宗付御批於山曰陳東言事出於忠義可令還學又似寬免陳東特出欽宗意而山僅奉行之耳此事可以互考又案九朝編年載楊時謂欽宗曰諸生欲忠於朝廷本無他意但擇老成有行義者為之長二即定矣上喜曰此無過卿者遂使為祭酒此條謂山出御札與祭酒楊時蓋欽宗已有先命故特以此札付之合參二書尤可悉其端末率學官迎之歸諌官陳公輔援近比乞命之官少宰吳敏繼以請𠡠授迪功郎同進士出身與學官差遣東以誓言不拜再上書極論時政因乞改正太學生上書過名及除伏闕之禁案盡忠録載東於宣和七年十二月二十七日上欽宗第一書靖康元年正月六日上欽宗第二書正月三十日上欽宗第三書二月五日上欽宗第四書四月十六日辭告命又上皇帝書故宋史本𫝊謂東於欽宗時書凡五上考之此書與盡忠録及宋史正合而漫塘集載建炎第三書跋後謂東六上欽宗書與此書及宋史盡忠録均異不報遂謁告歸是嵗舉於鄉未幾京城失守忠憤感激言與淚俱建炎龍飛召赴行在東喜曰吾志伸矣即日就道以棺自隨案趙子嵩致東書有云聞公有遜避之意何得而避耶萬一左右少須未起朝廷遽命之以美官則辭之益難蓋斯時子嵩知鎮江府事故奉詔趣東據此條稱東喜曰吾志伸矣即日就道則與子嵩之書𫝊聞異辭又考東弟南所為行狀謂趙子嵩移文趣公行或勸公無行公曰新天子即位十日而下詔呼一布衣必聞天子之言也有君如此頂踵尚奚足惜耶據此則東實未嘗有辭遜之意子嵩或得之於流𫝊歟或問其故曰臣之事君言而不從罪不過死人惟畏死不敢盡言吾竊陋之以此自隨示不敢求生以害仁也聞者壯之是嵗八月十五日至行在所方草奏論天下大計聞李綱罷黃潜善汪伯彥以舊恩専柄任東以為此治亂之機不可默亟上書留綱不報再上書并及時政乞還都京師下詔親征以繫天下心作天下氣又不報乃力言綱忠直必能輔佐中興汪黃憸佞必不能宏濟艱難案盡忠録於建炎元年八月十七日載東上髙宗第一書八月十九日載上髙宗第二書八月二前十五日載上髙宗第三書考之此書及東家書所述者後全合而劉漫塘集跋建炎第三書乃謂東有第四書與此條及盡忠録均異汪黃大恚是晚應天府吏至出片紙有進士陳東四字東知得罪死即為書别其家人原注辭曰東八月十四日到南京十五日入門十六日具狀申尚書省十七日詣登闔檢院上書十九日又上書二十五日又上書當晚忽有應天府人吏來追取必是得罪死生未可知然東處之定矣切恐死後家中不知子細今特寫此紙恐要知東不以他故而死也來時新婦懷妊或得男即先人之後不絶東死無恨六五弟與六三哥同志奉二老兒勿致失所諸叔嬸更不在丁寧也仍煩二弟遍詣諸房起居尊長見姑姑亦𫝊語四七妹便可許他成親大娘長成中間已許與四六姐七五郎為親如其家不悔初心即成親不然别作區處請將此書與四六姐一看東隨身行李並付六十郎并諸僕携去且助二老兒使用死生命也切勿念東自餘不復更言案盡忠録家書一通與此書所載大略相同惟字句小異又盡忠録所載家書後又附載二條此書未載今附録之其一條曰文字片紙已上盡令六十郎收管可一一檢之六二郎諸弟妹不及一一作簡㑹諸親一一道意東八月二十五日晚南京神霄宫書又一條曰六十郎石青曽慶劉福趙慶吉能如將帶行李到家可一一多與錢羅貴遣去梓州襄城為二嫂去秦宅下書恐月初到千萬千萬東又覆書畢就道無幾微見於顔面後數日其友四明李猷始得其尸斂於所携之棺鄉人胡中行護之以歸人多其義案李猷贖尸記其大略曰少陽既死明日潜至其死所而遺骸已不知所在猷乃於所館舍一飲一食必先祭享且祈之曰少陽有知當啓我心越二日㑹都市曹後誅一兵官渠造有頃守視者舁其尸去猷即使人躡其後而伺之至門外忽有言曰前日舁兩秀才今日又舁一官人其人因問前尸何在遽指二土堆曰即此是也明日猷往審之其言亦然因詰其僕曰汝主翁有何辨認對曰小人每見濯足時左足趾間有瘢守視者亦云二人肥瘠自不同少陽肌體稍豐因用二說以驗其尸就移於所視之家而少陽之來亦以棺木自隨因就其棺具衣衾焉尚未得首也於是百方致之又二日得之面如生合而殮之方買舟東下㑹其鄉人胡中行從太學來欲求護少陽之柩以歸猷服其義乃并以少陽行李付之遂得以善逹方東死時外廷無知者後乃知潜善鋭欲殺之而無其由㑹進士歐陽徹上書及宫禁事言多不實上意頗怒潜善乘上怒併擠之死而東之死實非上意也建炎三年春六飛南幸大臣有及東死事者上驚悟贈承奉郎與一子恩澤案盡忠録載建炎三年二月髙宗南渡幸臨安少宰吳敏奏太學生陳東死於言事尚書葉夢得奏乞追贈陳東歐陽徹及官其子孫仍乞削奪汪伯彥黃潜善爵秩二月六日同奉㫖陳東歐陽徹各贈承事郎仍官有服親迪功郎一名黃潜善謫授梅州團練副使永州安置汪伯彥謫授江州團練使英州安置夏四月回幸建康過京口又詔曰陳東嘗奏封事出於忠義大臣涉私亟請誅戮朕方深悔禍之誠旌盡忠之士已贈京秩仍官其子案元一統志稱髙宗追念東祿其親者三人又考東弟南所著行狀稱官其有服親一人均與此書仍官其子互異今行經其鄉未忘於懷可特賜錢五百貫案盡忠録載建炎三年四月皇帝道由京口之丹陽參知政事王綯奏太學生陳東以言忤羣臣被誅此其鄉里上詔賜錢五十萬又五月四日辛已上次鎮江學士滕康請命有司祭陳東之墓又謂宰臣曰張慤古之遺直陳東誅死可念二人皆葬郡境已令有司致祭卿等更恤其家紹興四年冬追貶南京用事之臣詔曰朕建炎即位之初昧於治體聽用匪人置布衣陳東於極典朕甚痛之已贈官與恩澤殊未足稱朕悔往之意可特贈朝奉郎祕閣修撰案元一統志稱追贈諫議大夫與此書贈朝奉郎祕閣修撰互異又考東弟南所著行狀不及諌議大夫之贈當以此書為正更與兩資恩澤賜官田十頃舍人王綱中書行其詞曰嗚呼古之人願為良臣不願為忠臣以為良臣身荷美名君赫顯號忠臣己膺禍誅君陷昏惡嗚呼惟爾東其始有意於為良臣乎由朕不德使汝不幸不得為良臣也雖然汝藉不得已不失為忠顧天下後世獨謂朕何此朕所以八年於兹一食三嘆而不能已也通階美職豈足為恩以塞豫哀以彰豫過使天下後世考古之飾非拒諌之主殆不如是魂而有知歆兹朕意詞意悽惋論者以為深得代言之義竇從周字文卿丹陽人姿禀渾厚志向冲雅不肯自同流俗少時以所居僻左無學問之益惟慕交文士善收法書作字清遒動按古法鄉里推為好事年過知命得友曰都師中館致其家師中為言當世問學惟侍講朱公熹得其正時朱方講道建陽翻然棄家往從之朱亦閔其年髙念其來逺嘉其質厚為之盡心自顔子之克己曽子之守約書之所謂人心道心皆與之反覆明辨由是遂得操心之要既歸乃屏舊習一切從事於為已之學又以其餘力收伊洛諸書日涵泳其間有問者舉以告之一時士友聞風興起蓋自南渡而伊洛之𫝊萃於南方近世宗工大儒相望於湖南浙東江西而尤盛於福建惟浙西之士家自為學潤居淮浙之間見聞尤隘後來者鄉方不迷實自從周始其家聚族而居一夕盜入其室睥睨久之知為從周所居謂其徒曰毋驚此公即轉而之他朱公聞之以為忠信可行蠻貊於此見之享年六十有二以慶元丙辰卒葬所居吕城之東南五里孫時升字子亨丹陽人登政和八年進士第主泰州如臯簿教授保定軍省罷為杭州刑曹掾值方臘作亂而其詿誤甚衆悉平反之訊囚不委胥吏杭人有訟咸願送孫掾獄訟為清改秩知江寧府上元縣簽書鎮江軍節度判官廳公事就知金壇縣不赴知建康府句容縣其為縣也事之細大必親或病其苛時升曰君謂王衍為何如人吾為親民官當事事與民接若徒拱手清談寃者衆矣上元有從臣不輸賦嵗仰役户代輸時升捕擊其人正其罪俾盡輸所負自是彊宗懾服句容當聚斂之後取民無蓻時升平其槩量闔邑歡呼通判濠州還遂告老時升為吏明敏精練平居自奉儉薄出入無僮馭或問之指鄉民曰吾固與若等也性直諒中無嶮巇有不盡言如茹物不下故舊貴者輒不見建炎俶擾家數百指獨全晚以田園自娛預治棺衾除冢地年七十有四無疾而終人以為賢德之報王揚英字昭祖丹陽人擢宣和六年進士第主處州遂昌簿建康四年辟浙東安撫司幹辦公事紹興八年入為太常博士遷祕書省著作佐郎案南宋館閣録載揚英以紹興十年四月除著作郎此書載在八年之後十年之前與館閣録互異十年朝廷欲依元豐舊制以史館併歸祕書省國史案以著作郎修纂日厯揚英以國史案移文諸處多不報乞仍以國史目日厯所為名從之上中興聖德頌中興十針上嘉之遷著作郎兼權吏部郎官案南宋館閣録揚英以紹興十二年三月為著作郎十三年為吏部員外郎據此書乃以著作佐郎權吏部可與館閣録互考為浙東安撫司參謀官秩滿知泰州加直祕閣知眉州鼎新校舍兩郡士子皆勸於學刻石紀功就除成都府路轉運判官未上報罷歸葺湖濵之居榜曰練水草堂逍遙其間以夀自終張絢丹陽人擢宣和六年進士第紹興五年二月為殿中侍御史嘗論新除主管馬軍王􅊛討賊無功乞正其罪郭珣瑜字遐夀丹陽人擢紹興五年進士第終於揚州州學教授初建炎戊申冬髙宗駐蹕維揚時維揚未經兵火井邑全盛四方冠蓋闐委珣瑜適以故抵維揚與向子固邂逅子固時方赴調共榻天寧寺佛殿之側夜半向忽呼珣瑜覺而語云適夢吾服金紫來領此郡皆荆榛瓦礫之場非復今日入城亦有官吏父老相迎皆蕭索可憐公亦衣緑袍於衆客中不可曉也已而金人南牧六飛渡江城之內外悉遭焚蕩又數年珣瑜始登第既第後數年之官維揚子固適來為帥珣瑜迓於郊外悉與夢合相與感歎信事皆前定非人力可為也鍾將之字仲山丹陽人紹興十八年登進士第調楚州淮隂尉改盱眙軍教授盱眙當南北之衝每嵗賔餞使客多中貴人往來郡將率僚屬迎謁以為常將之不往曰非吾職也聞者多其得體地並邉學徒不至將之訓飭有方內郡學者爭趨之秩滿再調泰州教授當辛巳壬午敵人蹂躪之餘學舍傾圮請於部使者一新之再嵗以京秩薦者八人俄丁外艱服闋咸謂盍苟就近次足考第以應銓格將之笑曰富貴在天是固可以人力計耶復授常州教授遲滯者七年常故多士而校官失職賢否雜糅善士以入學為耻將之取之以文厲之以行而懲其不率者士以類至風俗為之一變學向占於巨室纍政不敢問將之極力歸之選部計考更秩合解印去郡將楊萬里謂是宜於師儒力留俟代將之亦恬於進退不復計淹速代還周益公必大知政欲旌靖退以厲風俗俾免作邑監左藏庫蓋將用矣㑹援例者衆將之謂不可以已廢法即退就部注知和州厯陽縣厯陽戍卒數千屯田卒二千軍民錯居易以失和將之皆有以得其心至郡先上屯田數於朝凡五百頃軍校利於廣占諉曰頃畝不足諸司檄縣增撥前令懼罪則括民田之寬剩者以充數軍校猶不慊謂虧五之一諸司督責無已時將之力疏其實以為淮田之寬剩不特厯陽在在有之况今寬剩之田皆耕耨成熟即非荒閒若欲盡奪其贏以供軍令有去而已不忍為也事以是止通判滁州值嵗大歉與守協謀先事而備民用不飢旁郡有囚繫者纍年將之奉檄一問知其寃破械出之聞者駭愕已而正囚果獲人服其明自滁歸度地所居之南藝松竹為終焉計以疾卒案劉漫塘鍾大夫墓志銘謂將之自滁歸太夫人在堂勉之仕不得已造朝遇疾而歸道卒與此書所稱自滁歸以疾卒互異將之以長厚稱於鄉里以亷靖聞於搢紳在毗陵得楊萬里為守相與於文字間故文益工在滁陽值檢詳石公宗昭為守相與講究仁義道德之㫖故理益明弟宜之登淳熙二年進士第終於惠民藥局吳致堯字聖任延陵人延陵故地今𨽻丹陽宣和間為安化令以事忤當路上歎曰論兵於刑作史於腐病茂陵而草東封棄湘湄而著貞符以窮故通以晦故明論次所為文名歸愚集聖任長於集古人句作集句調笑甚工宣和間嘗經御覽
