body:
  text: 京口耆舊傳卷八湯鵬舉孫邦彥談知柔劉公彥禇籍袁孚湯鵬舉字致逺金壇人九嵗從鄉先生杭夷甫受易有問於夷甫者曰貞者事之幹何謂也夷甫命諸生以意對鵬舉曰事不正不立木無幹不生夷甫大竒之未冠入學遂貢京師試上舍第一擢政和戊戌進士第調建平分寧簿轉常之晋陵丞改秩知太平州當塗縣屬郡兵俶擾官吏遇害賊相戒獨不入鵬舉之門安撫使李光聞其事一見如舊盡付以安集之且曰知縣在此吾無憂矣師饑以來富者無餘資而資算不除和買絹額視他邑倍蓰鵬舉析物力之出於資與産者為二欲諗於朝獨以産計會梁汝嘉為戶部侍郎故嘗同寮毗陵知其賢將薦之鵬舉請以此易薦汝嘉為之奏陳減和買十之六追呼期集揭片紙於門無敢後者聼訟敏决一見姓名狀貌輒記不忘咸以為神明御史劉大中問江東父老空縣自言邑有賢令大中上其政詔增一秩任滿召對論帝學中庸至誠之道上意嘉納差通判紹興府不旬日改知廣德軍先是敵將入境徙郡帑以避敵去而守藏吏乾沒紿曰盡為敵有前政置不問郡計弗支自劾去鵬舉至而疑之未及逮問有告者盡得所失亡時諸將擁兵所至騷動有道廣德者鵬舉遣人諭之曰是不滅此報天子何擾吾百姓為坐忤主將罰金然自是兵帥亦知畏戢改知饒州政成難其代增秩因任以直祕閣知江州時朝廷囚大將嶽飛於獄其下反側不自安有逆謀案宋史嶽飛及張浚秦檜諸𫝊於飛既下獄後並不著飛部下更有逆謀事金陀粹編與宋史同王明清揮麈録載王俊誣首張憲反狀云憲使俊往說飛麾下姚瀾王綱張應李璋諸人而亦不言諸人與憲合謀則即當時所誣為謀逆者飛部下亦止張憲一人耳且在飛初解兵柄之時至於飛既下獄未聞有他將謀逆也此書云囚飛於獄其下有逆謀與史互異鵬舉知其將董先忠義直入軍見先使搜軍中得首謀者戮之餘悉按堵董先亦率其下拜且泣曰生我者父母全我者公也除淮東轉運判官敵初通好送迎使者護致金繒禮文程式皆所創定移知常州升本路轉運副使問民疾苦罷行恐後自潤至杭往來苦徴稅之頻鵬舉奏非州縣而徴商者皆罷鎮江諸邑秋稅布豆折估嵗增命定其直澄汰所部吏無所顧望曰吏不奉公民之蛇虎也存而庇之為害滋大而或者猥欲以是為隂德過矣妻蔡氏卒從班或因對及之上曰廉士也贈銀絹三百以葬蓋前所未有擢知臨安府曰害政者吏壞法者貴近也首治吏而抑貴近奸民屏迹遷司農卿使北庭聞金主遇弒中道而歸時天下事皆先白秦丞相檜然後上聞鵬舉歸抵盱眙獨以奏上檜怒出知婺州加直顯謨閣閲十月進直龍圖閣知潭州兼湖南安撫時全州武岡間洞丁侵掠省地帥甫壓境吏抱具按以前鵬舉問此何文書何不俟入州而後呈耶吏魁以溪洞事急對鵬舉曰吾不能細讀汝讀其切要者吏乃取二郡失利及前帥申不可深入之狀讀之鵬舉曰止吾當思之行未十里二郡申賊大入官吏駭愕鵬舉不顧既入州上事如常儀有間乃索文案一過目即械吏魁付獄根究與溪洞交通謀亂仍差官籍其家盡得其往還書問及金帛等又逮所與交通人於衡州卜肆得吏親筆曰今使非昔比多以錢帛來囑內外仍出重兵乃可以成事即置吏於法而飭二郡合兵討蕩洞主楊再興聞之亟斂兵歸悉還所侵地叩頭請罪一日部使者請間曰某輩在此久不知吏魁之奸公甫至何自知之鵬舉曰吾以情察之方吾之始至也則張賊勢以懼我及吾視案籍而色動凡官兵破賊之狀則隱而不言吾以是知之皆歎服以為不可及郡帑有玉帶其直巨萬秦熺欲得之鵬舉具實直以白熺怒改知紹興諷言者論罷奉祠嵗餘起帥廣上親擢知平江檜語曹詠曰平江擇守非我意也及論罷更化初以殿中侍御史召入對首論君子小人不可不辨上曰朕以臺綱付卿卿其盡力復灑宸翰有親除公正之士以革前弊之語刻石臺中尋遷侍御史拜御史中丞一時憸黨排擊殆盡朝廷為之肅清熙豐以來以常平財榖専𨽻戶部右曹立法嚴備宣政間移用略盡邦本以搖至是司農寺丞王炎請以州郡見管常平錢糴米赴行在而戶部郎官鍾世明亦請下諸路嵗解陳米十五萬石鵬舉言其不可詔黜二人言仍鐫其秩良法賴以不墜自餘奏疏雖多大要欲威福之權歸於上告訐之俗易於下明薦舉以取實材久任使以責功效戒朋黨以肅班列舉閒廢以振滯淹給閒田以養退卒省浮費以寬疲民咸中時病兼侍讀造膝從容密以建儲為請上曰朕豈敢忘耶且以有定論普安郡王天姿不凡氣象尤異但太母言及皇嗣事則為之不樂卿其少待鵬舉曰聖心巳定宗社之福也時外廷實未有知者知紹興庚辰舉貢一洗徇私之弊所拔多滯淹時號得人除參知政事進知樞密院案此書載鵬舉除參知政事進知樞密院事在紹興庚辰知貢舉之後考宋宰輔表鵬舉以紹興二十七年丁丑二月戊午自御史中丞除參知政事八月進樞密院事即於是年十一月癸未以資政殿學士提舉洞霄宫其除與罷均在丁丑下距庚辰凡三載此書乃書在庚辰之後與宰輔表互異會臺吏有罪上顧宰臣曰自湯某入政府臺中事頗不理鵬舉以一時臺臣皆己所薦欲上章自劾未及發臺臣有知之者反與新進者比而攻鵬舉以資政殿學士奉祠金師抵江江面以采石為重起知太平州時王權已敗李顯忠未至亮營楊林江表震動鵬舉被㫖即行激厲將士人人思奮㑹虞允文亦至遂成采石之捷事平復請老以歸乾道初薨年七十有八諡敏肅鵬舉姿禀剛徑風采峻整故其中外踐揚咸有威望其知貢舉場屋嚴整後皆不能及云孫邦彥俊彥邦彥鵬舉孫字朝美以祖䕃入官主崑山簿未上中乾道壬辰博學宏詞科丞相虞允文一見如舊除樞密院編修官允文宣撫四川辟充大使司幹辦公事明年允文薨方允文之入蜀也以恢復自任所携賞功之告自節察防團以下無慮數百金帛稱是比其薨也守護慎密以逹於朝邦彥實主之時孝宗鋭意逺略邦彥自負功名論議英發上心傾向之除祕書丞起居舍人兼中書舍人擢左司諫兼侍講論事風生權幸側目上手書以賜稱其以身許國志若金石協濟大計始終不移及其他聖意所疑輒以諏問御筆具藏於家使金還坐貶淳熙末復故官歸鄉里其才益老朝廷將收用之未幾卒邦彥性開爽善談論樂施與少時頗有積榖盡散以拯鄉黨之饑平時周人之急惟力是視南歸坐貧自譬乾義井云談知柔字勝仲金壇人擢政和八年進士第案元至順鎮江志知柔政和二年進士第與此書政和八年互異授宣州太平丞攝令久有能聲秩滿調泰州興化令巫以術惑民知柔發其妖妄屏絶之人服其明知江州德安縣衡州茶陵縣德安賑饑有方民德之茶陵秩滿將去矣值盜劉賔王起黃岡據險守要官軍不能下有薦知柔善可代者奉㫖往說仍以兵從知柔曰事不辭難事君之義也聞命即行既至度賊愚無知且其勢方張未可以空言說乃與禆校密謀乘機掩襲冦遂就擒以功改秩會邵州境內武溪洞賊常出沒為害當路奏辟通判邵州軍州事賊聞其來相語曰談茶陵來矣即散去有㫖召赴闕除宗正丞兼權禮部郎官尋除刑部郎官大理少卿最後除左司郎中未下改授祕書少監案南宋館閣録知柔以紹興八年四月除祕書丞八月遷刑部員外郎據此書則知柔未嘗為祕丞特為祕書少監與館閣録互異又考元至順鎮江志亦云談知柔終祕書少監與此書合以疾卒葬縣西强塘之原生平喜為詩尤長於絶句如晚醉携笻過竹村數家殘雪擁籬根風前有恨梅千㸃沙上無人月一痕低昻緑樹春驕我偃蹇青山氣壓人逺山故作低眉恨好鳥能為緩頰聲多為人稱誦號華陽居士集劉公彥字彥輔密人家金壇少讀書宣和六年客海州通判解世京家明年山東盜賈進擁衆逼淮朝廷遣使招安率不生還最後命世京行世京難之公彥請代因直抵賊營諭以逆順賊喜聼命會辛昌宗提兵討之軍敗身沒賊曰是賣我將殺之公彥曰嗟乎吾得從酈生游地下死不恨賊後知不相為謀復善遇之且願奉約因降首領五十八人盜衆數千捨兵而農者十萬餘人郡守錢伯言與提舉常平潘良貴上其功敕授嘉州文學案宋本紀祗載錢伯言上平賊功不及潘良貴可以此條補其闕建炎二年魏鉌知海州所部懷仁縣鄰敵境數入侵掠鉌檄公彥權縣事公彥知弓兵周彌者與敵通斬以徇敵不敢近賊張遇劉尚書犯海州公彥率勇士七百餘人破之城下招討韓世忠回自淮陽其後軍李彥先叛掠船百艘引衆數千據東海鉌復倚公彥討之公彥搏戰重傷為賊所得環之以刃曰汝能使海州降即釋汝不然令汝肉骨異處公彥僞許之執至城下大呼以告城中曰努力城守賊兵無糧勢不能久賊挺刃反下公彥曰吾本討賊乃為賊獲今死晚矣豈復顧惜賊服其忠勇遽自斂刃劫之以過東海遣人還扣城以公彥意取其孥太守以下泣送之妻王氏盡散其家所有曰毋以資賊獨携二子及孤姪行賊幽之古寺飯以麥麨公彥語王氏曰我死汝不可辱於賊寺有井極深是汝死所也王氐曰諾每賊召公彥王氏輒率子姪坐井旁以俟變賊以公彥威信在人更欲託之軍事公彥以死辭一日偕衣冠十餘輩載酒訪之欲伸前請且以刃脅之指階下小松曰是不可用當斬去公彥不為動因請賦松詩蓋欲以觀其意公彥應聲曰誰植蒼官近短階青青不肯雜蒿萊他時若有風雷便拔向南山穩處栽賊知不可强而止會敵據海州時時抄掠東海賊死戰以拒公彥因說彥先曰公等本朝廷軍馬僅一攻海州他無大過今數與敵戰勝不為功敗則身死而又軍無見糧雖勝弗支計無拙於此者今楚圍方急為公等計莫若出舟師解楚之圍朝廷捨過録功富貴未可量彥先感悟委軍聼命至楚一戰敗敵鎮撫趙立即就便改公彥宣教郎奏辟彥先淮揚軍鎮撫使就差公彥鎮撫司參謀官還守東海敵遣戰艦數百精鋭萬人趨東海公彥逆知之出竒兵與戰擒其將徐聚等十餘人盡得其舟自是數與敵戰未嘗敗北通商惠工用度寖饒民樂其生四年敵復圍楚州公彥與彥先率舟師破之孫村浦彥先乘勝欲以舟師赴楚公彥謂水淺不可入不如淮口彥先不從舟膠敗績彥先死之公彥收餘軍轉戰七十餘里得歸東海未幾詔赴行在所遂以舟千餘兵數千趨朝今采石水軍是也紹興改元被㫖屯秀州青龍鎮以防海道賊孫誠聚衆劫虜郡守鄧根檄公彥討之誠請降收其衆屬麾下除江東安撫大使司幹辦公事督李進彥水軍捕江冦冒暑泝流運漕不繼公彥料孫誠軍必叛密為之備不數日果叛手斬誠殱餘衆於茅浦江行遇賊郭大刀餘黨李遇等三十五人衆數百盡擒之曰此敗羣羊留之無補軍實縱之必為民害盡斬於小焦賊邵清謀擾建康師呂頥浩分遣耿進李進彥水軍討之而公彥提舉公彥以戰艦橫江賊不敢進乃降浙西帥劉光世案宋本紀紹興元年五月辛亥水軍統制邵清叛圍太平州壬戌劉光世招降邵清六月癸未邵清率舟師至鎮江甲戌復叛己丑邵清犯江隂軍之福山遣海州鎮撫使李進彥中軍統制耿進率舟師會劉光世討之據此則遣耿進李進彥討清在清叛後凡十六日此書序耿進李進彥討清乃在清叛之前與宋本紀互異公彥曰賊在江東而降浙西此欲詭計以入海爾疏利害於光世不聼案本紀及劉光世𫝊邵清據通州光世招降之據此書不稱光世招降但書清降與本紀及光世𫝊詳略互異邵清至鎮江果順流而下追捕不獲光世愧悔乃請於朝借公彥提舉水軍措置捕賊公彥沿檄巳過池州頥浩被㫖津發浙西公彥以前言不用難其行頥浩貽公彥書曰公在軍中纍年輸忠竭力衆所共知今朝廷以水賊邵清侵擾浙西正賴左右特出竒計克清大憝軍中豈可無劇孟也公彥不得巳領軍赴鎮江順流七百餘里一日而至光世得之大喜邵清望風請降按宋本紀紹興元年十月己巳王德招邵清降不書公彥與此書異冬十月葉夢得帥江東趣公彥歸案宋本紀九月丙申葉夢得為江南東路安撫大使此書稱十月與宋史異光世不從辟公彥浙西宣撫使司幹辦公事仍舊提舉水軍奉敕授添差通判鎮江軍府事時倉廩空虛軍無糧交相攘奪光世不能禁從容問計公彥曰兵以食為本無食則死人豈束手就死其叛亡固宜因進足食足兵之計光世即檄公彥權府事調度給足軍民妥安二年呂頥浩都督軍馬至鎮江前軍道亡遣將王青追捕公彥上書曰使人捕盜不若使人不為盜養兵之食既足為盜之心自銷頥浩事無巨細必咨而後行制置使仇悆上殿奏公彥之功乞加召用一月之間詔凡三下光世武人直奏云鎮江大軍屯劄若去通判劉公彥如失劉光世左右手乃止秋八月除知真州以宣司委公彥措置收捕海賊餘黨未赴十二月某日以捕賊泝風江行失舟而沒年五十七公彥自宣和七年以招安賈進功補官以說李彥先功轉至承議郎自後間關兵中六七年屢有戰功未嘗受賞嘗作古鏡詩曰平生膽氣忠於國顧爾何曾照膽明蓋亦有諷其為人剛正有大節料事明審臨機勇决期以忠義取功名故陷賊者再而不屈妻王氏同陷賊營亦以死自誓先公彥沒於江上子三人長曰簡易從公彥出入軍中劉光世欲以勸士奏迪功郎公彥曰兒方童稚何功效之有奏不上次光世名之曰堯叟上一字與光世諸子同示親之也許奏以官以父功未録不敢受第三子襁褓育於族人劉刺史家公彥輕財重義死之日家無餘財軍民爭致賻乃克斂以光世命就金山寺地卜葬遷王氏祔嗚呼忠義如公彥功多如公彥生不得一日離行陳死不得一官庇子孫可痛也矣可痛也矣禇籍字彥文金壇人祖廷堅字季長登元祐六年進士第為太平州繁昌丞棄官不仕時人髙其隱操籍紹興五年擢進士第為池州青陽尉秀州崇德令改知青陽縣事嵗滿召赴行在除御史臺檢法官擢監察御史明年除工部郎中言者指為前樞密湯公鵬舉之黨罷奉祠歸老於家青陽賦稅特重鄰邑貴池上田一畝八升青陽一斗九升中田六升下田四升青陽一斗七合幾於三倍蓋自南唐李氏以是邑為宋齊丘食邑齊丘厚斂以自私江南平上版籍於有司以為經賦厯二百年無能有所更定籍自為尉知其事及為縣請為當路言之當路上其事詔以十分為率蠲二分半至乾道間或申前說遂再蠲之發端實自籍始青陽人至今德之袁孚字仲誠金壇人劉公子羽知鎮江館之門下所從遊者即忠肅公洪也紹興十五年省試第二名實詞賦首選授宣城尉改揚州教授以憂歸服闋教授常州改秩待次諸王宫教授初令教常州時知州梁仲敏適以憂去官吏率解體孚曰事上有常禮不應以去留二其心且緩急人所有寧能恝然若路人乎獨奔走不懈為之經紀後事纎悉曲盡追送越境而後反仲敏德之宫教未上會仲敏由諫議大夫去國陛辭上問可為臺諫者仲敏以孚對即日召見除監察御史孝宗即位除右正言時德壽宫建小人附會用事者規利百端而髙宗不之知孝宗不敢問小臣甄其姓者獻宅為酒肆大閹梁康成者實主之涓日張設事極猥瑣臺諫聚議以為不抑其初後有甚焉者非所以光孝治欲遂白發畏禍輒止孚曰臺諫天子耳目事當論是非安可顧利害明日上殿奏疏大意以為陛下以天下養何至使羣小猥瑣如此上怒麾去不視孚手其疏不退上亦徐察其忠好謂之曰卿豈不知父子之間人所難言孚曰臣但知父有爭子則身不陷於不義因委疏殿上而去明日出知溫州事聞梁康成等大懼凡所張設一切徹去未幾過宫髙宗從容問言者姓名孝宗具以實對且曰所言謬妄已罷言職補外矣髙宗惜之曰業已補外何不優與職名是日命下除直祕閣制云古者三諌不從則去去之以義非以為髙也爾拾遺諌省言罔攸伏何恙靡巳而求去之果麟符之寵延閣之華兹云眷懷旌爾諒直爾其勿替於義尚勉嘉猷尋遷江東提刑廷議以刑侍召而孚死矣議者謂兩朝授受之懿所以焜耀史冊終始無間言者孚有助焉
