body:
  text: 京口耆舊傳卷三吳淑子遵路周孚邵飾弟餗等諸葛賡王存顧方陳輔吳淑幼有雋才為文敏速韓熙載潘佑以文章名江左一見深加器重曰吳正儀中林之蘭蕙也嘗問以唐太宗杜淹論樂同異淑曰志氣未動則聲能致和哀樂既形則樂乃思變二子歎曰足以探禮樂之情矣仕江南舉進士擢第以校書郎直內史從李煜歸朝以近臣薦試文學士院授大理評事預修太平御覽太平廣記文苑英華始置祕閣充校理嘗獻九絃琴五絃阮頌太宗賞歎又作事類賦百篇以獻詔令注釋分為三十卷上之至道二年兼掌起居注舍人事預修太宗實録時諸路所上閏年圖皆儀鸞司掌之淑上言天下山川險要皆王室之祕奧國家之急務周禮職方氏掌天下圖籍漢祖入關蕭何先收秦圖籍方知險要請以今閏年所納圖上職方從之案宋史淑本傳及續通鑑長編載咸平四年八月甲子職方員外郎祕閣校理丹陽吳淑上言諸路所納閏年圖當在職方云云又請今諸路轉運使每十年畫本路圖一上職方此書乃祗載淑請以閏年圖上職方又此書載淑為祕閣校理兼起居注舍人時上言閏年圖而宋史及續通鑑長編則均云職方員外郎與此書互異會詔問御戎之䇿淑抗疏請用古車戰之法上覽之歎其博洽嘗以浚郊上都奕世丕業作論都賦以獻咸平五年卒年五十六初王師圍金陵城中乏食有與淑同宗而死者惟二稚女在淑收養如生及長而嫁之時多其義有文集十卷淑善筆札好篆籀撰説文義三卷江淮異人録三卷祕閣間談五卷子遵路遵路字安道少奇俊其舅陳彭年以逺器許之大中祥符五年進士及第天聖二年以太常博士為祕閣校理同知禮院頃之判登聞鼓院時章獻太后稱制無敢議政事得失者遵路條十餘事上之太后怒出知崇州會嵗歉先期轉市米吳中以賑貧民權開封府推官加直史館為淮南轉運使兼發運使凡所規畫後皆便之徙知洪州就為江淮制置發運使案續資治通鑑長編眀道二年九月司封員外郎祕閣校理吳遵路為開封府推官始莊獻太后稱制遵路條奏十餘事太后怒出知崇州即令轉市吳中米以備嵗儉已而果大乏食民賴以濟范仲淹安撫淮南薦遵路為郡得古人之風乞以遵路救災事迹頒諸州為法并付史館遵路為京佐府不三月又遷鹽鐵判官據此書但稱權開封推官不及仲淹之薦與續通鑑長編詳略互異又此書載遵路權開封推官後不云遷鹽鐵判官亦終其身未嘗為司封員外郎與續通鑑長編均異未至詔修起居注同糾察在京刑獄元昊叛建請復民兵乃受詔河東料簡民兵除天章閣待制康定元年權知開封府馭吏嚴肅諸縣無追逮吕丞相夷簡當國以不阿附見謂朋黨出知宣州上禦戎要略二十篇徙陕西轉運使遷龍圖閣直學士知永興軍在鎮力疾決事後疾革猶手自作奏慶厯三年卒於鎮遵路平居厚重簡默立朝敢言母喪廬墓側蔬食終制與人交初若平淡久而彌篤與祕閣校理石延年同使河東延年卒力請於朝特官其子嘗采古今治亂著皇典數十篇未成而終既沒家無餘資友人范仲淹分俸周之周孚世濟北將家避亂南徙天資頴悟七嵗通春秋左氏傳既長喜讀書過目輒成誦時有鄧氏張書肆孚日往遊焉因得盡閲天下書其友陳珙為孚集序謂其博聞強記尤邃於楚騷遷史唐韓杜氏之詩文而博以本朝諸公名世之作為詩始以黃陳為法而卒歸於杜屬思髙逺錬句精穩少而工壯而新晚而平淡為文長於敘事簡潔而峻厲不喜襞積雕繪循理而言理盡而止辛棄疾少壯時兄事之擢乾道丙戌進士第為真州教授案陳珙蠧齋鉛刀編序謂孚登第十年始為真州郡博士考孚集有之官別鄉舊詩其下注云乙未五月證之此書孚登乾道丙戌進士第下距乙未則十年也惟考乾道辛卯孚上虞丞相書已自稱左迪功郎辛卯上距丙戌方六年則為迪功郎已在真州教授之前五年又孚集中有謝虞丞相啓云擢從冗散之職畀以師儒之官又云昨叨一命之寵已逾五年之期惟窮邉之劇煩不容尸祿而下吏之齷齪或至辭難據此則孚既為左迪功郎又嘗作吏邉境至是始以虞相之薦教授真州此書與陳珙集序但稱為真州教授他任不書可據孚集以考其端末郡守延璽武人欲薦之介學職以意學職喜以告孚不答退復以書扣可否孚答書陳誼甚髙聞者韙之案孚蠧齋鉛刀編有代延守祭趙馬軍文云况如不肖初無一日之雅而佐公幕府提携奬豫延守蓋嘗為軍佐與此書所云武人可以相證而延守之名璽特見此書又考鉛刀編有與彭郝二學正書力却延守之舉與此傳所云正合書中但云昨日辱寵臨委諭諄復即此傳所云學職喜以告也而書中大意乃略不及彭郝二學正來書與此傳所云二學正退復以書扣可否孚答書小異在任以疾卒有蠧齋集三十卷時京口之士多從遊其最厚者朱叔珤字德裕陳珙字德厚宋郭字安民德裕未請為鄉舉嘗試為京口七原略倣栁宗元晉問他詩文亦多擬古未第而卒孚識髙見博為朋友所推每一言出輒相與傳誦惟德裕素與反覆是而後已蓋孚畏友云珙擢淳熙八年進士第厯秀之崇德尉真州司法湖州教授卒性嗜書老不釋卷平居端重寡言及杯酒從容援古證今談論衮衮叩之不窮始知不可及安民四舉於鄉晚以特科拜官從蜀帥張詔辟於興州卒案宋嘉定鎮江志稱安民從張詔辟興州簿領再請蜀漕舉與此書詳略互異安民亦多識前言往行善談論性謙和喜接引後輩學者多出其門邵飾字去華丹陽人大中祥符元年以進士擢第賜同學究出身初任福州福清尉吏部銓判超等知南康軍星子縣用薦者改秩知杭州仁和縣未滿嵗移知益州雙流縣任滿回知蘇州長洲縣凡四為邑所至吏畏民愛之通判處州就移知巴州案元至順鎮江志飾知長洲之後即云改知巴州不云通判處州與此書詳略互異辭以不便婚嫁改知通州南劍州近臣有薦堪充刑獄錢穀任者升知吉州未踰月就移提點荆湖南路刑獄公事時衡永等郡蠻獠為盜號黃捉鬼者其徒實繁出沒溪洞官兵阻險不能入飾至即設方略分兵山下厄其隘道厚募獵者入山擾之使居不能安出輒見獲由是計窮始相率謝罪納欵一路以寧詔書褒美移兩浙路轉運使改知夀州召還充三司鹽鐵判官出為福建轉運使移淮南轉運使課最他道恩秩奬諭復為鹽鐵判官時朝廷議改茶鹽法丞相召問利害飾謂利歸國家而商賈不便不可行也容歸召商人詳議以聞比歸即召諸商諭以公私之計俾盡述利害裁取其中奏上之公私兩利中外大悅居無何除江淮都大發運使會有言其年髙改知潭州未行改宣州到任未一嵗改蘇州居三月又改眀州引年致仕嘉祐三年卒年七十有三葬彭泉村陳洙作墓志飾之祖曰勳生二子曰邈曰遇邈之子景先景純景純之子彥遇六子其三曰餘生亢亢生塤篪其四即飾飾之弟曰餗曰必必生納史納史之孫彪以飾兄弟多顯著且不知與景先孰長故先飾之族而後景先其族又有名仲宣者亦飾從兄弟擢天聖五年進士第終祕書省校書郎其子徙居晉陵孫文炳嘉泰中為中書舍人餗忘其字再舉不第養髙丘園范仲淹守潤嘗薦之不報後數年王琪為守述仲淹意再薦之賜號沖素處士家有溪齋仲淹自潤移越道過之得唐人許鼎所撰祖先生墓志於席間頗言賀監之異至越刻之祠堂後謫守睦州作嚴子陵祠堂記致書於餗求篆有云謹奉短書於先生邵公足下今春與張侍御過丹陽約詣先生維舟水邉聞先生歸山所謂其室則邇其人甚逺惘然愧薄宦之不髙暨抵桐廬郡有嚴陵釣臺思其人詠其風能使貪夫亷懦夫立有大功于名教築堂而祠之又為之記念非托之以奇則不足傳後今先生篆髙出四海或能枉神筆於片石則嚴子之風復千百年未泯其尊尚之如此以夀終必字不疑擢寶元元年進士第主上元簿擢國子監直講案歐集有蘄州廣濟縣今充國子監直講邵必除大理寺丞制然則必官國子監直講之前曽知廣濟縣官直講之後又為大理寺丞此書不載二官與歐集異監中立石經以必篆𨽻選為國史編修官必以史出衆手非古人撰述之體辭不就進集賢校理同知太常禮院天子且親祠執事者習禮壇下必言周官大宗伯凡王之禱祠肄儀為位鄭康成釋云若今肄司徒府古禮如此今即祠所習之為不敬乃徙於尚書省張貴妃受册禮官議命婦入賀儀未決或曰妃為修媛時命婦已不敢抗禮况今日乎必曰宫省事祕不可知既下有司議惟有外一品南省上事百官班見之儀然禮無不答衆議乃定出知常州詔為開封府推官以前任常州失入徒罪謫監邵武軍酒稅司馬溫公光吳正憲公充與必同年登第同官大學復同入館契分最厚作詩懷之光詩有云因思甌閩逺南去浸溟漲炎蒸異中縣從古無雪霜終朝坐第居榷茗征行商歡譁費口舌解囊收毫芒不疑性髙介此固安可當山川幾千里問訊誰能將會趙抃力言其無辜案涑水紀聞載趙抃上言陳執中八事其四曰酬私隙邵必知常州議決徒刑既自覺舉又值赦宥遷官去官陳執中以宿嫌自開封府推官降充邵武軍監當此書所載與洓水紀聞大略相同而其因陳執中挾嫌必以失入自劾因赦獲宥與此書可以互證起知髙郵軍提點淮南刑獄為西京轉運居官振厲風采惟始至一赴郡集行部但一受酒食之餽以為數會則人情狎多受餽則不能行事非使者體也入修起居注知制誥雄州種木道上契丹遣人夜伐去又數漁界河中事聞命必往使必以理屈之還知諌院編仁宗御集成遷寶文閣直學士知成都卒於道年六十四遣中使護其喪歸必有詩名梅堯臣讀必詩卷作詩云所得在卒章小大珠落盤光彩若眀月射我枕席寒末又云願執戈與戟生死事將壇其稱道之如此司馬公光集中與不疑唱酬詩甚多納史字公言樞密蔣之奇之壻必守蜀死三泉道中納史始十一嵗持喪如成人行路嗟歎以恩補將作監主簿太常寺奉禮郎為道州簽判監饒州永平監以嵗課之餘補前人闕額猶有羡遂以是增秩通判秀州卒年三十七家貧僚吏共賻之喪乃克歸蔡肇為撰墓志彪字希文安簡公亢有餘澤欲及之辭不受擢宣和三年進士第主崑山簿登州教授原注案吕忠穆勤王記作密州邵氏録彪所撰勤王録作登州後敘公履厯作楚州未知孰是秩滿還丹陽聞苗傅劉正彥之變走平江謁禮部侍郎張浚浚問今日之事計將安出彪曰以至順誅大逆易於反掌顧侍郎何如耳浚曰今張俊自誓以死援君父之辱韓世忠有仗節死難之志二將可倚以成功惟浚綿力士卒單弱恐不足任兹事然簽書樞密院事吕頤浩駐兵江寧志在靖難威望為人所信當為天下倡彪言兵貴神速此行當有迅雷不及掩耳之勢吕樞密在數百里外奈何浚曰吕樞密見事明而剛決聞國家之急必奮義而起何患不速因留幕下一時密謀多所參預浚慮傅正彥計窮變生遣辨士馮轓入説以觀其意傅正彥傾心附結授轓奉議郎尚書兵部員外郎賜五品服案宋史苗傅劉正彥傳馮轓初往説二凶反正傅按劍瞋目視轓正彥解之曰須張侍郎來乃可轓既歸又遣至臨平與傅等議傅曰爾尚敢來耶欲拘轓及勤王兵大集二凶乃與轓議復辟此書云傳正彥傾心附結證之宋史當在大兵既集之後又此書稱授轓尚書兵部員外郎賜五品服宋史闕書遣還通誠於浚浚以轓言語彪曰傅正彥甚悔過且懼大誅請浚挺身入覲朝廷可不煩兵而定於計如何彪曰是必有姦人謀沮軍以惑衆者侍郎惟無入入則爼上肉耳浚喜曰誠哉是言浚心如山嶽不可言也傅正彥誅改奉議郎國子監丞尋辟江淮招討使司幹辦公事從平李成還轉朝奉郎幹辦行在諸軍糧料院出知泰州移楚州兼營內安撫以耳瞶告老卒於家彪以文受知當世苗劉之誅李成之滅皆有紀載字畫端徑世其家亢字興宗再試開封府皆第一以賦失韻棄勿取范仲淹以茂才異等薦之時被召者十四人試崇政院獨亢䇿入等除建康府節度推官會有言其與宰相姻家者命遂格時宰相張士遜之子娶邵氏偶與亢同姓實不相知亢竟不自辨趙元昊叛詔求方略之士亢言用兵在於擇將今天下久不知戰而所任多儒臣及故家恩幸子弟儒臣未必能應變子弟安能識攻守計况將與卒素不相附此不待兩軍相當而勝敗之機固已形矣因獻兵説十篇召試祕閣入為國子監直講祕閣校勘同知太常禮院張貴妃薨議立園陵禁京城樂一月亢纍疏罷之遷集賢校理仁宗繼嗣未立亢言此繫社稷之安危不可不蚤定因集漢以來帝系承襲之迹著興亡論十卷上之時上自輔相大臣皆未敢言亢以小臣首發大議時以為難為提點開封府縣鎮公事比有縱火者一不獲則主吏坐罪民或自燔其居以中吏亢請非延及旁舍無坐徙為府判官改度支判官契丹遣使賀乾元節未至會仁宗崩議者為宜卻或謂宜須其及門諭之使去亢請令奉國書殿前使見嗣聖以安逺人從之神宗為潁王遴選府僚以亢為翊善加直史館英宗訪以世務稱之曰學士真國器也擢用修起居注建言欲治國者先齊家潁王且授室願採用古昏禮公主下嫁不可殺舅姑之尊帝深納之他日諭王曰以翊善端直朴厚輟為諌官矣遂以知制誥知諌院言殿前都虞候竇舜卿聨親樞臣不可使典禁衛簽書樞密院事郭逵才望輕不可使宣撫陕西東宫兼為右庶子神宗立遷龍圖閣直學士知開封府訟牘皆反覆親閲或以為勞亢曰決是非於須臾正當爾今雖煩後乃省也籍里閭惡少與吏之廢停者一有所犯皆遷處他處畿下鬬訟為息拜樞密副使先是知保安軍楊定懷姦反覆夏人誘殺之朝廷建議西討亢曰天下財力屈未可用兵惟當降諭安撫俟不順命然後討之則師出有名矣因條上其事帝悉如其計未幾其國主諒祚死國人執殺定者來請和或欲乘此更取寨門之地亢以為幸人之喪非義也以資政殿學士出知越州徙鄭州奏除山陵所假都水監腐爛之木免民間償納增築湖河堤石䃮嵗省科民楗薪數百萬又徙鄆州亳州案宋名臣琬琰録載王圭邵安簡公亢墓志銘亢徙鄆州又兼京東西路安撫使又遷禮部侍郎乃徙亳州此書但云徙鄆州亳州與琬琰録互異上遣內侍馮宗道諭將復用案宋史本傳亢以知樞密直學士知開封府踰年引疾歸以資政殿學士知越州厯鄭鄆亳三州卒與此書合東都事略本傳亢既徙亳州復遷吏部侍郎乃卒與此書及宋史皆異又此書載徙鄭州之後有奏除山陵所假都水監事徙亳州之後有上遣內侍馮宗道諭將復用事宋史及東都事略俱不書可以此書補其闕熙寧七年十二月薨年六十二案宋史及東都事略亢本傳亢卒年六十一又考名臣琬琰録亢墓銘亦作六十一此書云六十二二或一字之訛即鄉里賜居宅諡安簡葬縣之耿岡亢忠碩方靖莊外而敏中與人不茍合為治恕以眀故其去常見思其議論文章溫雅一時聞人有所不及少厯艱難及貴盛無少易祿賜多以周宗族比其終家無以歸其立朝與叔父必齊名世號二邵司馬公光集中亦多與興宗倡酬詩塤字伯友為太廟齋郎調許州長社縣主簿遷太常寺太祝監杭州糧料院元祐初曽布經略河東辟為屬掌文翰還管當文思院出知婺州金華救荒有名通判滁州卒于官案宋名臣琬琰録載亢子二塤祕書省校書郎篪太常寺太祝考此書不著塤為校書郎與琬琰録異趙抃張商英嘗薦之篪字仲恭父任為太常寺太祝登熙寧六年進士第管當在京南排岸丁父憂服除擢司農寺丞尋移太府神宗親擢提舉開封府界常平哲宗即位入為開封府推官管當使院公事以三院獄空賜五品服遷都官郎中改駕部出知鄭州召為金部郎中除京東轉運副使移河北兼措置糴使復移陕西得旨專應副鄜延環慶路軍其時西邉用兵鄜延屯戌多而財用窘前此主計者率懼不來來亦以不勝任去惟篪久任以稱職聞吕惠卿為西帥進築杏子平及米脂皆篪主糧餉米脂城垂就有妄傳西師至者同列辟易惟篪凝坐不動衆以是安方是時非篪衆且潰故惠卿深德之移至鄧州徽宗即位除直龍圖閣知秦州兼秦鳯路經略安撫使議者謂涇原熙河各巳城築要害秦鳯可罷帥府省戌守篪言秦為國西關涇熙二府相去各數百里其間無堅城之守山溪之阻賊若聞我撤備搗虛深入塊然孤城何以禦之若使得志而歸咸鎬皆震雖咎往議之非亦復何及書三上得不罷聞者服其逺慮會涇原有警命以兵赴自朝廷有事於西陲秦兵無一役不行今已十減七八若盡赴涇原臣竊危之兵以免行篪使關陕纍年出入塞上凡山川之險易蕃漢之情偽金穀調度之盈虛皆所習見故其措置議論悉中事理移知青州道改鄆州除顯謨閣待制知瀛州言者以篪故司空吕公著之壻名在黨籍不宜升侍從命遂格就差知常州眀年移蘇州卒景先字伯綏擢天聖八年進士第王安石撰墓志稱其少敏爽皇考邈欲大就之為破資聚留師賔以發其才及壯內行修不標飾為名而有譽於為士者年四十始出佐鎮東軍積功次入尚書為屯田員外郎通判亳州遭母喪不行卒君工於詩歌喜飲酒與人交恬如也尤不好官爵至京師一不問權貴人所舍事有類君者自言得遷或勸君自言終不許然起家十九年更三縣以材奏君者甚衆卒之眀年弟景純葬之景岡彥字君美景純之子試於鄉為舉首一上中治平四年進士第調淮安軍下邳簿丁內艱再調真州揚子尉以病去上官不能留竟老于鄉中書舍人蔡肇撰墓志言其自為童時不敖肆捉筆為詩語出輒驚人自揚子歸閉門讀書不問有無生計益落豫數過君頺垣朽屋草棘蔽道破籬風雨旁舍蕭然而君酒後耳熱抵掌極談辨説古今道理人物成敗落落可聽百家諸子旁行之書無不博記至於文章瑰奇偉異之變以意逆志往往入微尤刻意於為詩長篇短句倚紙即就清新雅麗有元和間風格讀之使人不懟不激不知其貧且病也噫君所養可知矣自號練塘真隱因以名其集君天資夷曠內外粹和周人急難聞善如出之已白首窮居蓋二十年如一日客嘗有勸其仕者君謝曰泰而拘約而肆以此易彼豫未知所得償所亡也客慚而去以元符二十四年無疾而終享年五十七子繪中紹聖元年進士第終奉議郎諸葛賡字君俞丹陽人五舉於鄉皆第一慶厯二年附楊置榜出身出官為英州真陽湖州德清尉饒州樂平簿宣州旌德撫州宜黃令年六十四告老以太子中舍人致仕後遇霈澤遷殿中丞既歸闢其居之側為圃開竹之蒙密為洞洞之外為亭亭之側為池珍卉環之總而名之曰歸休而自謂曰熙真子熙寧丁巳享年八十有五矣無疾一日牽筆書偈云上天下地極髙深幻化無蹤何處尋山靜白雲歸洞口水清眀月落波心閣筆而卒樞密直學士錢藻志其墓曽孫材政和壬辰上舍釋褐終左朝奉大夫通判泰州松宣和六年擢第繼試中教官終東平府教授材之子浩字廣聲孫鑑字大智同登淳熙辛丑進士第浩終江東安府司幹官鑑終臨安府録事參軍松之子淵字振聲擢乾道二年進士第終處州松陽令即今大華諸葛之族王存字正仲丹陽人案宋名臣琬琰録載曽肇王學士存墓志云其先金陵人後徙潤州之丹徒又徙丹陽與此書詳略互異年十二辭親從師問學于江西五年而後歸時學者並尚詞章獨喜為古文登慶厯六年進士第厯嘉興簿上虞令密州推官修潔自重為歐陽公修吕公公著趙公槩所知以公著薦入為國子監直講以趙槩薦召試擢著作佐郎館閣校勘集賢校理史館檢討知太常禮院案東都事略載存厯嘉興簿之後即云為國子監直講其間厯官上虞令密州推官均不載與此書詳略互異又宋史但載國子監直講至太常禮院官階而其為國子直講以吕公著之薦擢著作佐郎以趙槩之薦則此書為詳可以補宋史本傳所未備又考曽肇王學士存墓志銘稱存為史館檢討知太常禮院在就除檢詳兵房文字之後此載在前與曽肇所撰墓志銘異又考名臣奏議載存所上神宗乞收百官轉對卦章留中採擇疏在熙寧四年時存為史館檢討知太常禮院此書及宋史東都事略本傳均未載存故與王安石厚安石執政數引與論事意有不合謝不往入樞密院編修經武要略兼刪定諸房條例就除檢詳兵房文字案此書載存編修經武要略宋史及東都事略本傳俱不見惟宋程俱麟臺故事云熙寧三年十月詔館閣修勘王存顧臨祕書省著作佐郎錢長卿大理寺丞劉奉世同編經武要略兼刪定諸房例册此條可為此書確證宋史及東都事略皆失載此書専載王存不及顧錢劉三人又可以麟臺故事補其佚辭不就嘗召見便殿陳時政神宗察其忠實鄉意用之以為國史院編修官修起居注乞復唐貞觀故事左右史執筆隨宰相入殿神宗韙其言先時左右史雖入侍立而奏事必稟中書俟旨存因對及之詔左右史許直前奏事自存始眀年以右正言知制誥同修國史判太常寺官制行帝切於用人存請自熙寧以來羣臣緣議論得罪或詿誤被斥而情實納忠非有大過者皆隨材召用擢以備官使又言赦令出上恩而比嵗議法多請不以赦降原減官司禁謁本防請托而弔死問疾一切杜絶皆非便執政見之不悅案涑水紀聞載慶厯三年九月諌官蔡襄上言兩府私第母得見賔客若欲詢訪天下之事采拔奇異之材許臨時延召詔不許見賔客致和二年七月翰林學士歐陽修又上言兩制以上毋得詣兩府之第與此書所云官司禁謁本防請托正合而此書載存上言弔死問疾一切杜絶非便與涑水紀聞可以互證除龍圖閣直學士知開封府中貴建言居民盜鑿汴堤以自廣請責培築如初又請民廬冒官道者悉撤去詔下人情恟恟存曰此吾職也入為上言得中止在職二年囹圄再空進樞密直學士案趙汝愚國朝名臣奏議載元祐元年閏二月存上哲宗乞別詳定制科考格疏時為樞密直學士此書及宋史東都事略本傳俱不載改兵部尚書轉户部求裕陵財費不踰時告備宰相蔡確以存不附已徙之兵部太僕寺請內外馬事得專達毋𨽻駕部存言如此官制壞矣先帝正省臺寺監之職使相臨制不可徇有司自便而隳已成之法元祐初還戶部因辭不受拜尚書右丞遷左丞韓維以詆范伯祿罷門下侍郎存以為失一正人天下失望於同列中論救最力案名臣奏議載存上哲宗論韓維不當罷門下侍郎疏下注元祐二年十月上時為尚書右丞此書載其事在遷左丞之後與名臣奏議小異又論杜純不當罷御史王覿不當罷諌官有建罷畿內保甲者存言今京師兵籍益削又廢保甲不教非為根本計案名臣奏議載存上哲宗乞依舊教畿內保甲疏首云臣伏見范純仁劄子奏畿內保甲乞今後更不教閲云云考范純仁于元豐八年九月上哲宗乞揀閲保甲劄子稱貧民赴縣教閲一月為不便即于是年十二月詔府界三省保甲第五等兩丁之家並免冬教故存以元祐四年上此疏但名臣奏議稱存時為尚書右丞而是書則載在遷左丞之後彼此小異四方奏讞大辟刑部援比請貸都省却之存曰此祖宗制也且有司援比欲生之朝廷破例欲殺之可乎時河決而北幾十年水官議還故道存曰故道已髙水性趨下徒費財力恐無成功與范純仁議合卒輟其役蔡確以詩怨訕為吳居厚所奏朝廷議罪存不以確前事為意案宋史本傳云存徙兵部確之力也與此書所云確前事可以相證范純仁力爭以謂言語罪人虧國大體確再貶新州存與純仁亦罷以端眀殿學士知蔡州資政殿學士知揚州用故相例得嵗時過家上冢出賜錢給鄰里具酒食會父老鄉黨榮之召為吏部尚書案容齋三筆祖宗朝曽為執政其後入朝為他官者甚多自元豐改官制後但為尚書王存嘗為左丞復拜吏書蓋即指存自揚州召用也時在廷朋黨之論方熾存言人臣朋黨誠不可長然不察則濫及善人慶厯中或指韓琦富弼范仲淹歐陽修為黨賴神宗聖眀不為所惑今日果有進此説者願陛下察之由是復與任事者戾丐知杭州案宋名臣奏議載元祐三年五月王覿罷存即於是月上哲宗乞眀諭朋黨所在疏云臣今月十八日同三省延和殿奏論王覿罷諌議大夫除外任差遣事伏蒙陛下諭近日朝廷實有朋黨臣與吕大防奏陛下所謂朋黨乞眀示臣等既而不蒙宣諭國家慶厯間亦有朋黨之論當時富弼韓琦范仲淹等頗遭排擯賴仁宗盛德不至傾害云云是論王覿之罷與乞眀朋黨所在當同為一月內事而此書載存論王覿不當罷諌官在遷尚書左丞之後與名臣奏議所云元祐三年五月存時為左丞正合載乞眀朋黨所在疏則在知蔡州揚州及召為吏部尚書之後似二事相去前後當以年計不止不同一月也與名臣奏議互異又考曽肇王學士存墓志銘載此疏亦在召為吏部尚書之後與此書合與宋名臣奏議互異紹聖初告老言者論其嘗請棄去西夏故地殺其恩以右正議大夫致仕再論又降通議大夫案曽肇王學士存墓志銘云後言者論公嘗為謝景初辨理罪名又降通議大夫可以互證又墓志銘于降通議大夫之後又云今上即位連進左正議大夫與此書詳略小異每念近世學士大夫貴為公卿而祭祀其先但循庶人之制及歸老築室首營家廟建中靖國元年薨年七十九案墓志銘存葬丹徒義理鄉仙風里存天性寬厚儀狀偉然平居恂恂不為詭激之行至其所守確不可奪司馬光嘗曰並馳萬馬中能駐足者其王存乎顧方丹陽人皇祐五年登進士第再調眀州象山令始至召邑父老詢民利病及其善惡善者勉之惡者戒之又進學以教其子弟暇日親為講説踰年民大化服俄而方病邑民相率禱於塔廟者千人弗痊則用蕃夷之俗為臠股肉者十三人方竟不起百里內號泣思慕為之立祠錢君倚胡完夫皆為方記其事刻石祠中士大夫以詩頌遺愛者不可勝紀陳輔字輔之丹陽人其先自九江來居少負俊才不屑事科舉文辭雄偉不蹈故常尤工於詩自號南郭子人因稱南郭先生嘗題所居云湖水山雲繞縣斜茂林修竹野人家宿酲過午無人問卧聽東風掃落花或誦之於王安石安石稱詩甚佳但落花無聲宜改聽為倩字由是出入安石之門安石厚遇之一日題安石所居壁間云北山松粉又飄花白下風清麥腳斜身是舊時王謝燕一年一度到君家安石和之云南郭先生比鷾鴯年年過我未愆期休論王謝當時事大抵烏衣只舊時一日安石喪馬為之設齋輔之作詩戲之末章有含識應為獅子去却來重載法王身之句安石和之末章云隱几先生未忘物葛陂猶問化龍身其他唱酬甚多見南郭集中蓋有臨川集所不載者一時名流蘇公軾鄒公浩蔡公肇沈公括皆與之遊方其年少有志當時嘗著梁父牛角二吟題於沈山寺壁其梁父吟云梁父吟泰山之頂可埋金噫嘻蜀道徒﨑􅋂南風來舜琴梁父吟佳人未偶頻傷心四時有恨秋偏深緑絲空滿簮比其老也復為詩號悲昔逰以致命遂志云其詩文自治平至元祐二十卷為前集自元祐抵政和二十卷為後集輔不娶無子嘗語蘇軾曰我罪人也軾曰有猶子乎曰有軾曰魯山道州乃前比也輔笑曰陶彭澤不解事忍飢作詩曰賴古多此賢不知古賢能飽人否軾大笑
