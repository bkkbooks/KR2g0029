body:
  text: 京口耆舊𫝊巻九顧奎張縝侯晏崔耕李拱趙善澤劉䝉慶子宰顧奎字應文丹徒人㓜徙金壇好學篤行後進師尊之心地坦夷不立城府而著太一兵機一書凡二十篇以天道叅人事極其機變自㓜淳澹不蓄妻子行年六十猶有嬰兒之色而所著歌詞清新綺麗散入筦絃遇人無少長貌必恭氣必和而達官貴人一語不合輙拂袖去紹興中故人有位樞近者念其貧㑹戚方統軍京口以奎託之戚甫至即遣人迎致辭不往戚不得已自往謁之謝不見戚慮孤樞近之託則饋以尊酒緡錢各百曰以代䞇幣奎對使者曰歸語而主吾家金壇以汝比賊故里之老㓜肝腦塗地吾書生恨不食汝肉安能受汝遺乎使者懼不敢聴亟負酒幣歸三舉禮部一入太學俱不第乾道中以特恩對大廷授迪功郎縣尉未上淳熙初年卒張縝字彦智丹徒人後徙金壇其先自灃陽來居祖子方由進士第厯知臨潁冦氏丹稜開封四縣光化軍判建昌軍以太常少卿奉祠卒塟丹徒長樂鄉王安禮為作墓誌縝少嘗與詩僧仲殊唱酬蘇軾見而稱之以祖廕入仕為平江府長洲宿州臨渙尉亳州永城丞建康軍節度推官改秩知廣徳軍建平縣江寧府溧陽縣二邑之人皆徳之以親老不樂逺宦乞監延陵鎮所居金壇距延陵無兩舎逺奉板輿往來從容禄養荏苒五年葢不知其地之僻位之卑時之久也代還擢軍噐監簿再嵗為丞恬靖自守誓不登權貴之門故連嵗不遷以親疾告􅖍不候報而歸有㫖放罪旋丁内艱服除通判和州倅和之明年當金師大入盗賊四起實攝州事時承平日久守備闕然縝聞故將王逸坐廢僑寄郡境即以禮致與議城守賊至輙敗時京東西諸郡俱為盗區獨厯陽孤城堅守聞者駭歎郡發勤王之師縝以主憂臣辱義不徒全欲提兵入覲百姓遮道不得前京城失守諸道潰兵入境動以萬計縝勉以忠義資以餱糧濟以舟楫皆投戈南渡復為善良及受代郡人詣闕丏留而縝以疾得奉祠去去未兩月而城陷後賊帥張遇受招赴闕時宰問識張和州否遇對使此公在某等安敢輕犯其境耶朝廷熟其治行差知和州力以疾辭㑹錢塘軍變事定而守倅須才以縝通判杭州縝不敢辭至未兩月再差知和州兼淮西兵馬都監有㫖不許辭避既渡采石和之士民驚喜感泣扶老擕㓜闔境出迎既下車令不煩而民畏兵不試而盗息以疾三上祠請最後有㫖以和州正頼守禦不許丏閒明年翠華南幸敵騎扣江𤓰州路絶淮揚屯兵輻湊郡下衆號數萬動輙乖忤人情惴恐潰將王徳者亦擁衆扣城縝察其可用單騎出見與論王室之艱危握手號慟徳遂感奮願效死軍費不給移用貢緡數萬僚吏更諫縝以身任罪衆莫得云時敵寨近在六合烏江之間而賊黨張立張彦輩衆各數萬直抵城下縝與王徳晝夜攻守卒殱賊黨敵亦望風退卻明年春發王徳全軍赴闕除縝直祕閣淮南西路提㸃刑獄公事縝去未幾和復為酈瓊所破夏四月召赴行在陞直徽猷閣知夀春府兼管内安撫使以疾未行秋七月改知揚州主管淮東安撫司公事時駐蹕金陵恃揚為屏翰朝議難其人乃命朝臣公舉宸翰親㸃其名比入對存撫甚寵且以奏疏切於事宜掲之通衢縝既受命遄驅赴鎮不復過家秋八月至郡承兵火之餘戸不滿百縝招徠有道流民麕至商旅阜通冬十一月敵帥烏珠陷建康長驅入浙所至郡邑一邑奔潰明年春尼瑪哈復遣託雲貝勒等自楚進圍揚州以為聲援朝廷知縝力不能支詔許退保鎮江而縝誓以死守火及北門亦屹然不動敵不能克遂至真州時趙立守楚薛慶守髙郵所部皆握兵武臣難于控御縝傾誠待之問遺不絶間以捍敵之功來告即為保奏旋被上賞以此維揚有警諸郡樂為之助夏四月烏珠回至鎮江為韓世忠所困案宋本紀建炎四年三月丁巳金人至鎮江府韓世忠屯焦山寺邀擊之又考金本紀天㑹八年三月宗弼及宋韓世忠戰于鎮江不利則是烏珠已于是年三月回至鎮江為世忠所困矣與此書所云夏四月回至鎮江為世忠所困互異又考宋本紀四月甲申韓世忠駐軍揚子江要金人歸路屢敗之烏珠走建康丙申世忠及烏珠再戰江中世忠敗績葢世忠于四月再敗烏珠乃更為烏珠所敗耳金本紀于四月但書世忠敗績不書烏珠之敗葢没其實明尹洙宋元史質並沿金史而誤此書稱四月烏珠為世忠所困以考金史及宋元史質又為覈實矣諸將莫有應者惟縝自揚遣師控扼要處使世忠專意江面雖烏珠以計遁而世忠所俘獲亦不可勝計迨回蹕㑹稽方知維揚尚守上意嘉歎進直寳文閣郭仲威自陷平江引兵而北所過殘虐既渡𤓰洲縝即單騎見之輸以腹心仲威感其義駐兵城下秋毫不犯七月召還朝行次毘陵維揚即陷趙立薛慶死之案宋本紀建炎四年七月庚辰薛慶及金人戰于揚州城下死之九月丙辰金人攻楚州趙立死之據此則立之死也别由楚州之陷亦不在七月此書稱維揚陷立慶死之并二州之陷為一事與宋史互異縝以國勢之危積憂致疾歸卧彌年遂丏休致紹興改元疾有間除知建康府充江南東路兵馬鈐轄仍命入對既至宰相前期入白上曰是向知揚州人物修偉者耶㑹昭慈升􅜯詔趣之官縝感上知益思捐軀報效始至當敵人及冦盗蹂躪之後井邑蕭條財賦窘匱縝至未幾即葺城隍治宫室廣儲聚以俟時巡時劉綱王冠提軍駐外邑互相吞噬境内騷然縝至即還劉綱于舊鎮而納王冠于城中由是二人之爭得息縝自攝守和州時得疾後雖旋愈而頻年屢作至是復上章丏祠亦㑹朝廷議置大帥于金陵十二月除提舉江州太平觀明年九月卒塟縣西方山之原年六十三縝度量豁達意氣誠篤飲酒至斗不亂與弟紱友愛甫得任子恩即以及之有司不可至于懐牒泣訴持表扣閽得㫖特依所乞縝既没妻子猶奉治命以遺恩官紱之子早嵗連蹇不偶未嘗有滯淹之歎晚節受任於危難之中奮不顧身三典㑹府子弟皆在機幕朝廷許上守禦功差次行賞而終不挂諸子名其間平居不問生計雖衣衾亦無餘前年陛對乃治裘袍歸而封緘曰留以送終竟以是斂其操尚如此侯晏字齊彦金壇人家世京兆萬年父恪建炎中游宦南來紹興十四年始奠居晏為人矜莊言動不茍字畫勁正喜為詩尤長于古樂府以風流文雅受知當世王侯之家爭館致之父任入官注嶽祠監鎮江大軍倉門淮東茶鹽司幹辦公事行在文思院未上卒有文集藏于家崔耕字莘父丹徒人後徙金壇早游上庠文名籍甚升上舎擢紹興三十年進士第案元至順鎮江志耕登紹興三十一年進士三十一年非科期此書得之再為郡教授改秩知江州徳化縣淳熙八年卒于官無子耕資禀淳厚多讀書知古今故雖場屋之文皆有本源授徒金壇寓舎從之游者多決科云李拱字應辰金壇人其先唐宗室家𫝊唐誥數十散在族問禇遂良李林甫姚崇宋璟諸人書名誥尾字皆掌大墨色如新紹興十二年其族父巨源字元通由舉首擢進士第文名盛于一時拱擢乾道五年進士乙科為平江府常熟簿再調鄂州咸寧令未上丁内艱服除調臨安府臨安丞淳熙十一年再中博學宏詞科後三年卒于臨安案元至順鎮江志拱登進士第淳熙十一年再中博學宏詞科厯常熟簿鄂州咸寧令臨安丞卒于官據此書則調臨安府丞之後始中博學宏詞科後三年仍卒于臨安較至順鎮志為加晰拱博學强記其詞科試文該洽富贍後來所不及臨安秩滿且召試矣未及而卒趙善澤字守道寓居金壇登乾道五年進士第任平江司户湖州録事叅軍自少莊重端慤不妄言笑未第時貧不自聊鬻妻裝具得錢百緡出貸市人計息以自給榜帖甫及門即盡蠲之忍貧以待禄執親䘮所居堊室足不履閫閾妻疾立戸外使人問狀而已燕居獨處儼然持敬如對賓客朋友雖亟見揖必恭雖小夫孺子皆接以誠意左右圖史司馬程張氏之書不去手以劉向列女傳等日使妹與其妻諷誦宗室子孫官有廩餼戒無得預族人有冒禁以倖利者輙戒門以絶鄉之先生長者皆願與之交扵朋友忠告不倦後生有過失輙自愧恨曰得無為趙君所知耶案劉漫塘集吉州王使君夫人蔡氏行狀云使君有畏友曰趙君善澤嘗為湖州録事㕘軍清介直諒夫人常以過從之踈數驗使君之徳進否毎二君相與款宻夫人喜見顔色曰庶矣其内夫子于善而警其失也可與此條相證在官廉公不私莫能奪其守而疾惡良甚部使者郡守見必竦然起敬平江府添差司户柴某貪濁善澤疾之反以見讒罪去為録事三嵗晝夜獄庭未嘗歸私室非休沐不謁竟以是得疾卒士論惜之劉䝉慶字茂先六世祖守節值五季亂自滄徙潤居丹陽塟縣郭草堰之東邑人張溥誌其墓生日新日新生昱昱生瞻字去華試將作監主簿娶刁氏學士約堂弟縞之女垂死作偈語極超詣刻石于家南郭先生陳輔誌其墓監簿生蘋字伯明入府學陞内舎娶邵氏樞宻亢之姪自内舎以上皆塟丹陽曰老村扶神丁義楊西内舎生杞字成徳即居士之父始遷金壇塟方山之原初居士與兄嗣慶字繼先齊名友愛尤篤皆以文行為鄉先生兄且死語居士曰吾家世塟丹陽而吾父母塟金壇吾與汝俱塟丹陽則子孫與吾父母之塋必疎俱塟金壇則吾先世之松楸又可知矣吾與汝分焉未幾兄卒袝于先祖故居士塟方山之麓距先塋五里居士之没奉直大夫知吉州王公萬樞狀其行今不敢述恐累于私不足以光潛徳云子宰宰字平國其先本滄州景城人國初徙丹陽其後徙金壇髙祖瞻安定胡先生髙弟主將作監簿曾祖蘋内舎生祖杞鄉貢士父䝉慶號雲茅居士用累舉恩對策集英以公贈朝奉郎公天資剛大正直明敏仁恕其納善改過之美興利除害之志與夫取舎之分明去就之明審已見于少而為士之日嘗大書于壁曰困窮即是亨通日肯為毫釐枉尺尋葢其趣操已早定矣兩貢于鄉俱第一其就南宫也親舊餽贐郡邑資送誓不以一孔自汙登紹熙庚戌第調建康之江寧尉始至置三帙一曰受委以籍符移之至自臺府者一曰受詞以籍牒訴之闗于職守者一曰追㑹以籍帖引之下于鄉都者日治事已即手自勾校吏不能欺而事無不理江寧巫風盛行公下令保伍互相糾察往往改業為農甲寅之旱帥守命救荒多所全活屢獲巨盗當上其功率拒不受賞雖一命為尉毅然以百里風教自守帥守張公杓舉公之詞曰學為有用事不詭隨初公與同志者歎世道之薄相約終任不求舉獨公與上元尉朱睎顔終始不渝張公既舉公因語之曰總漕以不屑干已為疑須君及門皆具剡上幸一往焉公謝曰某三年不求舉終乃求之豈不内媿其心外媿其友耶況以尚書有言而許猶須某及門而發亦非特達之知矣竟不往調真州法曹掾臺郡倉庫皆法曹所領公出納明允雖太守不得専守有貪墨者屢延公以後堂之飲若將有所欲言酒二三行公輙辭去守將代去又為具甚盛設且以家奴執事甫一酌薦書出袖間公力辭色厲言温守竟不能私㑹漕司以朝㫖下州責有出身任人狀稱不係偽學不讀周程氏書方許充考試公曰平生所學謂何首可斷此狀不可得也遂獨不與差是時學禁嚴切上下迎承公知時不可仕而為養不可已賦詩云錦城不似還家樂獨立津頭欲問船丁雲茅憂服除入京黙觀時勢不樂仕領嶽祠以歸所至未甞覓舉非其人雖强委不屑受嘉定更化以堂審召命且再下不至時相亦屢諷執政從官貽書挽公公峻辭以絶黃公度制置江淮屢書挽之入幕公曰君召不往矧可為帥府屈辛巳之夏俄取考功厯題百餘言以述其志案劉漫塘集有先祖十九府君墓誌其末云官厯江寧尉真州司法㤗興令開禧間入浙東幕病免此書于真州司法之後不書㤗興令及官浙東幕當以墓誌補其闕自是束冠裳而髙閣之幅巾短褐種栁植蓮于雲茅西偏之塘名塘曰漫自號漫塘病叟塘之湄有田數畝親課種藝結廬三間疎籬曲徑穴牆為門不容車馬雖設常闗鄉曲親朋剥啄得通郡官行縣求見有踰牆而後得入者縣官非數四至不得見非數四見不往報謁其報謁也不乘車不具門狀惟一僕俱持刺曰邑民劉某拜見絶交中朝及四方通顯者書有先施者答緘具所自號稍尊則稱丹陽監司郡則曰部民獨章泉趙公以出處之合詩筒嵗時相往來常時以經史大義授子姪合里之士友講學㑹課月有成規後生有賦詩者俯與唱和朋來逺方茍挾富與貴雖伺候信宿不得見見則因其所挾而教告之志學之士執弟子禮雖辟易不敢當有可與語者充然各足其分館遇留連不厭其久置社倉而糴估平創義役而爭訟息三為粥以與餓者自冬徂夏日食幾萬餘人而凶年免于死亡薪粟衣纊藥餌棺衾之屬皆汲汲經理如已之責某橋病涉某路嶮阻雖巨役必捐資先倡而程其事公生理素薄而見義必為有如此者他如定折麥錢額更縣斗斛如制之類凡可以白于有司利于鄉人者亦無不為也上初即位渴注名譽除令籍田辭改通判建康府又辭除直祕閣主管仙都觀端平元年陞直寳謨且盡還磨勘嵗月使轉官案漫塘集辭免除直寳謨閣宫觀及磨勘年月日第一狀稱三十年久侣漁樵姓名不入考功之籍而令計在家年月進秩則非所以序功與此書所云盡還磨勘嵗月可以互證未幾除奉常丞需章五上郡太守以朝㫖趣行不得已勉就道案漫塘集有辭免除直祕閣宫觀三狀又有辭免除寳謨閣宫觀二狀此書于他官遷擢皆書一辭再辭而于此二官皆不書辭以集考之當屬闕漏至吴門拜疏徑歸一時譽望收召畧盡當宁側席以問御史王遂且俾宣諭除將作少監再辭未報鎮江防江軍作亂自邑而郊焚掠甚慘睥睨金壇闔邑奔避公獨與家人寧居激尉任事集近郭隅兵備之號令調給皆公主之事上聞朝廷援廣東近比以鄉郡屬公命出復寢除直敷文閣知寧國府皆不拜進職顯謨奉祠玉局至嘉熙改元又令赴行在奏事謂諸子曰吾本以病棄官一卧三十年晚節末路少有不謹必為萬世誚速死幸矣案漫塘集有辭免令赴行在奏事狀此書載宰謂諸子曰云云葢辭免時語也以集考之則此條益見根據年七十四以疾終于家案漫塘集辭免除將作少監第二狀有曰寳慶御極有籍令之除又考漫塘集有辭免除籍田令第一狀有云年甫六十據此則寳慶元年宰年六十以此書卒年七十四考之則當卒于嘉熙三年遺命斂以深衣大帶圓冠方履鄉人為之罷市塟于邑之沙墅山走送袂相屬者五十里自逺來㑹者至無所館士祠于學農祭于社朝廷嘉其節賜諡文清實齋王公狀其行謂公有平治天下之實材有恩濟生民之盛心使嘉定致之以輔寧考恭儉之資則十有七年之治必不但如今日所觀寳慶元禩致之以佐今天子英偉之畧則十年水火盗賊之菑不治而自寢端平更化坐之臺閣之上則動靜有權操縱有度必能使君徳治道常昭若與士大夫更始之時以其本于踐履者可以推其事功以其著于家族鄉黨者可以想見其平治天下䝉齋袁公銘其墓亦謂其徳慮周宻才力精强坐之廟堂可以躋世三代付之方面可以折衝千里而拔乎流俗銖視軒冕隠處三十年澹如一日二公非私且誣者天下後世所視以取信云所著書有文集三十巻語録十巻藏于家子曰符曰汝遇汝進汝明
