body:
  text: 京口耆舊傳傳記類三總錄之屬提要臣等謹案京口耆舊𫝊九巻不著撰人名字明楊士奇文淵閣書目焦竑國史經籍志皆載其名亦不云誰作考書中蘇庠𫝊末云予家世丹陽先人知其狀為詳又從其孫嚞借家𫝊則作者當為丹陽人庠卒於紹興十七年而作者得交其孫則當為南宋末年人也其書採京口名賢事蹟各為之𫝊始於宋初迄於端平嘉熙間其中忠烈如陳東經濟如張慤張縝湯東野劉公彦風節如王存王遂蔣猷劉宰文學如沈括洪興祖書畫如米芾父子雖皆著在史傳而軼聞逸事則較史為詳至湯東野𫝊稱明受赦書至東野謀於張浚欲匿赦不宣而宋史浚本𫝊稱浚命守臣湯東野祕不宣其説互異証以劉宰漫塘集湯侍郎勤王録䟦乃與此書所載合則足以訂宋史記録之悮漫塘集稱陳東於欽宗時凡六上書髙宗時凡四上書宋史東本𫝊苐云於欽宗時五上書髙宗時三上書證以此書乃知宋史有據漫塘集為𫝊聞之訛王鞏甲申襍記謂陳亢以熈寕八年生廓與度證以此書廓中熈寕九年進士則距生歳止一年度中元豐二年進士則距生歳止五年尤足以糾小説附㑹之謬如此之類不一而足盖是書體例全倣正史每為一𫝊首尾該貫生卒必詳與諸家襍説隨筆記載不備端末者不同故事實多可依據於史學深為有禆文淵閣書目載是書不列巻數經籍志則作四巻今據永樂大典所載裒合成編釐為九巻考宋史地理志京口有丹徒丹陽延令金壇四縣神宗熈寧五年改延令為鎮併入丹陽則所存者僅三縣而此書吳致堯𫝊其人在宣和之季乃仍稱曰延令人盖沿襲舊名偶然失改猶漢髙帝十一年已改真定為東垣而南越王𫝊猶稱尉佗為真定人史氏駁文不足為據今仍以三縣分𨽻庶從其實至於諸書所載互有同異則併附載各條之下以資考證焉乾隆四十六年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
