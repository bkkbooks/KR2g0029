body:
  text: 京口耆舊𫝊卷六姚闢張諤陳亢子廓度等蔣猷丁權族孫可乆張慤王厚姚闢字子張金壇人祖宗朝士尚詞章闢獨究心六經義有未安必求其是早從歐陽公修學問亦以家近往來金陵從王安石質疑故修作獲麟詩贈之有曰世已無孔子獲麟意誰知我嘗為之說聞者未免疑而子獨曰然有如壎應箎又曰子昔已好古此經常手持超然出衆見不為俗牽卑聖門開大道夷路肆騰嬉則以春秋受知於修者也修又手書荅之云禮記雜亂之書能如此指摘其謬其功施後世無窮非止效俗儒著述求一時之名而已此則以禮記受知於修者也修荅焦千之書令其看闢詩說簽出長處則闢又嘗以詩請益於修安石荅闢書云觀所為文於理悖焉者希聞論衆經有所開發又曰足下固已幾於道姑汲汲乎則古之蹈道者將無以出足下上則所與安石反覆者殆徧諸經擢皇祐元年進士第授陳州項城令一時名士多慕與之交其至項城也鄭獬荅詩云膠西夫子近之官坐對春秋討隠桓自注云子張善春秋先是朝廷置局編修禮書嘉祐二年秘閤校理張洞奏禮官祠祭齋宿及預他局請擇州縣幕職官文學精贍者三兩人専置局編纂於是闢與蘇洵二人奉詔尋又以知制誥張瓌奏命㕘知政事歐陽修提舉至治平三年九月修奏書成詔以太常因革禮為名案九朝編年治平二年九月太常因革禮成此書稱三年與九朝編年互異又考歐陽修年譜亦作二年而歐陽修蘓明允墓誌則稱因革禮初奏上未報而君遽卒時治平三年也與此書合明年春授屯田員外郎應天府教授韓琦守相闢往從之㳺琦集中有送闢南歸詩所謂有客軒然襟義髙直自睢陽來一訪者是也秩滿通判通州卒𦵏本縣唐安鄉石門干之原内翰蘇軾以詩哭之云京口年來耆舊衰髙人淪喪路人悲空聞韋叟一經在不見恬侯萬石時貧病只知為善樂逍遥却恨棄官遲七年一别真如夢猶記蕭然瘦鶴姿其為諸公推重如此中更兵亂遺文散失惟詩六百餘首鄉人多𫝊誦之族弟夢升嘉祐間同五經出身官至殿中丞曰存許將牓進士出身族姪曰純孟馬涓牓進士出身時為縣者皆稱長官二人𦵏金壇至今鄉人呼曰姚長官墳夢升之後虞卿登紹興五年進士第位不達闢之後曰愈甞為御史中丞以徙居不載張諤字直甫金壇人祖倜字大方登慶厯二年進士終屯田郎累贈中大夫號廉能吏父君奭君奭之弟君胄君奭字鳴道從安定先生胡瑗學瑗奬予之異於流輩累薦不第父欲以澤及之辭不受以特科調漢陽軍漢陽尉遷房州竹山令以嫌去官再授池州石埭令在任引年告老以朝奉郎致仕諤官於朝將漕於京畿江東皆迎侍以行極甘㫖之奉以崇寜四年卒呉益柔為撰墓誌君胄字世賢一字元魯登元豐八年進士第為江寜府上元尉再調潭之湘鄉令治聲流聞用薦者改秩知河南府伊陽縣蔡肇為作墓誌稱君胄任伊陽時肇為衞尉寺丞往見之曰君罷湖南官貧不能歸今宜擇便地以規廪入湖洛相去千里而伊陽又洛之窮邑也君何就焉君胄曰固也某以詩賦經義七上於禮部僅乃一得酸寒覊旅憔悴困厄之日久方是時私竊自念以為變服持版號稱名士足矣今幸得官又以舉者名在尚書選俸雖薄足以自活地雖逺不徒行也人豈不自知使或不第尚當槖書挾徒呻吟唲嚅以求斗升寜能髙飛逺走不在人間邪夫有求適獲求之不巳常物之情豈有既乎肇愧其言元符二年到任未幾卒諤君奭之長子擢政和五年進士第入朝為度支郎中累遷左中大夫出為京畿轉運副使徙江東政和六年九月除右文殿修撰權知桂州軍州事充廣西西路兵馬都鈐轄制云朕撫有方夏陟禹之迹仁不異逺悉主悉臣眷言樂附之心宜盡懐徠之道繼時擇帥尤在得人爾智識疏通風猷敏劭已試之績所至有稱敢為之才雖難必往班於書殿鎮此桂林其體予懐以惠南國秩滿再奉祠靖康元年卒自將漕江東因寓居東陵故君奭及諤皆𦵏金陵惟君胄𦵏金壇之酉干君胄死無後諤之孫猶有居酉干者陳亢字退叔金壇人少讀書以父疾不任家事仍請於師束書歸養殖貲治産家用饒衍而勇於為義不吝施予家居邑南地多沮澤古速瀆久淤壅水為災率衆築堤延袤十許里以便行者而浚瀆以通洮湖水患遂息熙寜乙夘嵗大饑明年疫傾家之儲粥餓藥病晨夜必躬所活不可勝計不幸死者具衣槥収𦵏又數千百人嘗自以少時為養廢書課子弟學尤力一夕大雪往視則二子寢矣亟呼之起曰吾不强汝以書汝宜出行道上遇行者則歸以告二子奉命出門十里遇販夫負魚而趨二子問雪寒何自苦曰負販吾業也一夕不行則生理躓矣二子感悟歸而自勉晨夜不休亢亦奬勸有方雖衣服飲食之間皆有品節及廓為監司度陞朝亢尚無恙累封朝散郎而彦明之子珹亦擢進士第餘孫數上名禮部亦有巳命官者福禄之盛世所歆艶蘇公軾嘗有帖云退叔今年四十五而有四子兩人已登第守官其叔耕且學其季游上庠藝業精甚有男女孫十四人元孫之孫古人所不知若陳君者當見所不知何人也鄒公浩以序送其孫瑭試禮部亦云金壇有君子人焉今以承議郎致仕其少時不出户庭而環千有餘里若寒饑急難失所頼以無虞數十年間不知幾人仁義之聲飛馳東南是生二子皆文髙學博趨操堅正甫冠登第盛年即顯又稱其諸孫之賢謂承議之徳厚積而發三世矣老子曰天道無親常與善人於承議見之盖浩作序時亢已封承議矣大觀元年卒年六十八亢二子曰廓曰度諸孫之著者曰城曰瑭曰璿曰璘元孫從古兄弟之子曰序孫曰㮤廓字彦明年十七與鄉貢中熙寜九年進士第主句容簿再調長社令辟江東運司主管帳司改秩知吉水縣改楚丘縣古芒碭也盗發坐繫者百人一夕乘守者怠脱械持兵欲殺令而肆掠人情恟懼彦明不為動徐部分吏卒格鬬獲其為首者斬以徇餘黨猶時時倡言以撼居民彦明募致其尤桀黠者并嚢橐之家破除之一境大治提刑羅適以治水自任至縣欲有所為彦明知無益即抗言曰此白圭之術也適慚而去除都水監主簿遷北外丞以職事入奏哲宗察其才諭以行召用矣大名帥决河入澶州故道以紓魏患澶人大恐公為之増堤浚防水入無患兩州以安出知處州案宋職官志都水監置局於澶州號曰外監元豐正名置南北外都水丞各一人紹興九年始置南丞於應天府北丞於東京應明此時為北外丞正在澶州監局然雖置局於外仍𨽻在京都水監故其知處州此書特標云出知處州可與宋志互證嵗饑賑救有方移廣東路轉運判官時同列多以獻羨財進用彦明曰財民力也有羨當還以及民可剥民以為已利乎奏罷徐惕所興錢監民以為便汰假版吏案假版吏三字名義不見於宋職官志惟燕翼貽謀録有改假版官一條云太廟齋郎復改為假將仕郎此書假版吏與彼所云假版官名義畧同後漢書百官志有假吏鄭康成士冠禮注云若今之假吏盖皆吏之冗可汰者此書稱假版吏名義亦本此以保任法選用士類外選為清就移本路提㸃刑獄禁雷公滛祀以正風俗罷庾嶺置闗以示無外召還篋中無南物丁内艱服除授廣西路提㸃刑獄未行改利州路予告東歸大觀四年卒年五十五有詩文雜説合三十巻子珹字伯成入太學升内舍中元符三年進士第主海鹽簿知錢塘丞丁艱知真州楊子縣未上政和四年卒年三十八瑭字仲修鄒公浩序送之所謂其形不滿五尺其志充宇宙與之語滔滔乎如秋水方至而東决者未第而卒珹之孫從古度字彦法年十九中元豐二年進士第案宋王鞏甲申雜記潤州金壇縣陳亢熙寜八年餓莩無數作萬人坑毎一屍設飯一甌序領紙四貼藏屍不可紀是嵗生廓又生度皆為監司孫登仕者無算可與此書亢本傳熙寜乙卯嵗大饑一條相證惟謂熙寜八年即生廓與度考此書廓中熙寜九年進士則與生嵗相距二年度中元豐二年進士則距生嵗止五年即可證甲申雜記之誤又案元至順鎮江志度登元豐二年進士與通考所載科期合此書原作三年誤為江寜尉從學於王安石安石嘉其有志不倦以告之秩滿調杭州録事叅軍時蒲宗孟熊本相繼為守號剛嚴帥事有過差下莫敢辨度數與爭是否二公更竒其能薦進之嵗滿改知江寜府句容縣開封府太康縣湖州烏程縣烏程嵗課有羡法當受賞嵗終上課輙除去使僅及額而止曰無寜計一身之私而為方來之害選為鴻臚寺丞遷諸王府記室卒度性清謹自奉至約日茹素未嘗妄費一錢惟䘏孤振乏則雖費不計子璿擢紹興八年進士第未改秩而卒姪璘字季文登紹興十二年進士第厯婺州義烏丞知海鹽縣通判池州卒居官有賢譽能詩世其家與蘇後湖庠游尤厚從古字希顔紹興二十一年中進士第由富陽尉用賞改秩為邵州教授監行在榷貨務都茶場丞相虞允文問嵗終出納幾何從古曰國家利源醝茗居半自合同闗子行遂虧常額允文授簡都堂俾述所以於是闗子罷而嵗額驟増因命措置浙西鹽事擢司農寺簿罷歸起知蘄州赴闕奏事上猶記務場之功奬之曰卿書生乃能通世務到郡朞月擢提㸃湖南路刑獄至衡有囚被誣更三赦不宥從古奏釋之就除本路轉運判官専任荒政論功加直秘閣京西謀帥上閲諸道監司職名指從古曰是有才無以易之擢知襄陽府即奏言朝廷以襄為上游重地増陴益戍緩急許調鄂師善矣但節制不一莫知適從紹興隆興間嘗命荆鄂兩軍分地而守權均力敵各行其説迄無成功今若合為一軍命正副帥以其正屯武昌而副屯襄陽時許往來更戍庻號令歸一無敢首䑕疏入即以呉挺為荆鄂都統制而以王世雄副之明年以言者罷奉祠自是擢知衢饒信三州案元至順鎮江志從古厯知衡饒信三州與此書衢饒信三州異衡衢或以字體相近而誤皆不果行淳熙九年卒從古喜作詩好古物法書名畫尤愛陳去非詩和之終編又裒古今詠梅自宋鮑照以下古律千餘篇盡和其韻乾道中車駕閲武近郊進詩五十韻淳熙中駕幸秘閣進詩百韻上皆嘉奬之周公必大為作墓誌序字彦育亢之兄子不事科舉而工於詩一時鄉曲蘇君庠譚少卿知柔以能詩聞序皆與之游娶㓂氏實萊公凖之裔紹興初思澶淵之功録凖後無在者補序封州文學部注楚州寳應尉以邊事方殷罷文吏之為邊尉者改監行在𣙜貨務都茶場門任滿監行在惠民局繼任編估局紹興二十五年春兼權詳定一司勅令所刪定官滿嵗為真改秩簽書保寕軍節度判官所公事卒自號碧巖居士有詩集㮤字伯茂亢之從孫登紹興十二年進士第主寕國府涇縣簿闕至之官不忍違其親中道復歸欲遂丐祠親强之不得已乃行秩滿授平江府司理介然自守不求人知㑹鄉先生張綱入参大政綱愛其篤行薦之朝除勅令所刪定官改秩監登聞檢院兼幹辦審計司厯司農寺簿太學博士大宗正丞權尚左郎官以論事忤時相奉外祠差淮南安撫司参議官除知泉州卒㮤性醇厚事親篤孝行喪有禮嵗時薦享皆躬自滌濯既老益䖍奉兄姊甚謹賙宗族鄉黨有恩其徳行内外不異少長若一盖古君子云蔣猷甫冠擢元豐八年進士第主武進簿巴陵令改宣徳郎知江寕縣舉最遷秩為信州教授尋除監察御史為尚書膳部郎官遷吏部除宗正少卿兼學制叅詳官改太常少卿詔原廟立僖祖殿工既畢言者以為當廢朝廷下其議猷言有其舉之莫敢廢也今既奉安奏告矣柰何毁之執政怒送吏部差通判南安軍踰年直前議復職召試中書舍人出知廬州俄復召還詞掖案汪藻撰猷墓誌云坐鄧洵仁奪職出知廬州俄除集賢殿修撰復拜中書舍人與此書詳畧互異既對上曰卿國之老成朕未嘗忘也拜御史中丞兼侍讀案此上數事宋史本傳均闕書奏論士風浮薄今羣臣無他能惟以善候伺人主承望大臣為才或耿介特立守正不回則衆指為愚而非笑之此風大不可長且大臣當輔佐天子今奏事殿中惟務雷同畧無可否其欲稍自異者不過退有後言為中傷計此不可不察上嘉納在京百司自元豐皆𨽻六察崇寕中内侍省獨乞不𨽻猷論其非上曰既名有司不𨽻六察何也即以其言正之尋察内侍省數事以聞上寢其奏猷極論不可於是内侍劉友端等皆䧏官案九朝編年哲宗元符三年二月斥内侍郝隨劉友端先是上諭曽布曰禁中修造華侈太過云云未幾逐隨與友端據此則友端之降官由於哲宗特見似不因蔣猷之疏與此書互異又攷汪藻所撰墓誌乃此書之所本故均與宋史異因命大書其疏掲之内侍省其徒皆側目案宋史本傳稱猷論内侍省不𨽻臺察紊元豐官制楊戬不當除節度使趙良嗣不宜出入禁中上皆嘉納至掲其章内侍省據此書則所掲之章特涉内侍劉友端等其劾楊戬趙良嗣乃在此事之後與宋史互異與汪藻所撰墓誌合楊戬建節猷言祖宗時未嘗有此昨童貫首隳舊制當時士論不平上曰有非常之功則有非常之賞貫戰多不可以人廢猷曰楊戬何功上不荅案汪藻所撰墓誌云公徐曰楊戬何功帝曰自朕即位以來制作禮樂皆出其手亦非小勞公曰事塞其源則人無觖望若夫攀縁展轉人人有意外之得則所謂非常者反為常矣帝稱善者久之與此書所稱上不荅互異趙良嗣獻平燕書除祕書丞猷言良嗣降敵狂妄不宜出入禁中孟昌齡父子専防河之任事久不成公私騷然猷劾其勞費無益范之才奉使淮南還言滁水有鼎可出發民畎水鑿山役不巳猷劾其狂妄雖上意先定不能盡從而猷言論風㫖凛不可犯僥倖者亦因之退縮最後極言東南應奉之敝乞一切罷去因論提舉兩浙常平徐鑄以糴本錢畀漕司為製造費廣東轉運使徐惕以虗名羡財進奉後苑造作乞重寘典憲案劾范之才及徐惕二事宋史本傳闕書上怒遂罷言職丐去不可遷兵部尚書政和七年知貢舉改工部吏部尚書以徽猷閣直學士出知婺州丐閒奉祠宣和四年起知明州以不樂應奉事復奉祠而歸案猷於丐祠之後知明州復奉祠宋史闕書七年以刑部尚書召至則兼資善堂翊善值敵騎犯闕城守盡力既解嚴遷兵部尚書案汪藻所撰墓誌云天子命公特表候上皇時童貫總兵扈從有自疑心淵聖皇帝貶貫環衞竄池州因命公持詔往曰使貫退聴而毋傷上皇之心卿何以處之公頓首曰願陛下付臣勿以為慮淵聖皇帝喜賜縑帛茗藥遣行公及上皇在淮隂言國事泣下上皇亦泣因請間言童貫得罪天下今朝廷正典刑惟陛下俯裁上皇頷之遂宣詔童貫即日趨貶所公侍上皇還京師遷兵部尚書據此則猷之遷兵部尚書其功甚巨墓誌序此事較宋史為尤詳是書乃不載謹附録於此尋復奉祠建炎三年避敵於明州卒案汪藻所撰墓誌云建炎三年避敵明州明年十一月卒於昌國縣蓬萊鄉紹興三年𦵏於明州鄞縣翔鳳鄉隠學山之東岡因𦵏焉年六十六汪藻撰墓誌丁權字某金壇人唐末兵亂世為金壇守將六世祖袗字徳祥弱冠值偽呉祖楊行宻討黄巢以勇應募戰多為都押衙與田頵安仁義李神福皆為行宻愛將常隨行宻攻孫儒相遇於廣陵儒兵衆而不整袗謂行宻曰當為公破之出馬陷陣諸軍繼之儒敗被擒以功遷都知兵馬使行宻起羣盗性猜忍諸將功髙多見忌田頵安仁義相繼就戮袗不自安以病得歸求田問舍嘯傲林泉平生不殖貨不嗜酒不斥人非不掩人善故生於亂世而得明哲保身之義始仕偽呉厯五代至我宋乾徳元年卒年九十一權擢元祐三年進士第初任復州司理參軍有大獄累政不决能明其寃當路者喜而薦之再調宣州濰州都曹改秩為兖州教授入為太學博士時二蔡用事將以校官私其親權不可蔡怒權聞之亟上章丐外除淮東提舉學事秩滿再除河北提舉學事知汀州卒在河北時俾其家築室所居之南以教子姪牓曰訓義用韓愈符城南讀書韻作詩歸勉之族之子姪爭勸於學多由科舉進孫明字子公閉户讀書二十年家事坐廢手編事類曰千門萬户凡百巻諸史通攷二十卷著直説五十篇兩舉於鄉以特恩補官老不可仕奉祠家居年八十嘉定中卒鄉里私諡曰博雅先生可久字嘉㑹權之族孫擢乾道壬辰進士第為太平州蕪湖簿秩滿連丁内艱服除知揚州江都縣事以疾卒可久孝於親友於兄弟雖子姪亦未嘗名呼闔門之内如春風和氣其涖官嚴而於民常求以寛之其臨財廉死之日家無所留遺湯邦彦表其墓曰有宋亷吏云張慤字誠伯樂壽人家金壇元祐六年進士厯孟州録事參軍録事總財計異時河陽用度不足仰給漕司慤謂此不可常乃考覈財賦源流而剔除其蠧弊踰年郡計有裕漕司更頼其餘因行其法於他郡再調冀州録事参軍改秩就差河北都轉運司幹辦公事召對乞紓河北民力節中都財用且乞久專運使之任皆當時急務上納其言且戒之曰卿在小官中毎與監司爭議事公直聞於朝廷此節不可易㑹有以河北漕計為言者陞秩再差河北都轉運使主管文字時州縣類以匱告慤悉取諸郡財糓出入之數為之籍號曰河朔嵗計足用集其法以舊額總列於上析近嵗實出納之數為一列於次又析嵗中不時移用之數為一列於下凡三十四郡賦入之登耗利源之興廢用度之増損一開編而盡得之因得以通融有無遷北外都水丞先是河决冀州棗陽上埽害恩冀永静滄民田慤修寕化舊堤以禦奔衝又起清河兩埽疏雞𤓰河以導水勢使漸復故道明年果還北流復九縣民田以頃計凡三萬九千三百有竒嵗省調夫二十五萬又行視諸邑凡髙仰之地皆為直堤又得民田六千六百六十餘頃信都埽距冀城不逺一夕幾潰居民奔走慤躬走堤上督役晨夕不休隄卒無虞郡人徳之秩滿代去已踰月冀人叩閽請留不巳有㫖再任尋除南外丞又除都水監丞時孟昌齡父子並領河防宣和元年七月河溢濁流及汴慤附急置以聞昌齡劾慤張皇有㫖鐫官勒停且議逺斥㑹朝廷委官覆按如慤言即日復舊職昌齡坐禠官一等除軍器少監仍編類河防書尋遷軍器監東西坊卒名𨽻監中率充役公卿貴戚近習之家慤一日追回千餘人從左丞王安中宣撫河北河東燕山府路道除龍圖閣河北燕山府路計度轉運副使陞右文殿修撰專措置水運慤言河北根本之地轉輸燕山公私匱竭所當深慮朝廷置不問郭藥師以幽薊叛慤亟請選將繕兵屯白馬守盟津為王室之衞論者甚其言明年敵果犯闕河朔諸郡城守日久軍需悉仰於慤斂不及民既而退師除尚書户部侍郎欽宗議親征為行營隨軍轉運使金人北歸厯陳備禦之䇿朝廷不能用太夫人年益髙乞奉祠歸宣諭使种師道及諸司交章謂慤之歸是棄河朔遂除龍圖閣直學士河北都轉運使中原士人罹金人驅掠之禍挺身而歸者阨於㓂攘慤與之文移所至示賊皆得善達李公綱以宣撫使解河東之圍師次濩澤饟餽不繼議者欲令逺郡之民計户輸金募開徳懐衛之民以為運卒慤曰民力疲矣可重擾耶京畿諸路有免夫錢名為嵗輸水衡實盡入贓吏之室若朝廷以咫尺之符許令移用公私濟矣詔從之劉韐軍潰井陘自是河北河東敵騎連結所至叛卒剽掠諸帥招之不從曰若張公招我則往慤遣常所親信諭之悉與俱來敵兵逼京城盡召天下兵分置四道總管大名北道也以大名尹趙野領之野檄諸郡兵集於大名姦人乗之白晝剽刦殺少尹機幕而下數人野稱疾不出郡人環府門譟曰得張侍郎尹京則可既而副總管顔岐轉運副使張益謙等堅請攝府事慤不得已馳馬萬刃之中委曲曉諭取其為倡者梟首於市下令曰軍士即歸營壘保甲即歸聚落不則賊也皆斬即日内外帖然敵人自魏縣渡河鉦鼓之聲動地居民惶懼慤率士卒晝夜嚴守備敵攻西北急公命守陴者曰射强弩齊發連殪三領敵知不可破引兵而南髙宗以大元帥開府於相慤以相金人往來之衝即遣將士䕶迎行府至大名趙野一日稱疾愈欲自以都總管將兵入衞慤聞之喜甚授之器械兵甲厚犒三軍以勉其行案宗澤自大名入援在靖康元年十二月此書載野將兵入衞尚在前而宗忠簡公集有約總管趙野入援書時在靖康二年二月以十二月前入衞而次年二月猶不前進合此二書與宋史野本傳相證其逗遛月日可以考見先是除慤延康殿學士大名尹兼北京留守郵置不通野行旬日命始下欽宗蠟書趣兵解圍而野將兵去已逺乃約知磁州宗澤舉兵入援得義兵三千人卒萬人部勒啟行魏之父老遮道泣涕請留曰百姓恃公以生忍棄之耶慤不則請於大元帥府府檄慤復留案宗忠簡遺事云戊子公提兵二萬發大名此書稱慤與澤約啟行即其時也時康王為兵馬大元帥以十二月丁丑自相州至大名庚寅始發大名如東平此書稱東平百姓就大元帥府請留慤當在庚寅之前矣考遺事載十一月乙丑大元帥府下諸路勤王檄云右劄送中山府陳延康享伯知河間府黄潛善知冀州權邦彦知徳信州梁揚祖知洺州王麟知深州姚鵬知磁州宗澤知徳州滑彦齡知棣州趙闕知博州孫振知慶源府裴汝明知保州葛逄知覇州辛彦宗知安肅軍王徹等准惟中山慶源受圍不得通餘悉受檄據此則河北諸路無不被檄獨不及慤盖此時諸路勤王師俱節次至大名㑹合慤尹大名獨備衝遽故不檄之入援耳大名百姓請留慤本與十一月乙丑檄意相合故得遂所請也慤未嘗奉檄而乃約澤入援以遺事與此書相證慤之忠勤彌為顯著是皆宋史本傳所未詳謹附考於此時諸路勤王之師大集於魏資用不給慤請於大元帥以京東河北鈔塩鐫平日之直十之二令商賈輸金於魏給鹽於青滄諸池從之方京城路梗商賈願入金於𣙜務者咸留滯不通鹽久不至價増數倍至是官又損直商賈輸金恐後軍用以饒慤從容應變公私兼濟大率類此已而聞京城失守慟哭不食分遣義兵邀敵歸路雖嘗少有克㨗顧事勢巳去無所用力大元帥留濟鄆間累表勸進髙宗即位南京以户部尚書召既入對首言帝王之道在知人陛下初載尤當明辨忠邪忠邪判則治亂分矣及請省吏員罷内外官之非舊制者上皆納之慤在大名糾集居人使五兩相比謂之廵社協力以衞鄉井盗不能侵因編類成書以進謂唐府兵之遺制無事則執耒以耕有警則荷戈以戰得用兵之實而無養兵之費後弗果行議者惜之尋除同知樞宻院事仍專一措置户部財用案李綱建炎進退志稱一日上批出遷汪伯彦知樞宻院事而除張慤同知余因對奏云云上乃止後二十餘日竟除慤兼總領户部財用然則同知樞密命凡再下與此書詳畧互異上面諭曰周以冢宰制國用唐領鹽鐵宰相職也慤頓首謝御營司建以為副使時襲承平之舊凡張虗名以蠧經用者一切汰去扈蹕至維揚拜尚書左丞乞開講筵以輔聖徳先是徂徠石介著唐鑑其要謂姦臣不可使專政女后不可使預事宦官不可使用權慤得其印本繳進之未踰月拜中書侍郎力裁倖恩以立政本戚里有援舊比以求者慤引仁宗朝杜衍故事乞諭以張慤不肯權倖屏跡時西北之兵盡屯行在所輓運芻粟修繕營廐力勞而費倍慤請加蒐揀分屯諸鎮有方士自言能作黄金以濟國用在廷或主之慤曰碩帝推赤心置人腹中用成中興之業顧可以幻金賞士乎上是其言慤自居政府綜理庻務接納中外雞鳴而興夜分不寐他相視成而已有勸以息思慮養精神者慤曰國勢如此遑恤吾身一日都堂棟折卜者曰為國棟梁者當之是夜有大星隕於正寢明日薨實建炎二年五月二十日享年六十有四海内士識不識皆為流涕上震悼賜塋地金壇縣上元鄉望張之原慤在州縣時與温人許公景衡厚既登政府極力薦引慤在中書景衡為右轄叶心謀國他相忌之乗慤在病擠許於外去國未百里亦得疾慤忽見許於家迎候坐語如平時許亦見慤於舟翌日皆以訃聞聞者異之明年三月南渡上語鎮江守臣錢伯言曰張慤在朕無此行移蹕建業次鎮江親書祭文遣使祭其墓謂慤謀畫盡忠遇事敢諌亮直之節朝野所稱朕適此南廵行經墓所歎音徽之如在顧宿草之已蕃昔唐太宗征遼東而恤魏鄭公之家明皇幸劍南而祭張九齡之墓朕之此意不愧前人又明年詔曰張慤進由直道不幸早終昨過鎮江已祭其墓今聞其家復被刦掠朕甚閔之可賜銀五百兩度牒十道以恤其妻子稱朕不忘舊臣之意又詔曰張慤忠實剛毅盡心王室淪沒之後念之不忘夫相子負薪優臣致誚袁安之善慶鍾累葉令三省與其子差遣又嘗謂宰執曰張慤古之遺直也其他嘆美悼念之辭不一備載國史紹興元年翰林學士知制誥王藻援張方平在翰林日為宋祁請諡故事為慤請賜諡忠穆子瑜及孫皆以疾仕不達王厚字處道詔次子以父功除大理評事案宋史厚本傳稱官累通直郎盖散官也與此書除大理評事異東都事略與此書同紹聖初上方略請經理西事遂改武階案東都事略本𫝊稱厚由大理評事易武階為禮賓副使佐熙河府帥與此所云改武階正合但宋史及東都事略均于厚既佐熙河府帥之後始載厚與河州守將王贍獻議復吐蕃故地前乎此不見厚有經理西事之請據此書則厚先請經理西事乃始改武階與二書前後互異不數年收復鄯湟元符有棄地之意坐事貶案宋史本𫝊厚既平轄正隆贊二酋朝廷進厚東上閣門副使知湟州後以二州不可守乃以畀隆贊而貶厚右内府率再貶賀州别駕東都事略稱坐貶監随州酒稅再貶賀州别駕郴州安置與此書所載貶官互有同異崇寧中起知河州遷熙帥再復棄地又入廓州拜武勝軍節度燕京留後能以㤙信結戎心不事殺戮終致趙懐徳來降崇寧五年召還京師案宋史及東都事略本𫝊厚既節度武坐勝軍明年羅薩爾復入㓂新疆大震厚逗遛降郢州防禦使已而諭降趙懐徳復武勝軍留後召還提舉太乙宫此書不載祠官盖從其略卒贈寧逺軍節度使禮官議諡恪敏詔以奮忠許國似其先人賜諡莊敏有奏議三十巻
