body:
  text: 京口耆舊傳卷一刁衎子湛孫約等陳升之子閌閎等陳汝奭子龍輔等栁涗豐有孚弟有章等葛良嗣焦千之沈括刁衎字元賔丹徒人祖禮遇亂自上蔡徙居宣城父彥能仕江南因徙升州後從徐知諌於潤州樂其風土至李氏時為昭武軍節度使賜田京口遂家焉衎在江南以父任為祕書郎集賢校理以文翰入侍李煜常令直清輝殿閲中外章奏原注李後主少時遣人于廬山精舍擇爽塏地為精舍極一時林泉之勝既成命宫苑使董源以澄心堂紙寫其圖來上既即位以精舍為開先寺以圖盡賜刁衎藏於家蔡天啓之子佑猶及見之江南平從煜歸朝授太常寺太祝病免太平興國中李昉扈蒙在翰苑勉其出仕得知睦州桐廬縣會詔羣臣言事衎上書諌用刑請詔天下悉禁五代以來淫刑酷法非律文所載者巡檢使臣所得盜賊亡卒並送本部法官訊鞠無得擅加酷虐古者殺姦凶於四裔今逺方囚人盡歸象闕配役諸務非便自今外處罪人勿許解送上京殿前引見司鉗黥法具並付御史廷尉獄敕杖不以大小並付有司或出中使或命法官具禮監糾以示聖皇明刑謹法之意皆見施行再遷大理寺丞獻文詔試授殿中丞通判湖州上疏請定天下酒稅額修郡縣城隍條約牧宰除兩浙丁身錢禁汴水流尸凡五事俄知婺州遷國子博士移光州轉運使狀其績優詔嘉奬徙知廬州真宗即位上疏請開諌諍之門塞讒佞之口無以血氣方剛而惑於聲色無以春秋鼎盛而耽於逸遊案李燾續通鑑長編載此疏作無以春秋鼎盛而耽於逸遊無以血氣方剛而惑於聲色與此書互有倒置代還案續通鑑長編載衎于至道三年九月上疏疏中語與此書所載合惟彼標云比部員外郎刁衎上疏考之此書則衎於是時猶未為比部方由光州轉徙廬州因上疏乃更廬州代還耳獻所著本説十卷得以本官為祕閣校理出知潁州入為駕部員外郎案宋史本傳作入為比部員外郎與此書所云駕部互異賜金紫改直祕閣充崇文院檢討時杜鎬陳彭年巳為檢討衎辭詔許解職判三司開拆司預修册府元龜加主客郎中丐外得知湖州轉刑部郎中嵗滿復預編修大中祥符六年書成案玉海載册府元龜以大中祥符八年十一月乙丑上此書云六年成與玉海互異轉兵部郎中暴中風眩真宗遣使馳賜金丹不及卒年六十九衎始仕李氏貴盛歸朝以純淡夷雅知名交道崇篤士夫推之所為文有野編二十卷子湛孫約原注按國史刁衎升州人父彥能偽唐昭武軍節度使南唐書彥能上蔡人徙宣地王介甫刁虞部墓志稱衎葬江寧牛首之北虞部葬丹徒遂為丹徒人張安道刁刑部墓志又稱其先渤海人自晉以後居丹陽未知孰是以彥能常從徐知諌於潤又張安道刑部墓志後有昭武賜田一節知其來居京口蓋自是時又今傳所述履厯皆按墓志而歐公唁景純書稱刁丈內翰平生坎軻數年以來方便亨塗其去大用尺寸間爾墓志所載即不曽掌文翰晚節乃居間十六年亦為可疑案王安石集刑部郎中刁君墓志銘稱君曽祖嘗節度昭信軍卒葬昭信城南則彥能也皇祖以尚書兵部郎中直祕閣卒葬牛首山則衎也皇考以尚書屯田員外郎卒葬丹徒故君為丹徒人然則墓志乃謂虞部之父巳葬丹徒故虞部遂為丹徒人非自虞部始葬丹徒也此注謂虞部葬丹徒遂為丹徒人與墓志文義不同湛咸平三年進士及第以儒術發身長於吏事初授太理評事知宣州宣城縣秩滿遷大理寺丞監興國軍大冶縣茶場兼知縣代還遷殿丞知潮州真宗東封遷太常博士國朝封贈之典在具慶者恩不及亡母東封告成肆大眚妻已喪者得敘封時湛母徐已死上章以謂妻以箕帚之舊尚蒙封邑之榮母以劬勞之恩不及漏泉之澤教化之本輕重未安朝議然之故徐氏封髙平縣太君士大夫父在而封及亡母者自湛始祀汾脽遷尚書屯田員外郎在朝參嘗録囚於糾察刑獄司其具獄當五囚重辟湛閲案原情理出四人會京府司録闕政府以湛名聞真宗指之曰此近嘗録囚而活人者耶是此選遂授開封府司録軍巡有重囚久巳抵讕案抵讕二字出説文涑水紀聞載鄭俠上疏連及王安國自陳無此詣臺司引俠使證之俠見安國笑曰平甫居常自負剛直議論何所不道今乃更效小人欲為抵讕耶抵讕二字與此書可以相證不承京尹請讞上記前事特以召湛意欲有所平反湛得其情囚即服罪上猶欲原減湛不可竟按誅之其持平如此丁外艱服除通判越州會闕守攝州事時境內大蝗湛潔齋致禱翼日迅雷烈風蝗溺於江人以為精意所感郡城溝瀆久塞湛率衆疏鑿引湖水周流城中俗大便利及被代百姓遮留不忍其去遂圖形承天寺中嵗時奉祠遷都官知廬州徙壽州課最召還授荆湖北路提點刑獄仁宗登極遷祠部郎中徙夔州路轉運使屬施州洞首田彥稠彥晏妄干恩典不遂即率宗黨破寨柵殺吏民燒官舍保險為邉患案宋史西南溪洞諸蠻傳云乾興初順州蠻田彥晏率其黨田承恩寇施州暗利寨不著彥稠之名此書亦不著承恩之名與宋史互異又宋史但云乾興初此書系其事於仁宗登極以後考仁宗以乾興元年二月戊午登極與宋史可以互證朝廷命將出禁旅討擊彌年無功詔湛招輯會彥稠死蠻有善意而武臣欲自為功拒不納命疲於調輸湛密疏請罷兵詔以兵屬湛湛與蠻約親出野與之歃血立誓黔中遂安案宋史西南溪洞諸蠻傳但稱夔州發兵擊之俘獲甚衆明年彥晏納欵據此書則彥晏納欵實湛之功宋史闕書遷刑部丁內艱服除授三司度支判官閲嵗請舒州以疾丐間徙黃州再請分司西京遂歸老案宋史刁衎傳稱衎子湛登進士第刑部郎中據此書湛徙黃州之後分司西京乃歸老則不以刑部郎中終也與宋史小異湛有風鑒識歐陽公修於未遇故湛之亡修以書唁其子約敘受知之早且言後雖有智者皆莫之先恬於榮利昭武賜田甚廣自衎在時以貧質於鄉人田沃衍嵗入視他田倍蓰或勸湛贖以自業湛曰田誠美然鄉人致力亦勤矣何可驟奪因焚其質劑分務退居諸子從官便郡更相迎養以致其樂淡乎自適凡十有六年次子約知婺州扶侍之官卒於錢塘實皇祐元年享年七十有九范公仲淹時守錢塘案范仲淹傳但云尋徙杭州未著出守之年宋名臣言行録稱皇祐二年仲淹領浙西據此書則皇祐元年已守錢塘可與二書相考資其喪歸約字景純少有盛名擢天聖八年進士第為諸王宫教授時南班之制未立宗子非遇殊恩無遷官法景祐中宗室欲緣大禮推恩命約草表丞相王公曽愛其文詞遂得旨有南班之授宗室以千縑謝辭不受寶元中入為館閣校勘慶厯初與歐陽公修同知太常禮院其冬又與修等並為集賢校理管當三館祕閣四年坐蘇舜欽進奏院祠神飲酒事出通判海州案宋史蘇舜欽傳稱進奏院祠神舜欽與右班殿直劉巽輒用鬻故紙公錢召會賔客王拱辰諷魚周詢劾奏坐除名凡同會被逐者皆知名士又考九朝編年被逐者王洙吕臻章岷江休復宋敏求吳益柔及刁約可與此文相證奉親以行作戲綵亭邦人榮之李清臣賦詩所謂傳聞綵服朱顔客已作金章白髮翁蓋以屬約皇祐中仍以校理權吏部南曹尋為開封府推官至和中溫成皇后上仙約以厚葬為非未奏疏為內臣所白出提點京西刑獄時知太常禮院校理吳充鞠真卿皆以議溫成事黜時論然之太常丞直集賢院馮京上言三人者不當去亦坐落案宋史及東都事略馮京傳但稱吳充以議溫成事被黜馮京論不當黜者亦只充一人宋陳均九朝編年亦只及吳充及鞠真卿而不及刁約此書著約及吳鞠三人與諸書互異同修起居注嘉祐初還朝判度支院假太常少卿直史館使敵歸塗戲用契丹匹裂貔貍等為詩雖一時諧謔亦為當世傳誦還判度支院四年出為兩浙轉運使還判三司鹽鐵院出提點梓州路刑獄八年再判鹽鐡院遷户部案元至順鎮江志于轉運兩浙之後知揚州之前不書判三司鹽鐡院提點梓州路刑獄及再判鹽鐡院遷户部等官與此書詳略互異治平中出知揚州移宣州熙寧初判太常寺議講讀官當賜坐與呂公著等合後雖不行識者是之約性殷勤篤至急人之急甚於已私在京師賔客無貴賤少長有謁必報日不足繼之以夜故館中頗有走馬多羅之誚而約實未嘗一登權要之門故同時輩流躐進驟遷而約獨四十年周旋館學天下士無問識不識皆稱之曰刁學士而一世名德相望前後如范公仲淹歐陽公修司馬公光王公安石王公存蘇公軾皆愛敬之其告老而歸存以詩送之曰平生胸懷篤風義往還不論賤與貴騎馬都城四十年未嘗一毫為身計比其死也軾哭之以詩曰平生為人耳自為薄如縞安石祭之以文亦曰坦然制行之平裕然與人之周既貴賤以同觀亦始終以相侔蓋實録云約家世簮纓故所居頗有園池之勝至約更葺園曰藏春塢塢西臨流為屋曰逸老堂又西有山阜植松其上曰萬松岡凡當世名能文者皆有詩故藏春塢之名聞天下約從容里閈年八十餘元豐五六年間卒兄繹擢天聖二年進士第授太常博士厯仕楚蜀最後通判揚州卒王安石時簽書淮南節度判官廳公事有祭文弟紓字公綽即約使北回寄南徐二弟詩中所謂族推公綽最溫良者紡字經臣以父蔭入官由户掾厯佐幕府案歐陽修有贈刁推官紡詩則知紡曽為推官可與此書相證范公仲淹歐陽公修皆有贈送之詩陳升之本建人國史有傳墓在縣之五州山案嘉定及至順鎮江志皆云升之自建來居丹徒考宋名臣琬琰録升之本傳稱丹陽居第壯大踰制則又似遷居丹陽者可與二志互證二子閌閎皆以父任閌終宣義郎無子閎終大理評事子憬以祖恩授承務郎亦早卒以從姪鎮為嗣終宿州符離知縣三世並祔葬五州升之自建來居從子豫及禧實與俱來豫以升之廕終中奉大夫四子機桷最知名機知信州劾秦檜妻黨王仲山坐廢檜死起知楚州將漕淮南終知衢州桷為韓世忠軍參謀凡世忠出師桷皆在行積功為右文殿修撰敷文閣待制卒三子官皆至升朝禧之弟出繼升之後即鎮也再傳而絶命他族人為繼又再傳而絶今繼升之後者禧之曽孫應㞰之子箕案宋嘉定鎮江志禧之孫雅言雅言之子厯應㞰箕應㞰之子陳汝奭字公武丹徒人自泉之晉江來居即三司户部副使詁之姪用詁恩補太社齋郎景祐中擢進士第案元至順鎮江志作寶元元年登進士第嘗以文謁范公仲淹竒之時光祿卿胡楷屬仲淹擇壻仲淹言無踰汝奭者遂壻胡氏為睦州遂安令繩豪民楊氏以法縣以大治改秩知眉州眉山治有能名民歌之日明月皎皎洞毫釐兮陳公之政不可欺兮於時嘉州不治部使者張公掞檄汝奭攝通判將使正郡守及其屬之罪汝奭到郡得守之過即諷使自改事有當行亦白守行之郡以大治而守若屬皆得善去眉山士民請于使者寧毁吾廬毋奪吾父使者以益州交子務出納叢雜舉為監務益帥張公方平薦之通判鄆州鄆守吳公奎亦薦之選知秀州求省松楸得知邵武軍除知海州以嵗飢不俟報發廪賑民為監司所奏汝奭亦上章請以身坐母及寮屬朝廷嘉之置不問母憂去官汝奭性恬靜自熙寧初官已至太常少卿不求遷者十五年及是嘆曰仕本為養養不及矣何以仕為除喪乞分司西京遂告老時年六十五居間日以飲酒賦詩為樂凡十有四年乃卒葬丹徒縣義里鄉之黃山中間以覃恩及子封敘轉至太中大夫卒之前一日召子及孫戒以清白忠恕曰行此足以保家子龍輔龍輔字寶臣登嘉祐二年進士第為濟州司法衢州常山令改秩知開封府扶溝縣知興化軍袁州江州建昌軍秩滿遂不仕柳庭俊為撰墓志稱其賦性寬明居官清謹恬於名利篤於孝養自莆田易守宜春時汝奭巳休致氣體康強安車迎侍過晉江上冢人以為榮晚年集古今忠臣孝子凡修身治人可為法者總三十卷號曰傳家至寶以遺子孫其卒亦葬黃山孫孝友孝恭孝威皆擢進士第孝友字恪仲終奉議郎孝威字德仲未改秩而卒孝恭字溫仲年十四入郡學十八貢太學有盛名宣和三年以上舍擢第為萊州膠水簿婺州兵曹掾改司理參軍監溫州天富監及永嘉鹽場改秩知宣之涇縣秀之華亭教授臨江軍除諸王宫大小學教授國子監丞丐外得知嶽州卒于官為人亷謹死之日家無餘資葬金壇縣上元鄉之西張莊柳涗丹徒人擢慶厯六年進士第為陜西司理參軍以政績聞特改大理寺丞鄭獬當制其詞云本道使者曹元舉等言爾亷謹治官有善狀章下有司有司以為績效明白如章所言乃升爾以廷尉丞爾其祗踐以稱懋功之意豐有孚字寶臣弟有章字漢臣丹徒人兄弟相勉以學有孚以學究出身厯知處州青田溫州樂清江寧府溧陽縣終虞部員外治家有法居官亷平可紀有章擢皇祐元年進士第終駕部郎中有孚孫漸字仲升登紹興十五年進士第調主泰州海陵簿未上而卒淵字仲深紹興八年進士第主平江府長洲簿教授太平州改秩知平江府吳縣卒今城中諸豐皆其裔也葛良嗣字興祖丹徒人王安石為撰墓志稱其先家處之麗水父度支郎中源徙居明州之鄞死葬丹徒故為丹徒人博知多能數舉進士角出其上而刻厲修潔篤於親友慨然欲有所為以效於世年四十餘始以皇祐五年進士出仕州縣餘十年終於許州長社縣主簿興祖於仕未嘗茍聞人疾苦欲去之如在已其所臨視雖細故人不以屬耳目者必皆致其心論者多怪之曰興祖且老矣弊於州縣而服勤如此余曰是乃吾所欲於興祖者夫大仕之則奮小仕之則怠忽不治非知德者也興祖聞之以余言為然安石又作良嗣挽詩云憶隨諸彥附青雲場屋聲名看出羣孫寶暮年曽主簿卜商今日更修文山川凜凜平生氣草木蕭蕭數尺墳欲寫此哀終不盡但令千載少知君子蘩嘗知鎮江府藴亦擢嘉祐八年進士第云焦千之字伯強丹徒人嚴毅方正歐陽公修敬待之常館修家纍試不利修以書勞之其一勉之以孟子不動心之勇二則勉之棄去科場文字專意經術趙康靖公槩之守鄆修以書薦之云千之久相從篤行之士專心學古不習治生得招致鄆學不止千之可以自托其於教道必有補益亦為政之一端比修之守潁吕公公著適通判州事請於修延之教子公著去潁復携以歸修以詩送之所謂焦生獨立士勢利不可恐誰言一身窮自待九鼎重有能揭之行可謂仁者勇吕侯相家子德義勝華寵焦生得相隨道合若膠鞏者也公著之子希哲為長時方十餘嵗承父母之訓肅敬天成千之不少假借小有過差即端坐召與相對終日竟夕不與之語希哲恐懼畏服千之方略降詞色異時希哲德成行立為世耆儒家傳推本以為由千之化導之篤嘉祐六年諸路舉行義之士赴京師館于太學試舍人院賜出身者七人案九朝編年嘉祐六年五月授顔復等官先是諸路舉行義文學之士二十三人至者十六人皆館於太學即舍人院試論䇿賜出身五人此書云七人與九朝編年互異徐州顔復為首千之次之為國子監直講熙寧初以蘇嘉對公試䇿論時政之失千之與顔復等為考官案九朝編年但稱顔復為考官不及千之與此書互異擢居上等直講蘇液以白執政千之與同列五人俱罷以殿中丞為樂清令歐陽修貽書勉之云更當屈伸取舍要於濟務蓋以千之剛方不能善事上官故也八年知無錫縣是嵗大旱運河涸用單鍔言車梁溪水灌運河五日而通流舟楫無滯事見蘇文忠公軾録奏單鍔吳中外水利書軾有從千之求惠山泉詩正其作縣時也案蘇頌文集外制內有除國子監直講焦千之為大理寺丞敕一篇考之此書千之未嘗除大理寺丞與頌集異敕內有云外內更試于今五年進躋卿寺之屬仍蒞師儒之班考此書千之既罷直􅊰以殿中丞出為樂清令及無錫令證之敕所云外內更試則大理寺丞之擢當在出知外縣之後而敕題惟追溯國子直􅊰蓋義主録用略其降官也與此書異同可以互考沈括字存中杭人居丹徒國史有傳初括壯年嘗夢至一處登一小山花如覆錦而喬木蔽其上山之下有水澄徹夢中樂之將謀居焉自爾嵗嘗夢至其處後十餘年有道人為括言京口山川之勝且云郡人有地求售括以錢三萬緍得之後十餘年道京口至所買之地恍然乃夢中所遊因號夢溪遂奠居焉括博學善文於天文方志律厯音樂醫藥卜算無所不通皆有論著居八年卒歸葬故里子孫猶家京口而夢溪他屬久矣
