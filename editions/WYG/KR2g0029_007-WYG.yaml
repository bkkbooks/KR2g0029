body:
  text: 京口耆舊傳巻七王彦融子萬全萬樞孫遂李健王澂莊必彊張忞張綱子堅孫釡王彦融字炎弼江州人韶之孫居金壇父宷以林靈素譛死靖康改元彦融時年十九徒步走京師上書訟寃召對命官紹興初授廬州錄事參軍㑹夀春守將外叛檄權府事以勞進秩已而宣司洊委偏將輒攝守皆畏敵遁去彦融募鄉兵據芍陂以距敵城賴以全辟湖南安撫司幹辦公事時湖湘盜賊蜂起檄彦融出討未幾悉平帥憲上功授儒林郎帥憲復論奏以為賞不當功繼被旨改合入官事定而武岡軍所駐東南第九將兵唐明等以衣糧不足據城稱亂案燕翼貽謀錄云元豐四年二月乙夘詔東南團練諸軍為十三將淮東第一淮西第二浙西第三浙東第四江東第五江西第六湖北第七湖南第八全邵永第九凖備廣州應援福建第十廣東第十一桂州第十二邕州第十三此書所稱第九將葢全卲永團練軍也燕翼貽謀錄又稱團練軍廩給特厚與禁衛比絶異他軍以此條證之即知怙恩之足以生亂與宋兵志亦可互攷帥復檄彦融權軍事先是盜賊紛紜武岡守􅊀嚴甚至是賊反資以為用彦融度不可勝則散賞牓使自相携貳唐明等果自疑率首領約降既降而知我師之弱議復中變彦融乃單騎造城下諭以逆順禍福賊悔悟啟闗請降彦融即入城視事一軍以安復被進秩之賞知平江府長洲縣中間權崇德德清又嘗從奉使兵部黄敏行之辟皆有可紀授無為軍通判秩滿知栁州未上擢知楚州撫摩彫瘵招納新附井井有條敵騎南牧通判徐宗偃先事奔避至揚州妄𫝊制使之命令焚燒城内外屋宇彦融誓死不可事聞宗偃罷黜加彦融直敷文閣敵退除淮南轉運判官兼隨軍運判時戎馬初定帑庾一空大軍數萬仰給夙夜盡瘁僅免乏興以是屬疾丐閒主管台州崇道觀起知雅州未上卒案劉漫塘集稱朝請大夫直敷文閣淮南轉運判官彦融蚤著孝行後守山陽以捍冦功擢本道使者始徙居潤之金壇可與此書相證惟是書載彦融于丐祠之後更起知雅州乃卒漫塘集第書淮南轉運判官葢以彦融未之雅州任耳彦融亷而喜施貧而好事所居之巷廣不盈車屋宇隘漏僅蔽風雨門無一金之入而食客常滿雖無以稱其求而為之宛轉借助不遺餘力嵗遇大比闢草堂於所居之後集里之秀民與其子同舍肄業躬自勸奨是嵗上名春官者五人彦融二子預焉時以為盛子萬全萬樞萬全字必勝一字通一父任出官授揚州髙郵尉淮東總領所幹辦公事總轄常州鎮江府戸部酒庫皆以故不上監戸部餘杭酒庫朞年之間補負課七萬餘緡羨利猶以萬計以憂去服除辟真州楊子簿調臨安府錄事參軍京尹王佐深知之孝陵嘗有所嘉奨佐曰非臣所及錄事王某為臣言之改秩知紹興府會稽縣代還為湖廣總領所分差襄陽幹辦公事通判舒州擢知辰州近辰之蠻有楊氏者負强為患萬全因其大酋之亡析其族為三其患遂絶居民有陳氏者挾廢契廣占民地為一郡患萬全逮之獄破其姦三嵗大比士子附試常德疲於往來萬全為創貢闈請於朝得自賔貢郡人德之代還猶未七十上章告老萬全與人恭遇事居官有康稱嘉定癸酉卒年八十有一葬丹徒白兎山萬全子遇見科舉類萬樞字贊元父任為平江府崑山尉秀州崇德丞改秩知滁州來安縣案漫塘集故知吉州王公墓誌曰來安政既成郡以全椒令闕政龎檄公暫往來安人遮道不可郡俾兼治之與此書僅紀來安詳畧互異淮南路轉運司幹辦公事當孝廟升遐光宗御極弔賀之使相屬計臺職護視適以故去萬樞以寮佐攝承比六七往反以辦治聞通判建康府知興國軍案漫塘集故知吉州王公墓誌謂公進貳建康㑹其子逢及遂俱以妙年貢籍言者以為私劾罷起知興國軍此書于知興國軍之前不書論罷與墓誌詳畧互異方承平時防河之卒賦衣淮西之蘄黄蘄黄轉市於興國因以為賦絹以端計四千一百錢以緡計萬三千皆有竒更太守數十不能去萬樞當臨遣之時亟以是請御史亦繼上章案漫塘集故知吉州王公墓誌載此事謂公臨遣次亟言之敷奏剴切上意感悟退又白御史御史繼以請據此書但云御史亦繼上章似御史之請不由萬樞之白者與墓誌互異詔蠲其半餘令郡以他賦代輸且命漕臣補助悉不取之民郡人德之秩滿擢知吉州道儀真卒於舟中實開禧乙丑萬樞常言安而行之者仁者之事我無能焉庶乎利而行之勉强而行之者於宗族親戚咸有恩義族弟孤男賴以立家葬金壇白水塘遂字去非先字潁叔西山真公謂曰子志於道而慕戰國䇿士非字也為改去非且序其說其先來於江之德安熙寧樞宻韶公之髙祖也樞宻生著作郎寀著作生淮南運判彦融運判生吉州太守萬樞吉州生公公生十有一能應舉十四伯兄逢試江東對䇿抵韓侂冑與王德謙考官舒璘劉三傑石宗萬並寘選中諫議李沐聞而大怒謂公父私屬監試劉大臨皆劾罷逮赴後省覆試公與兄方勇往不候試徑駁放旋以吉州任子恩銓中主富陽簿後三年逢中第又三年公亦第仍赴富陽任而吉州卒伯兄亡公奉母治喪盡禮致師訓諸弟為女兄擇對孝友之行著聞服除而侂冑誅死參政衛公徑以前事白堂差教授楚州當開禧兵火後繕治黌舍招集生徒士風頓還淮東敵退民歸嵗適苦旱條救荒事冝上之臺郡既而權倅制使丘公崇楊公輔皆以措置給糴委公黄公度開江淮閫羅致幕中建䇿畫平湖海餘寇淮西有雄淮軍虚費諸郡朝議留屯以省餽運公白制閫凡田多者以正月下旬縱遣使得春耕田少者四五月麥登乃遣歸使有以續食其不預歸者改刺黄公以其説復於朝行之所在帖息嵗省緡錢四百萬米斛三十餘萬幹辦淮西總所漕使真公德秀倉使李公道傳共議捄荒事悉咨公民多全活改秩知當塗縣丁母蔡夫人憂除喪服期年不忍求仕親朋勉之注授知溧水易山隂縣多貴近公一切繩以禮義莫敢干撓盜起江西閩中公陳弭盜六䇿四要赴樞宻院稟議幹辦審計司差知邵武軍兼招捕司參議案此書載遂知邵武軍之前更厯楚州教授知當塗溧水山隂三縣宋史本𫝊俱闕書又案宋史遂本𫝊載遂安輯閩寇在紹定二年攷宋季三朝政要載紹定二年閩寇晏頭陀夢彪嘯聚汀郡特除陳鞾為提刑招捕使此書稱遂兼招捕司參議葢佐陳鞾捕賊也與三朝政要可以互證公至郡賊巳破城公為榜曰已歸業者前事勿問除賊首外不殺一人捕殺賊首補官給賞賊首出降免罪補官獲賊諜釋其桎梏各付榜文使歸諭賊復散榜以招四縣流民凡自言不係從賊者各給憑由俾之歸耕乃為郡城守備塞旁蹊小徑使民旅俱由大塗過渡入門置厯攷察發鈔賑濟就為保甲以防姦諜引樵溪水環城南以入白渚由城東城北入於溪因壕土為壘於是東南北三面水行山中城在水内西山屯兵為隘亦引水環之山髙盡見數十里外廂禁舊軍與新招軍料簡教戰於是盜知不可復犯矣提禁軍及淮兵親行討賊諸縣令爭效命擒賊渠劉安國等斬之案宋史本傳載紹定二年福建宼擾甫定朝廷選廉能吏勞來安集以遂知邵武軍葢第於寇定之後命遂為善後之計而巳據此書云公至郡賊巳破城則是逆熖方熾不得云宼擾甫定矣此書云提禁軍及淮兵親行討賊諸縣争効命擒賊渠劉安國斬之據此則捕寇甚急又非止勞來安集而已與宋史本傳互異又案宋季三朝政要載陳鞾至州籍峽常民兵申乞調淮西精兵五千人救援淮西制置曽式中遣將陳萬以三千五百人來即此書所云淮兵也此書所云擒賊渠劉安國葢即晏頭陀之黨與三朝政要亦可互證史衛王薨鄭丞相清之佐天子更化首以奉常簿召公公知道將行矣函單車入都六日除監察御史案宋史本傳載遂知邵武軍有安撫功未幾言者以遂妄自標致邀譽沽名罷改知安豐軍遷國子監主簿乃遷太常寺主簿拜監察御史此書於召為奉常簿之前不書罷知安豐軍及遷國子主簿與宋史詳畧互異與洪公咨夔並命首疏論決於進君子退小人則撥亂底於治決於進小人退君子則由治趨於亂君子小人之勢相持未決而治亂混并未分雖百君子而一小人終於以小人而害君子則天下之似治者適階以為亂於是首疏劾余天錫再疏劾趙善湘鄭損陳眩三疏又劾善湘諸子并其黨與餘逮事藩邸趙鄭陳故相之肺腑腹心久任方面以功自詭者公連疏及之於是人心震悚朝綱精明羣枉之黨傾衆正之路闢矣公又上疏論士大夫心術之弊厯數十年膏肓之疾若寵賂若貪墨若姦回若嗜進請以所言風告列位若有不悛者臣當執官刑典憲而枚劾之自是所論劾甚衆姦黨為之一空史嵩之制置京湖公劾其原起於故相自固之謀太宻以兵權付其子弟畏用兵之念太甚惟知以貨賄遺外裔除右正言上面諭聞卿山隂之政甚嘉邵武之功甚不易自卿入臺臺綱振起皆卿之力朕讀髙宗聖政見趙鼎在臺中率僚屬振風采一時甚賴其力朕之賴卿亦然除殿中侍御史劾李知孝梁成大莫澤乞行追竄并論趙至道留元英罷任因口奏曰前者䝉陛下以趙鼎事髙宗者勉臣臣觀趙鼎為臺諫論事四十餘疏見之施行者三十六雖鼎多所建明寔由髙宗能受盡言見之行事抑臣聞趙鼎所長在辨别君子小人之際願陛下恪奉紹興五年以前為法以八年後為戒既而復論嵩之欺君誤國之罪因言王檝之來只當令在建康毋使外裔小臣容易入都窺見國家虚實又乞令喬行簡奉内祠未幾上以御劄付臺諫以史衛王有定䇿功自今勿復攟摭以全大體又邊耗急欲復起史嵩之亦以意諭公公繳奏乞收回御札並止嵩之且以去就決之案宋季三朝政要載淳祐四年詔命史嵩之起復其同時上疏論嵩之特著名者凡有黄濤劉應起徐元杰黄愷伯金九萬孫翼鳯何子舉翁日善趙與寰盧鉞劉鎮十一人又載寳祐四年上欲復用嵩之詔除觀文殿大學士遂致仕與前執政恩數蔡抗奏乞收回恩命三學上書攻之遂依前致仕卒此書稱上欲復起史嵩之與寳祐四年事正合此書載遂乞收回御札與蔡抗乞收回恩命亦相類而三朝政要載諸上疏人名氏最詳乃獨不及遂繳奏事據此書可以正三朝政要之闕入對又乞守更化初意時楊恢孟珙亦隂主和議私與敵交且請守江公併劾之謂當以戰為守時巳宻召襄帥乃遷公户部侍郎公既出臺而更化之初意遂轉移矣公在臺院踰兩年屢擊鉅姦凡所論奏皆國大務有十疏不置者有自初至終言之者彈劾幾七八十人雖婣舊不之私所以羣隂退伏海内豹隠之賢次第而起有鳯鳴朝陽之風而朝廷光明俊偉庶幾夫元祐之盛至今追想而不可復得者大抵自公發其端也差知遂寧府改制置四川陛辭猶論和之不可恃戰之必可守且謂臣逺去闕庭猶不敢忘忠愛者君子小人之辨是也諸葛亮出漢中上表言親君子逺小人此乃討賊興復之第一義惟陛下念之遂行而蜀士之黨鄭損者居中沮止之改知平江府下車首以崇學校寛民力抑豪强為務會兩倅及縣令賦詩勉厲之時詣學親為諸生講說吳中理學始興知寧國治績尤著知建寧案宋史本傳及元至順鎮江志並載遂知平江之後厯知慶元府太平府泉州溫州寧國府而後知建寧與此書詳畧互異以邵武平寇威惠入人者深百姓自衢界爭以香花迎拜幡旗擁衛以至府城公昔與漫塘劉公俱從黄公直卿遊至是思為師門扶墜緒首詣攷亭拜文公祠又欵謁建安書院延見諸生闡揚訓詁作孔子燕居堂以明宗指俄除江西帥案宋史本傳遂知建寧之後厯隆興府太平州又復知隆興府兼江西安撫使與此書詳畧互異歸塗次建陽士友爭迎講書道邵武至鹿洞皆為諸生講說請提舉太平興國宫自是不復出矣居鄉猶為士友日講魯論中庸太極圖西銘諸書殆徧邑有社倉本公與漫塘所共創至是又悉所餘買圩田二百畆以為經久之利焉起家除權工部尚書未及造朝而薨年六十有七積官至龍圖閣直學士通奉大夫賜諡正肅公凝重堅正純篤仁厚自奉之薄有人所難堪者所厯三郡每罷燕設却饋遺歸塗不買一物士之游謁者未嘗有所與故能所至充足而於崇教化修學校則一無所靳所著書有論語説讀大學中庸記孝經説及諸經講義奏議藁葬金壇上元鄉之白水塘子曰文子女嫁漫塘之子汝進寳祐丁巳郡祠於學教授東陽孫繼學奉安之詞曰端平之元化瑟初更公與洪公召入松㕔知道將亨不俟駕行君子小人首疏辨明正色張膽風生帝庭衆正路闢星聚雲蒸羣邪迹掃雪晛霜零朝綱尊隆海宇霽澄曾未幾時黨軋朋傾一解而㪚鳯不再鳴至今善類慨想典刑爰訪遺像繪以丹青植之風聲以詔後生李健字子建泗人來居金壇擢大觀三年進士第主霍丘簿就任差舒州教授任滿差青州教授未上除辟雍正㑹罷辟雍改太學博士除秘書省正字陞校書郎尚書户部右曹員外郎㑹罷右曹亦值京城之變流離在外建炎中差知宿州復值御營司差王進攝守罷奉祠紹興二年差淮西提舉茶鹽事未上改知廣德軍任滿差充淮西宣撫司參謀官在任除直秘閣知廬州尋准尚書省劄子依舊充參謀官未幾兼都督行府轉運判官兼提㸃屯田公事六年差知宣州七年差知和州皆弗果上十年奉祠十三年以言者差監德安府在城酒税十四年再奉祠卒健有能詩聲方未遇時與秦檜遇於金陵年少氣盛不能相下以是坐廢王澂字彦輔金壇人大觀三年登進士第為江寧府句容縣尉時江賊盤據洲島刼掠行舟民旅不通郡檄澂及鄰邑尉㑹合諸寨兵收捕而督以郡官澂度賊黨皆亡命非可力勝乃别其卒為二俾羸弱者束葦泛輕舟而前伏於别浦期以甲夜舉火向賊比夜舉火賊以為官軍且至盡銳以出澂以巨艦載壯勇乗其後兩陣之間金鼓交震賊進退失據倉皇不知所為悉就擒遲明同列猶有未知者因相率連銜上功而督捕官巳以實聞澂遂以賞改宣教郎澂意不自安欲僅改初品官而推餘賞於同列不報㑹令闕當路就辟民安其政時茅山道士劉混康笪靖之介中貴以干時好奉詔興元符萬寧宫縣供土木之役稍愆期㑹則斥辱隨至澂以義折之民賴以寛混康死勅葬山南當道築亭設卒守䕶一日有樵者憇其下守卒縶以吿澂曰安可以一死道士故妨吾往來之人即釋樵夫杖守者且械以徇自是其黨禠氣不敢肆横秩滿差通判歙州甫就道而卒弟尚友字必先用累舉恩出官監臨安府稅院吉州龍泉丞龍泉素難治尚友通練邑民宜之秩滿民相率走諸臺借留部使者察其誠聞諸朝遂留再任秩滿辟贛州興國令不就遂歸老從弟資深游太學升上舍以易學為時所宗既免省歸㑹常潤合兩州開舉塲羣從彊令入試亦占首選與澂同入對大廷中乙科以羸疾不候臚唱而歸卧病積年政和七年卒族姪維字唐傑擢紹興二十七年進士第終黄陂令族孫康字伯夀有孝行嘗論金壇水利謂洮湖舊有八十一浦口實受荆城延陵丁角薛步四源之水今所存惟二十有七皆淤塞不通盍訪舊跡浚而深之下流無壅則水不為害人以為當晚以特恩授鄂州咸寧縣尉未上而卒即今岳陽諸王之族莊必彊字弱翁金壇人擢大觀三年進士第授婺州蘭溪尉用賞改秩調太平州繁昌縣丞知處州麗水縣坐方臘寇境内守備不整罷宣和五年差知明州奉化縣建炎二年差知湖州武康縣皆有治聲紹興三年差知紹興㑹稽縣未上有以上薦者得㫖召赴行在除太常丞六年除尚書兵部員外郎七年七月移度支員外郎上言聞廬夀間有警葢將臣入覲敵人乗間渡淮上之師頗有離次而去者必有奸人隂間以誘我師願詔諸將悉以實聞母有所諱上感悟即詔開都督府丁外艱十年九月除祠部郎官十一月除右司郎中罷歸起知常州與倅貳引嫌俱罷未幾卒案劉漫塘集故衡州判官莊承直壙銘稱松年祖必强擢進士第為尚書右司郎官終朝散大夫與此書以知常州終互異葬縣東五里曰横堰案必彊子芑芑子松年俱葬金壇之路莊亦見莊承直壙銘張忞字處文金壇人政和二年擢進士甲科五年再中博學宏詞科入朝厯學館紹興初為中書舍人罷未幾卒忞平日制行欲平不為茍異靖康間陳公東上書厯詆時政忞非之以為君子思不出其位東以言得罪忞為賦挽詞有勇期探虎穴狂乃犯龍鱗之句紹興初駕幸京口思東之忠贈恤有加而忞顧於此時以順㫖黜議者以是知制行之難張綱字彦正金壇人幼無兼侍父以家務委之晝躬幹濟夜則讀書以舉貢貢辟雍升太學試内舍上舍皆第一政和四年釋褐授承事郎玉音宣諭張綱三中首選可特除學官蔡京與司文柄者不協後累月始除辟雍正明年除國子正時蔡京用事士無大小皆出其門綱初賜第旅進一見後絶不徃六年除辟雍博士召對首論用人當别邪正不然恐小人得志邀功生事又論奢侈之弊由人主躬行不至皆切時病上改容嘉納除秘書省校書郎明年罷奉祠宣和二年依元豐法并祠祿罷三年再除校書郎兼修國朝㑹要朝廷議遣童貫蔡攸宣撫朔方綱上疏引易大君有命開國承家小人勿用必亂邦也以諫不報案九朝編年宣和四年四月命童貫蔡攸帥師巡邊鄭居中力陳不可此書又載張綱上疏云云可以補九朝編年所未備尋除著作佐郎五年為屯田員外郎時王黼秉政綱疾之雖同寮以職事見亦托疾不往一日上取班簿指綱名謂黼曰此人馳譽文塲行實相稱可與近上差遣黼尼不行七年改司勲員外郎其冬北敵渝平兵及畿甸率同列晝夜乗城比解嚴乗城者遷秩獨愧不受靖康元年欽宗登極以親疾丐歸除兩浙路提㸃刑獄陛辭上宣諭知卿不阿權貴操守方嚴比歸甫浹旬即頒召命大臣傳上意欲以長風憲力辭得請及聞二聖北狩遂移病棄官建炎元年髙宗登極駕幸維揚祗召未行再除兩浙提刑紹興二年改江東以戎馬初息民瘼未蘓徧巡所部多所罷行州郡常餽毫髪不受公廨所列什器亦全而歸之召為左司郎中三年正月兼中書門下省檢正諸房公事二月除起居舍人五月除中書舍人兵興以來史事乆廢詔趣論譔而秘書權輕闗㑹稽失建言乞依祖宗故事委大臣兼領遂為定制四年除給事中申舊制以裁倖恩凡挾有勲勞者皆不得騁人服其公兵荒之餘民窘衣食奪攘以茍旦暮事定而仇怨告訐無巳時綱奏乞截日蔽囚後有告者勿受報下咸欣然若更生㑹戍卒有奉文書至瑞昌縣者怙勢為令所囚主帥訴之令坐罷綱直令寃不報自以不得職丐祠提舉江州太平觀五年除徽猷閣待制繼丁内外艱執喪盡禮秦檜雅知綱賢數從所親問無恙且恠絶弗通問所親馳報綱不答越嵗又詢及之所親懼勉之曰縱不求福安可待禍綱曰吾少不幸值王蔡用事尚不為屈今齒髪巳衰俯首何為卒弗與通尋上章請老二十五年檜薨上躬覽萬幾圖任舊人不閲月落致仕召赴行在除吏部侍郎尋兼給事中二十六年正月兼侍讀尋權工侍二月權吏部尚書五月金國賀生辰使敬嗣暉入見奉詔館伴嗣暉謂其副曰我自幼聞此公姓名今尚在耶執禮恭甚彗出東方詔士庶實封言事案宋本紀彗出東井時在六月則井星至西方矣與此書所云彗出東方異東方或為東井之誤又本紀不書求直言此書足補本紀之闕由是言者猥衆綱言求言不可不廣聴言不可不審葢恐疎逺之人銳於納忠有彊出新意取便一時而悠久有弊上嘉歎尋除中大夫參知政事時其子堅巳為國子監簿亟請罷任予祠以革近世大臣進任子弟之弊自是宰執子弟皆引嫌初秦檜以嚴刑峻法鉗天下更化以後務行寛恤綱以頒降重複官吏不能盡行百姓不能盡知且慮其間或自相戾乃建議令有司刪煩撮要得八十餘事鏤版宣示由是德意下達貳政朞年政事多所建明必歸功同列人物多所論薦必歸恩君上以衰丐歸章相繼五上上察其誠乃曰卿先朝老臣出處可觀今之求去葢欲全進退之節豈可以朕故妨卿然卿筋力尚壯當為朕卧理一郡綱懇辭上曰比年執政無善罷者宜勉為朕行以彰朕體貌大臣之意遂除資政殿學士知婺州陛辭之日問異日所以為治之要甚悉且曰舊德去朝相見無日意悽然不懌既下殿仍宣坐賜茶至浙江亭登舟矣復遣中使賜御札一封通犀帶一條葢自秦檜當國援同巳者為執政稍逼巳則斥逺之故有朝為執政而暮若旅人者比公之去上恩繾綣而一時縉紳上自宰執下至百執事皆送别江上冠葢之盛南渡所未有至婺奉行寛大惟恐不及本州嵗以綾羅輸内庫逋負重積綱奏除之又增大禮買羅之直民迄今被賜在郡按令受祿婺境工於織羅比歸家人不識尺寸既數月曰可以休矣遂上印還家築亭曰喜歸一時名士多形賦詠三十一年上幸建康道出京口朝於行在所上慰勞加厚孝宗受禪復召赴闕固辭乃免詔所在州常加存問仍賜羊酒乾道二年以疾薨年八十四有華陽集四十巻書解三十巻六經辨疑五巻確論十巻告猷集三巻聞見錄五巻瀛州倡和八巻而書解尤為時所尚業書者必稽焉綱篤行君子事親孝親沒追慕白首不衰祖母在堂再乞以妻恩回授初郊任子以奏叔父既謝事許上其子若孫三人奏羣從從姪有既受命而夭者復以郊恩官其弟繼又念曽祖之後惟一人未仕亦以郊恩奏之其意以為巳之祿秩皆先世之澤故欲與先世之後共之自起家至貴田不加益曰先世之業能保守足矣何以多為居母喪時有榖千餘盡以貸貧民既而焚券曰吾以代世俗緇黄之費若施予足以資冥福亦庶幾矣子堅孫釜堅字仲固郊恩補承務郎再擢紹興甲戌進士第監臨安府新城税楚州鹽場鎮江𣙜貨務門征𣙜二職闕至不上鹽場甫上即歸皆以無兼侍不忍去親及湯公鵬舉為御史中丞薦為臺簿父綱亦以耆德召父子聨舟東上時以為榮引嫌改國子監簿㑹綱晉參大政遂畀祠禄語見綱傳綱解政除太常寺簿數月以親養諗通判建康府闕至復丐祠連丁大艱率禮無違服闋除將作監丞改添差通判常州秩滿差提舉福建市舶陛辭之日上厯言舶司之弊且問經畫所先對曰臣敢不率之以身繩之以法上稱善明日宣諭宰臣謂遴選得人到任一以嚴自律治藥須乳香亦畏不敢市朝廷嵗降經總制錢及度牒博買乳香數常不足堅請𣙜貨務自今變買乳香並留錢十之三專充本錢自是本錢有餘舶商無滯三佛齊番首致生銅求造瓦於泉州歸以飾佛寺朝廷從之堅言是欲並縁以洩銅寳詔以銅還之舶商懾服以勞加直秘閣故事舶司任還不該奏對上聞舶司治蹟特令内引堅奏疏謂朝廷以度牒買乳香乳香多積無益度牒多出有害乞毎嵗量度所積以為買納之數又奏乞免抽解畨藥上曰卿在泉南措置舶司極齊整前劄所陳當令大臣與卿商量後劄極是是日御批付丞相葉衡張某劄子甚合朕意乳香非𦂳要物且欲住買卿可與詳議明白衡以堅所議入奏上大悦進直寳文閣知泉州兼提舉舶司巳差下提舶蘓峴候堅滿日赴上堅謂郡與舶司體實相制兼官非便辭極力峴始得上而於陛辭之日戒以每事必與張某商畧堅聞之益感激自厲到任蠲宿負翦逋冦扶弱抑强為旱禱至徒行十有五里應期澍雨初紹興間閩部行經界法獨汀漳泉以冦阻自是因循堅奏行之民以為便而寓公多不悦從中沮止堅亦以目眚丐祠除江南路轉運判官案容齊三筆云余於江西見轉運判官張堅衣緋張嘗知泉州紫袍矣是書載堅除江南路轉運判官在知泉州之後正與容齊三筆合江西葢屬江南路時方救荒擇所部廉明吏為局官講明於上俾局官各擇所知奉行於上故所行無非實政又以為議所以予之不若寛所以取之蠲所部租以石計四十三萬二千錢帛稱之民持布帛竹木果實入市並除其税居一嵗興元擇牧難其人遂畀帥節在興元教閲義士勸課農桑惟日孜孜郡境髙卭多苦旱乾有水出褒谷從髙注下漢曺相國作三大堰資以溉田利周四縣夏六月三堰俱壞丁夫不可驟集而義士不可擅興堅曰擇禍莫若輕與民以廢堰而饑寧帥以擅興而罪即出伍符起義士身自督役不旬日三堰俱復民甚徳之而堅以勤瘁得疾八月除户部郎中四川總領視事甫旬日卒釜字君量早孤以綱廕入官綱秉政與父堅同時引嫌請祠綱罷政告老仍丐祠歸養不調者十餘年好學工文屢中鎻㕔試主管江東安撫司機宜文字通判饒州淳熙五年擢進士第知廣安軍不赴知興國軍池州除湖南提舉廣西運判加直秘閣知廣州初在江東佐知府劉公珙行荒政有勞秩滿進便宜十事孝宗嘉之興國旱繕廢陂築水櫃三十八所自是磽瘠皆為膏腴承平時黄河築掃市士卒之衣於興國南渡不蠲反易衣為錢責以嵗輸民以為病釡請於朝欲除去未能則捐公帑之嬴以代下戸之輸至池州首蠲諸邑負租錢十二萬緡米數千斛又罷無名之額八萬餘緡既田里樂生則又減𣙜征以惠來者新武備以戒不虞收屋僦魚租以養士節燕游餽問以資士之薦送者湖南檢覈常平劄建社倉䘏水災修水利惠民有局安養有方杜差役之紛爭許絶户之立繼衣食皆足惠利無窮而又以其餘閒訪問名徳之後如劉公安世之孫胡公宏之子皆薦進之以厲風俗廣西二十五郡山嶺重複道無居人驛鋪相望動以一舍行者無所憩息人或暍死每二驛增其一建屋鑿井植以佳木具器用置傳卒募民耕旁近田以食其利仕於嶺表貧不能歸者創出嶺錢以資遣之鹽法屢變農末交病初許客販而富商壊於變法税户困於抑配及改為官販則患額太重乃計諸郡嵗鬻實數奏以為額而蠲其送使等錢十餘萬緡至今稱便復興安靈渠馬援李徽故蹟漕運灌溉兩得其利廣東没入吏貲以糴米得五萬斛時浙右饑有㫖富民入粟補官因勸諭冨民又得四萬斛悉航海達行在所都城糴價為之立減罷苗米餘耗凡下户皆得合零就整命關市無得並縁收米麥薪炭之征籍廢寺産業嵗得錢三千緡米千五百斛以給士大夫之以喪歸者其不願歸者立廣恩館以居之士之試禮部給道里費視池陽加倍遂為定式比去猶蠲屬縣負租二萬九千餘石以他錢補之召還除度支郎中淮西總領過闗入對留為尚左郎中遷右司擢殿中侍御史諫議大夫兼侍講遷兵部尚書徙禮吏部兼侍讀除端明殿學士簽書樞宻院事以疾奉祠歸薨
