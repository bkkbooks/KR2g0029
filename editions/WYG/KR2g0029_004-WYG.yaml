body:
  text: 京口耆舊傳巻四翟汝文蔡淵子肈等蘇頌子嘉等洪擬姪興祖等翟汝文字公巽丹陽人父思字子久擢熈寜三年進士第自洪州教授除太學博士召對為御史起居郎出知越州應天府卒其論頗是熈豐而非元祐汝文登元符三年進士第為養親十年不仕親喪廬墓三年服闋大臣有知之者除議禮局編修官徽宗召對除秘書郎同列有請議封禅者汝文援王通柳宗元語斥之遂以詆忽治功譏侮盛典謫監宿州税召還為著作郎遷起居郎欽宗出就外傅以汝文勸講儲宫尋召試中書舍人言者論其少從蘇軾黄庭堅逰學術不正不可當内史賛書之任除顯謨閣待制知襄州章再上降直龍圖閣知濟州未㡬再落職奉祠政和壬辰復職知陳州按宋史本𫝊但稱知襄州移知濟州此書云除顯謨閣待制降直龍圖閣宋史俱闕書又宋史本𫝊知濟州之後復知唐州乃知陳州此書不載知唐州與宋史異明年春除中書舍人一時更制樂章勒銘彛噐凡大制作皆出其手内侍梁師成寵冠一時位兼三事矯㫖強買百姓墓田增闢園池汝文言昔鄭簡公葬欲毁公族之廟與掌墓之室以行子産不可君子以為知禮今近幸之臣假詔夷人之墓以廣㳺樂之所非所聞也師成怒黜守宣州山險民貧酒坊課重以負課繫者一百三十有八户為錢三十六萬八千有竒汝文奏除所負仍蠲半額除吏部侍郎未拜改知廬州移宻州宻負海鹽課甲諸郡自蔡京廢平凖為𣙜貨務始嚴刑以杜私販犯者推原經歴窮治黨與比汝文至狴犴充斥悉縱之東武多牛朝廷嵗須牛黄牛失黄輒瘠死民坐黄多破産者汝文奏罷之丐祠得請因上章謝事詔復奉祠明年召還東省復報罷欽宗即位除直學士院汝文以時事俶擾非辭難之時即日造朝上疏請遣使北庭立其後裔與為唇齒以抗金人因力詆和議除顯謨閣學士知越州聞二聖出狩集本道兵五千入援髙宗即位赦書熈寜以後獻利之臣增廣上供物帛其議裁損汝文奏浙東和預買絹嵗九十七萬六千疋越二十三萬五百按宋史本𫝊云越州乃二十萬五百匹此書作二十三萬五百二書必有一誤以一路計當十之三郡三邑經方賊焚刼餘亦户口凋耗臣祗奉赦書仰體惻怛之意已将第三等户以上減半第四等以下權行住罷及百姓丁身鹽錢近皆折帛臣已令只納見直制曰可而轉運使劾擅放物帛詔降官二等富民諸葛氏即居為樓臨通衢嵗久相𫝊為鬼物所據曠不復居塑像其上過者輙疑其為祟汝文命從像叢中闢為酒肆其患遂絶始至營壘不立軍民雜居不復知紀律汝文創屋三千楹既成躬按行其間㣲而七箸杯盂無不備具士卒感服以疾丐閒章十上始得請紹興初駕幸山隂復以翰林學士召未至除承㫖兼侍讀在職踰月除参知政事秦檜為相四方奏牘填委堂吏並縁為奸事多違滯汝文語檜専責都司程攷檜不省一日因對乞治吏之尤無頼者檜面劾汝文擅治吏汝文言臣位執政按吏而宰相見劾豈可無恥居位即力求去言官方孟卿逄檜意亦論汝文不合與宰相不協詔以散官就第按宋史秦檜傳檜奏置修政局自為提舉参知政事翟汝文同領之此書載汝文語檜專責都司考程蓋在同領局時與檜本𫝊曾統劉一止二人之事正相類而檜本𫝊于此一事不書可據是書補其闕汝文表謝因及檜之專政謂雖號参知了無闗預人才除擢但見畫於録黄政事施行一視成於牒檢時以為實録既歸謝賓客一以書自娯年踰六十丁母憂徒歩千里扶服歸葬平居奉先嚴恭毎祭必先掃除内外宿設位率族屬告於祖廟既夕迎主就位戒内外無或謦欬行歩不許聞履聲以謂祭求諸隂故昏而行禮屏氣山立餽奠拜祝如将見之質明竣事奠幣燎瘞奉祏返室再拜綏神而退自少至老雖甚疾必自力以范􅁮書語近辭冗事多􅃨見乃合𫝊注掇精要為東漢通史五十巻以士當為有用之學著圃學五巻又廣聞三巻人物志五巻曰亦足以垂世矣紹興辛酉薨年六十六葬縣之九靈山汝文善知人宰相呉敏范宗尹皆自布衣期以公輔秦檜為宻州學官一見異遇之曰公當位極人臣檜當國片言忤意者必被遷謫惟汝文免且再進職名端以此故自餘執政從官由其識㧞者甚衆尤工書米芾驚歎以為非唐賢所及圖畫及刻塑皆精絶為世所寳既沒其子裒其遺文三十巻曰忠惠集蔡淵字子雍丹陽人為人峭直刺口論天下事是是非非聞人有過面折無所隠家故饒于財兄弟以奢豪相尚淵獨擔簦以㳺四方若寒士寠人其攻苦食淡有人所不堪或勸稍分兄弟之財以自贍淵曰兄弟治産吾治書兄弟不以家事累吾吾烏可以身計累兄弟乎聞者愧之遂從王安石學于金陵時門人皆專經惟淵聼講不倦得兼通諸經擢熈寜六年進士第歴婺州司户晉州衛州河中府魏王宫教授通判荆南府召為大宗正丞出知㤗州海州其教授專以王氏之學政事亦惟守元豐法度終始不變奉祠十五年宣和元年年八十六卒家居治圃與賓客把酒賦詩以自娯醉墨淋漓常滿屋壁毛友銘其墓有云公之凛凛面折人者雖億刼人猶畏公于夣寐蓋其峭直如此肇元豐二年進士第父子皆名冠乙科初受州户曹迓者及門父淵語之曰以汝之才宜力于學而早汨沒于州縣吾甚惜之肇即却迓吏從王安石讀書于鍾山安石見之殊不悦但云後生何不出仕却來此寂寞之濵居數日稍與之語知其通敏過人頗異之因問曾閲内典否曰未也安石曰内典惟華嚴經最有理但部帙浩大非經年不能究也肇即借經寺中甫半月盡得其㫖一日安石論及華嚴疑義數處肇應答如響安石駭嘆其土山唱和詩有云從容與之語爛漫無不渉載車必百萬獨以方寸攝蓋嘆其記問之博也安石起知江寜廐有惡馬人莫能御一日兩校牽至庭下肇挽馬鬛而上疾馳百里而還故荆公集句戯之有曰蔡子勇成癖能騎生馬駒又有詩曰愛著青衫騎白馬日行三百尚嫌遲胷懐落落堪為将却是君王未備知蓋以文武全才許之後又從蘇軾㳺歴刪定官太學博士紹聖中章惇為相以肇為安石門下士鋭欲用之除衛尉寺丞按宋史及東都事畧肇本傳除衛尉寺丞之前曾通判常州元一統志亦同此書不載與諸書異議不合出提舉永興軍路常平元符中除禮部郎官崇寜中改吏部按宋史本傳肇出提舉永興軍路常平徽宗初入為户部員外郎並編修國史與此除禮部郎官及改吏部互異東都事畧本𫝊稱徽宗即位為吏部員外郎與此書合惟為禮部郎官二書俱載在出提㸃兩浙刑獄之後此載在前與二書均異言者論其學術反覆出提㸃兩浙刑獄罷知睦州有惠政張商英入相召為起居郎召試中書舍人前此試三題率以宰相上馬為之候肇援筆立成不加潤飾商英讀之擊節未㡬以草御史辛義責詞不合上意力丐去罷為顯謨閣待制按容齋四筆政和六年十月不因赦令侍從以上先縁左降同日遷職者二十人右文殿修撰蔡肇為顯謨閣待制證之此書肇罷官顯謨閣待制其前不著為右文殿修撰與容齋四筆互異知明州言者又論其與蘇軾徃還包藏異意非議辟雍奪職奉祠會赦復職宣和元年卒遺文三十巻曰丹陽集載字天任詩句雅健似李長吉為常州晉陵簿宣和末以宰相薦改官吿詞爾載以才見知于元臣謂汝久淹于選調逹于朕聼豈限常聞可授承事郎靖康中宰相李綱辟為御營司幹辦公事建炎中詔宰執侍從薦士端明殿學士董耘亦以載應詔皆辭疾不就以夀終蘇頌字子容泉人居丹徒國史有𫝊在縣之樂亭子十人嘉京携最知名嘉字景謨弱冠㳺上庠以靜黙自守方餘子羣嘲聚議嘉至輙肅然改容熈寜中公試對䇿力言時政之弊直講焦千之顔復皆一時名人得之喜擢在首選直講蘇液方事附會䄂巻以白執政執政怒千之等同列五人皆罪去嘉亦由是罷舉先是英宗即位父頌知潁州按頌本集載賀英宗皇帝登極表有云一麾在外顧官守之方拘與此書知潁州可以相證使奉表入賀授試将作監主簿至是遂調亳州司户頌知婺州從行過杭蘇公軾時為杭倅公讌外獨與嘉㳺累日唱酬盈軸呼以宗弟又以書薦之亳守楊繪稱嘉篤學有文而沈靜若愚剛毅不可犯繪亦厚遇之中間避親嫌凡再易任後知襄邑丞蔡京提㸃開封府縣鎮公事深相接納一日怒黎驛廵檢樊説使嘉亷其過嘉笑曰某豈為人鷹犬者耶京意大沮由是遂絶髙麗入貢當凝沍之月敲氷進舟中貴人陳衍督役驅所在令佐戎服即事嘉獨冠帯坐胡床衍大怒奏嘉慢令詔下體量得釋王冲冦京西侵軼畿甸燕順督捕南向坐而揖客坐東西向嘉望見不謁而出事聞順坐贖銅其不畏彊禦類此秩滿引對神宗記太學對䇿事且問樞宻承㫖張誠一嘉何如人誠一對不知遂不用改秩知富陽縣閲月庭無留訟當路交章舉最蘇軾亦云富陽之政古循吏無以過元符元年劉贄辟看詳訴理除太學博士有㫖與寺丞以父為相引嫌下遷太常寺簿頌罷始遷太常博士出通判常州坐看詳訴理事停任丁内艱服闋復召為宗正丞未赴丁父憂值再立黨籍不復出任奉祠凡十有八年郡守毛友為郡人蔡子雍作墓誌稱嘉春温雪潔退然長者人也言若不能出諸口聞人之過不忍言之亦惡聞之規矩其行不肯一蹈繩墨之外所謂和而不同清而能容物蓋其暮年所造如此宣和三年致仕靖康元年盡除黨籍召用其人嘉已失明矣建炎二年避亂卒于金壇葬上元鄉去茅山十里京字世美以父任為假承務郎授雄州防禦推官監江寜府税務王安石聞其所為歎蘇氏之有子辟忠武軍節度判官陽翟民相擊殺獄已具而京疑其寃已而得真殺人者許人神之改秩知丹陽縣建夀堂於㕔事之東嵗時迎侍徃來邑人榮之至今呼曰相公堂邑有練湖蓄水以濟漕渠嵗久湮塞比嵗告旱京因旱募民浚湖復度地之宜易置斗門十數以時瀦洩是嵗民不知饑繼是湖水有餘公私兩便為察訪使孫傑過聼劾去丁父憂服除簽書昭慶軍節度判官㕔公事武康吏陳昱犯法令遣吏捕輙殺之尉自徃復聚惡少以拒事聞下監司合諸縣兵委京督捕京請不煩兵自至武康諭其徒曰官所欲得者昱耳爾曹無名速出見我不然且併死皆拜手躍出昱遂授首通判沂州一日覧二疎事喟然感歎投劾而歸遂不仕政和七年四月終于家葬丹陽長岡㳺酢誌其墓攜字季升頌之季子頌自濠赴御史臺對陳世儒獄按頌本集有到濠謝上表其追述之詞有云累速人言上煩詔鞫獄詞既具國憲寜逃又有濠州到任謝二府啟云豈意吏曹之乖謬致煩詔獄之推窮無由自明分甘重責荷上恩之含垢原所坐之因人止免一官仍除善郡據此則貶濠之前頌嘗有對獄之事考此書明云頌自濠赴御史臺是對獄又在到濠以後與謝上表及謝二府啟似異及考宋鄒浩道鄉集有所著頌行状載頌為京尹時失出祥符令孫純罪有詔鞫治降授秘書監知濠州則謝上表及謝二府啟中所云也行状于謫濠後又載頌以陳世儒事被劾御史臺自濠赴臺置對則此書中此條所云也二事本不相䝉故先後互異又考頌本集有元豐己未三院東閣詩十首其自序謂予自濠梁赴臺訊鞫與此條正合其十首之一有罷尹一年重置對之句蓋到濠以前及到濠以後其置對者凡再故云重置對是亦一證也攜年十三隨至京師僦舍御史府前朝夕入問起居状間詣宰相府訴寃事由是得白按汪藻浮溪集徽猷閣待制蘇公墓誌云丞相自開封尹知濠州赴御史臺詔獄公年十三隨至京師僦舍御史府前朝夕入問起居状間衣舉子服訴其誣于待漏院宰相呉正肅王文恭見其警敏召至前與語竒之事由是得白可與此書相證攜亦以此知名少以父任再轉為武成軍節度推官按浮溪集蘇公墓誌云公用父任為瀛州防禦推官調監澶州河北倉草場秩滿授武成軍節度官與此書所稱再轉可以相證有二死囚當論􅂝不可守怒欲按之攜不為囘二人卒免死按浮溪集蘇公墓誌云公官武成時行縣吏送之郊顧謂吏曰某盗二人于情于法皆可生胡不讞吏曰諾及歸守迎謂公曰官吏亾頼至擅出人于死既曰強盗矣有可憫者乎幸吾二人不與也亟治之公曰使紓此獄者某也某當坐耳且為言其所以生之状守大怒将并案公公不為囬而二人卒不死父喪服除按浮溪集蘇公墓誌云秩滿授武成軍節度推官丁内艱免喪監潤州織羅務㑹課最改宣德郎以丞相春秋髙請閒就養得管當南京鴻慶宫徽宗皇帝立轉通直郎賜緋衣銀魚丞相薨據此則以通直郎丁父喪不以武成軍節度推官與此書詳畧互異以兄嘉入黨籍監兖州東岳廟尋知丹陽縣丞會令闕攝官且二年當髙麗入貢吏並縁為姦所過騷然􅂝先事為備故使者過而民不知嵗饑行賑濟朝夕親臨民被實惠通判廬州去郡民相與遮留至於罷市因中丞蒋猷薦為御史臺主簿三遷為尚書倉部郎中按浮溪集蘇公墓誌云中丞蔣公薦為御史臺主簿遷光禄寺丞改大宗正尚書倉部郎中與此書所稱三遷可以互證長貳将請于朝嵗漕冬初至者監司若州縣皆坐之時去禋祀止數十日而漕至者未半攜持符不下白其長曰符下則坐者無慮數百人禋祀恩皆格不行無乃已甚乎時人服其長者擢衛尉光禄少卿按浮溪集蘇公墓誌云經郊祀恩賜二品服擢衛尉少卿久之移光禄此書不載賜二品服與墓誌銘詳畧互異紹興初召赴行在除宗正少卿中書門下檢正諸房公事知温州皆不拜紹興十年召為太常少卿翌日除權尚書刑部侍郎少留以疾告老除徽猷閣待制致仕卒按浮溪集蘇公墓誌云公卒年七十六時紹興十年正月九日此書稱紹興十年始召為太常少卿歴刑部侍郎徽猷閣待制中間仍有留拜乞老之事則不以是年正月九日卒也可知然生卒年月墓誌决無謬誤此書紹興十年十字當為𫝊寫之訛亦葬長岡汪藻撰墓誌庠字養直丹陽人其先泉人丞相頌之族庠父堅字伯固有詩名文忠公蘇軾過九江堅時為縣主簿多所唱和軾和其九日詩有紙落雲煙子患多之句後軾再過九江又有詩序云昔在九江與伯固倡和其畧云我夢扁舟浮震澤雪浪横江千頃白覺來滿眼是廬山倚天無數開青壁昨日又夢伯固豈復與伯固相見於此耶今得來書已在南華相待數日矣感歎不已先寄以詩詩前四句云扁舟震澤定何時滿眼廬山覺又非春草池塘惠連夣上林鴻鴈子卿歸其相與如此晚為建昌軍通判致仕卒庠幼嘗一就舉中程以犯諱黜由是悟得失有分安貧守道不復事進取堅得任子恩庠弗受以屬其子沉酣詩酒寄傲江湖間其為詩頴發語出輙驚人嘗作清江引云屬玉雙飛水滿塘菰蒲深處浴鴛鴦白蘋滿棹歸來晚秋著蘆花一岸霜扁舟繫岸依林樾蕭蕭兩鬢吹華髮萬事不理醉復醒常占煙波弄明月蘇軾見而竒之手書此詩云使載在太白集中誰復疑其非是者乃吾家養直所作自此詩益豪雅㳺故人皆一時名士東湖徐俯尤相厚善曾慥䟦其遺文云舊聞宗匠推詩匠親見東湖説後湖蓋著其實云紹興三年正月俯在樞近薦於上令赴都堂審察辭病不起三月詔再下令州縣以禮津遣郡遣簽幙及縣令詣門再以疾辭詔㫖督促就道庠聞命下即扁舟逺引終莫能致天下士無問識不識皆髙其節好事者徃徃圖其形以相贈遺為之賛頌者不可勝計有得片紙隻字者輙藏去為榮庠雖棄置人間事而見義勇為本其天性其子嘗以錢數百緡買隣人之居以庠出外未告也庠歸而聞哭聲問之其子具以告且言隣姥将遷而哭庠知而惻然亟焚劵以屋歸之不復問所酬晚嵗頗事養生之術有道人江觀潮者贈以藥令俟有急服之間數嵗得疾㡬殆其妻取藥磨以飲之有頃而甦體更康徤紹興十七年訪舊於金壇之洮湖醉而吐覺所吐有異疑藥力去矣已而卒曾慥序宋百家詩言其嵗旦與家人别且辭隣里翌日東方未明披衣曵杖出門行歩如飛妻孥奔走不及蓋𫝊聞之誤余世家丹陽先君知其死為詳近又從其孫嚞借家𫝊見其叙得疾洮湖之因甚明而好事者援以實道家神仙之説過矣弟祖可祖可字正平少以病癩為僧江西人目為癩可徐俯為作詩引云伯固毎稱余季之才養直數言余弟之美一日伯固集客皆文士出詩數首人皆驚歎問誰所作則可師也然後知伯固譽兒而非癖養直舉親不避余特深知之蓋㳺刄有餘遣言不滯源源而來多多益善自為僧居廬山之下登髙臨深窮幽極逺北望九江南望彭蠡取隂晴之變風雲之㑹水石林木春秋霜露千變萬態皆發於詩其發源也以家學及其成功自建安七子南朝二謝唐杜甫韋應物栁宗元本朝王荆公蘇子瞻黄魯直之妙皆心得而神觧餘波所及䝉潤者多近嵗江南髙僧逸民出語可觀皆可之化也俯又嘗為畫虎行卒章云只今耆舊無新語尚有廬山病可師其推重之如此曾慥嘗從俯誦可之詩如谷口未斜日數峯生夕隂霜清羣葉脱盡見山西秋茅簷欹送晚苔徑曲邀春皆警䇿無蔬笋氣在方外衲僧誠不易得但公之稱許無乃過乎俯彊辯不可屈洪擬字成季丹陽人應上庠及選試南宫皆為春秋第一擢紹聖元年進士甲科為忠正軍節度推官辟濠州團練推官捧檄行縣宿禪窟寺聞有僧聚書數千巻誦讀晨夜不休擬識其姦曰是非釋子所為異時必挾此以動衆歸語鍾離令遂出之其後果謀不軌即張懐素人服其先見改秩為邵武軍常州教授入為太學國子博士按宋史擬官國子博士不載忠正軍節度推官及濠州團練推官當以此書補其闕以元祐内舍不為在勢者所引久次學省出為利路提舉學事就移福建罷歸差通判鄆州再除廣西北路按宋史本𫝊作京西北路與此書所云廣西北路異廣字當為京字之訛荆南河北東路並提舉學事召為監察御史遷殿中御史在福建時以闢學門事為知邵武軍栁庭俊所奏罷任久閒其後桞為侍從擬為御史一以誠待之無㡬㣲見於顔面栁後厯典名藩毎對人自愧前事而服其容德京西月給七十萬錢據舊籍取其半會廢京西鐵錢郡以擬俸入鐵鏹殆半遣僚屬獻議易之官庫擬不可曰吾寜棄不用不可以私紊公凡所居月得廪粟亦必概量而後入其清謹如此周旋三院首尾六年時王黼蔡京更用事京且復相以擬不為黼所用意且附已使人微撼之擬笑曰唯之與阿何以相逺吾知中立而已京怒送吏部出知信陽軍未赴改海州代歸奉其母居郡城以供甘㫖會趙萬之變郡不能禦時母年八十九奉之以匿民間夜遇風雨則以身覆之再為賊所及守死不去賊感其義竟母子俱全髙宗駐驆維揚召為秘書少監以母喪不赴服除召為起居郎執政李囬富直柔等以李成兵盛吕頥浩不能克請親御六師移蹕饒信間以逼之乃詔江湖川廣所輸上供悉寄樁信上擬謂捨四通五逹之都而趨偏方下邑非所以示恢復形勢上疏極論議以是寝按宋史本𫝊載擬諫阻髙宗駐驆饒信事在遷中書舍人之後此書載在前與宋史本傳異遷中書舍人詔臺諫侍從條上弭盗之術擬言兵興累年饋饟悉出於民無屋而責屋税無丁而責丁税不時之須無名之歛殆無虚日民所以去而為盗今閩中之盗不可急急則變益大宜講所以消之江表之盗不可緩緩則勢益張宜求所以滅之又謂豐財者政事之本節用又豐財之本以之屏盗以之却敵無不可者上皆然之尋除給事中兼侍讀遷吏部尚書丐外以龍圖閣待制知温州宣撫使孟庾總大軍討閩冦道永嘉擬以庾逗留趣庾赴援庾怒乃於饋饟外責以犒師云犒已即行擬初以捕冦非本州事故不為備庾言甫脱口衆即隨擬入州言語訩訩擬亟借封樁錢用之事已自劾上嘉其識變詔書􅇺勞仍進一秩明年復召為禮部尚書兼權吏部南渡草創一時禮文多所訂正省部條例出於省記吏縁為姦至是修七司勅令擬實總之凡所更定衆論惟允事經郎曹多有曲筆長貳相承不復可否擬悉裁處其中是年淮甸再擾問攻守之䇿擬對國勢未固将士未練財用未裕可以言守未可以言戰戰守之備要在去冗食節浮費時以為當三年秋以地震求直言上疏厯詆政事之偏謂非所以下順民心上答天變於是執政切齒即上章丐閒遂以徽猷閣直學士奉祠九年再知温州既到任復以前職奉祠紹興乙丑三月卒年七十五初以避地居台之寜海因家焉諡文憲姪興祖興祖字慶善政和八年擢進士第賜上舍出身主陳州商水簿試中教官除汾州教授改越州未赴攝太學博士丐便親除湖州司士曹用薦者改秩就除州學教授俄拜太常博士丁父憂服除召試館職除祕書省正字遷著作郎尚書駕部員外郎半嵗三遷人以為榮會地震求言以所言切直與擬俱罷丐祠除知廣德軍所𨽻二邑田多髙卬常以旱告興祖既至即相原隰量逺近興陂塘六百三十有四嵗以屢豐郡有張王祠毎嵗夏五月椎牛乞靈殆傾城邑興祖躬禱於神代以他供而申屠牛之禁俗以是革秩滿奉祠除江東提刑罷任久之猶坐涇縣魔冦竊發鎸二秩知饒州以母憂不赴知真州時兵荒之餘民不復治南畝上疏請除田租一年以勸耕者既得請而㳺惰未盡復則請更除明年田租由是襁負相屬耕耨以時墾荒田至七萬餘畝㑹浙右饑相携就食者不可勝計秩滿再知饒州舊例民有婚葬官抑使市酒吏縁為姦小不慊有破家者民不堪則寜因循不舉興祖知之下車即弛其禁於是同日婚葬者至數百家其他政多可紀丐祠得請民欲其留列治状以叩外臺者日數千人外臺以聞詔令復任未㡬昭州之命下初紹興十七年秦檜當國興祖見之私第坐間論乾坤二卦至坤上六隂疑於陽必戰興祖謂隂終不可勝陽猶臣終不可勝君嫌於無陽惡夫干正者檜以為譏已大怒謂興祖曰前軰自有成説今後不須著書聞者知其必重得罪而興祖自視無愧處之恬然按宋史本傳不載興祖與檜論乾坤二卦事可以據是書補其闕後知真州因程瑀觧論語求興祖為序序引瑀解夫子弋不射宿以為聖人不隂中物又取瑀發明聖人忠厚之言所謂不使大臣怨乎不以者表而稱之以為讀至於此使人流涕後七年京西運判魏安行鏤版檜見之疑瑀興祖借周孔議巳令王珉上言謂瑀不可取聖人之言肆加臆説興祖不合為序乞重作行遣檜以珉疏論興祖不力令董德元再論序中感發夫子之一弋流涕周公之四言果何等語送刑部定法縁法無所坐故刑部長貳韓仲通等直擬編管韶州至韶半年卒按宋史本𫝊但云興祖坐作程瑀論語觧序語渉怨望編管韶州以此書證之乃為詳盡興祖經學明甚議者謂其早以此名譽晚以此賈竒禍更化之後其子上書訟寃始加䘏典平生論著最多有春秋本㫖二十巻周易義二十巻古易考異十巻古今易總志三巻論語説十巻左氏通解十巻孝經序讃一巻聖賢眼目一巻補注楚詞十七巻韓文辨證年譜各一巻注黄庭内外經二巻編次闕里譜裔一巻其説論語注楚辭近世侍講朱熹多采用之從兄造造字彦襲擢政和戊戌上舍第授歙州黟縣尉方臘起睦州連䧟郡縣睦距黟為近造與蘄門尉王季淵分據險阻造據狹原嶺冦至輙獲而來者相繼懼不能免則以書遺其家使間道奉親以歸而身當其衝賊知不可破乃引兵三千攻季淵所據安坑嶺季淵遁走造不得已獨引所率與賊相持賊不敢逼㑹假守不察以安坑失守為造罪遂繫之而遣他将拒戰賊大喜他将旋敗明日賊入城首出公於獄擊殺之曰是復能拒戰否聞者泣下賊平弟逴始得其事於黟之故吏輿魄歸葬而訴于朝宣和六年冬誥故廸功郎洪造夫士有忘身殉國而功弗白於當世者朕悼之乃交言爾以寡擊衆勢不屈歸從吏訊卒殱賊手有司驗實如章是用贈以通籍之秩而禄其子庶㡬明爾忠憤之志而天下忘身殉國之士亦可以少伸矣毅魂有知歆兹無斁可特贈通直郎與一子将仕郎
