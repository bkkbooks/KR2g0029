body:
  text: 京口耆舊傳卷二米黻子友仁虞申曽布弟開從子統等俞康直王漢之弟渙之等許㿩孫藎都潔楊樗年張扶弟瑾吳交如霍箎田曉薑謙光劉倬等米黻字元章自言黻即芾也故又作芾太原人其父嘗家襄陽未幾遷丹徒故國史書曰吳人其先以武幹顯母閻氏與宣仁后有藩邸之舊以恩入仕芾生而穎秀六嵗日讀律詩百首過目即成誦刻意文詞不剽襲前人語經竒蹈險要必已出以崖絶魁磊為工作字遒徑晚更沈著雜有晉唐風流其畫山水人物自成一家尺縑寸紙人以為玩尤工臨摹至能亂真精于鑒裁一經品題價增數倍所與遊皆一時名士元豐初以詩編贄見王公安石安石摘句書之便面蘇公軾尤愛重之集中有睡起聞元章到東園絶句自嶺南歸至白沙絶筆也其往還尺牘有云嶺海八年念吾元章邁往凌雲之氣清雄絶俗之文超邁入神之字何時見之以洗瘴毒今真見之兒子于何處得寶月觀賦琅然誦之老夫卧聽未半蹶然而起恨二十年相從元章不盡其推重之如此補袐書省校書郎為含光尉知雍丘縣漣水軍使發運司勾當公事入為太常博士出知常州不赴奉祠除知無為軍踰年召入為書畫學博士擢為禮部員外郎以言者罷知淮揚軍彌年瘍生其首卒年五十七案蔡肇所作墓志亦云卒年五十七宋史作四十九誤葬黃鶴山詔賻其家百縑仍官其子芾平居超然若不事事至官則率職不茍時亦越法有所縱舍家故饒財既仕悉以分族人所至喜登覽山川擇其勝處立宇製名來者莫能廢過潤愛其江山遂定居焉作寶晉齋聚法書名畫其中北固既火結庵城東號海嶽日吟哦其間為京口佳絶之觀其風神蕭散趣尚髙潔雅不欲與人同故冠服效唐人所居輒置水其旁數頮以自潔其眉宇軒然進趨襜如音吐鴻暢望之皆知其為朱元章也子友仁友仁字元暉文詞書畫深得家法黃魯直贈以詩首句我有元暉古印章因命以為字陸沈州縣數十年紹興中髙宗留意翰墨尤喜芾書以芾平生篆𨽻真行草書分為十卷刻石禁中會有薦友仁者浸被簡知擢權工部侍郎敷文閣待制卒案宋史本傳云仕至兵部侍郎郎元至順鎮江志云官至户部侍與此書所云工部侍郎互異虞申字行父丹徒人始從鄉先生姚闢授易春秋略通大義姚因喻君使遊京師介謁胡公瑗一見竒其能以謂他日可任朝廷事留三年歸一時名流周伯堅孔常父皆作詩誦其賢惜其去舉禮部不合元祐中制州里舉士法郡守崔公度以君經行應選上之朝不報申資性和厚勇于赴義異時同産負大農錢既析資矣悉為償之仲弟死嫁五女費皆己出拊其孤如己子仲子沇擢紹聖元年進士第元符二年沇為弋陽尉迎侍以行卒于官舍蔡肇為作墓志所敘如此曽布字子宣肇字子開建昌人皆居丹徒案至順鎮江志布建昌人與此書合輿地紀勝作南昌人與此書異又考方輿勝覽布于熙寧初守潤州有宅在千石墟之東今為統制司酒庫國史有傳布薨諸子避亂徙居肇八子統最知名統字元中以恩補太廟齋郎調州縣官以黨人子輒罷父喪服闋𬋩在京編估局改秩復從外補久之以禮部尚書蔣猷薦除福建提舉常平改京東未赴而提舉常平罷案宋職官志建炎元年罷提舉常平二年復置旋罷髙宗駐蹕揚州召為工部員外郎南渡除廣東提點刑獄時隆祐太后至虔州從衛軍潰其將傅選以萬人據郴州且趨嶺外或勸統避之統曰韶當賊衝巳若先去即人人奔散賊勢張矣且其麾下皆我師未必人人有叛心招之宜定乃遣人矯太后旨安撫之果受命一路遂安入為屯田員外郎時秦檜為相置修政局兼檢討官統言丞相佐天子理天下事事無不統何局之設後竟罷遷樞密院檢詳諸房文字左司員外郎擢殿中侍御史賜出身首上章言陛下即位六年之間論相者七人一有進退則自臺諌侍從百執事隨以升黜適足以使比周成風公道蔽塞乞明詔大臣消朋黨之萌開公正之路政無先後惟是之從人無彼此惟才是用繼論宋輝交結宦官不可尹天府霍蠡刻薄不可専財計遷祕書少監乞復史館修撰之職又遷起居郎乞依故事直前奏事與時相忤以祕閣修撰出知秀徽饒三州中間嘗議召用會有欲行手實法以五等出賣户帖者巳而手實不行但據籍髙下輸錢給之統言不可復與時相忤命遂格饒州召還除太常少卿又除殿中侍御史未上拜諌議大夫論經制使本户部之職不必更置一司淮南為吳會屏蔽宜且蠲經賦諸路將兵恣橫宜稍還節制于州縣臨安和買蠲閣之數不宜均敷于本路皆見施行會足疾懇祈補外除徽猷閣待制知婺州卒于嚴州年六十七歸葬金壇縣方山之原統文獻故家藏書素多紹興間重修國史諸老淪謝無所訂正成書不繆足以傳信統之力為多四子恂字孚仲其孫見居金壇惕字強仲子㬇為吏部尚書嘉定中卒亦葬金壇以徙居常州不載俞康直字之彥丹徒人父希言始自歙之黟縣來居用從祖太尉獻卿恩補太廟齋郎主潮陽簿為杭州觀察推官范公仲淹為守以政委之杭之蜀山民冒鬻鹽之利刑不能禁康直請設官置場民喜速售而重犯法公私便之為泗州軍事推官民有清明日盡室出遊者盜乘間入其家逰者還知盜未出遂圍之盜計窮縱火幸火而逃案具將置極典康直以為盡室以出非有人居止之室幸火以逃火非本心具獄奏讞執政者是之得減死論改秩知舒之桐城監廣州市舶代還簽書武寧軍節度判官所公事通判睦州所至皆有惠政秩滿奉祠丞相韓公縝宰錢唐日與康直友善縝既相數以書招之康直謝曰崇故舊以厚風俗真宰相事然吾志定矣不可強也縝意不能奪家世有田在錢唐族人嵗擅其利康直置不問會他族訟于官歸田于康直不受以與其弟曰吾食粗給以􅓵汝弟曰吾父兄不知有吾烏乎有之亦不受卒以豫族人初奉祠時年五十七暨祠祿再滿遂請休致即所居東西為退圃逸堂遁軒逺樓終日嘯傲其間蘇文忠軾嘗為賦四詩今見集中其逺樓詩有地偏心逺似陶潛之句蓋以屬康直也居間幾三十年年八十三乃終其恬于名利固人所難能其夀考康寧得退間之樂亦人所不及也葬丹徒縣大慈鄉汝山之側曰京峴原實從先兆方康直父遷居時其從祖獻卿尚家黟縣至其子希旦亦徙丹徒希旦以朝議大夫知澶州卒于官歸葬丹徒崇德鄉釡鼎山子向終朝請大夫祕閣修撰提點福建路刑獄向之子長吉字幾先父任出官中法科由蘄州司法入為大理評事凡再遷為丞為正隆興初以才選除直祕閣知盱眙軍未幾卒長吉好尚清雅尤長于詩名所居曰葵軒暇日常賦詩鼓琴以自娛云王漢之字彥昭渙之字彥舟衢人皆居丹徒國史有傳漢之之後遷金壇孫光國厯泰州滁州通判卒姪植以漢之恩入仕終福州太平州通判植子烜字晦叔好讀書喜論古今治亂酒後耳熱道厯代南北離合五季紛爭事如身履目見年五十五始以植遺澤出仕監平江府比較務建康府大軍倉烜性瓠落仕非本志倉官垂滿不但志不干進抑已老矣會樞密曽公懷之子訪舊金陵邂逅同集見其飲酒數斗不亂議論英發貫通古今襟度軒豁無世俗齷齪氣以為是孔北海禰平原之流非餘子可擬歸而言之懷為遍發當路書亦會懷自樞廷執政不兩月薦書溢格遂改宣教郎知盱眙軍天長縣事歸而疾卒其友李天才字邦美所居距烜不逺時時杖屨往來天才豪于詩紹興間獻詩秦檜檜喜將言之上會旱求雨不獲天才題詩天竺寺壁間云走殺東頭供奉官御香頻降雨猶慳相公端坐都堂裏天竺觀音又下山檜聞大怒天才泛海得脫隱居終身許㿩字東叔丹徒人由鄉校貢辟雍政和四年以貢士釋褐案元至順鎮江志㿩以政和二年貢士釋褐與此書政和四年互異調福州閩縣尉間關纍載知紹興府蕭山縣舉最入朝遷大理寺正兼工部郎官權大理少卿紹興甲寅金使來乞還西北民之在東南者且欲畫江為界以益偽齊朝廷遣樞密都承旨章誼給事中孫迫報聘既還道由南京久為偽齊所留二家老幼狼狽輦下無為言者㿩慷慨奏疏謂人臣之義固貴于公爾忘私而人主則不可忘人臣之私人臣固貴于國爾忘家而人君則不可忘人臣之家咸韙其言而服其義秦宰相置大將嶽飛于理必欲文致反狀㿩不可出知南劍州以言者輟行家食垂一紀卒年五十八幼子蒼野字子齊以父任為衢州龍遊尉隆興初元擢進士第乾道五年中博學宏詞科由廣德軍教授召試除祕書省校書郎遷著作佐郎權祕書丞兼太常博士權倉部郎官容儀端整論奏詳明理宗甚器重之未幾得疾卒年四十三即今酉干之許孫藎字道祖丹徒人政和五年以上舍擢第為太平州繁昌主簿廬州合肥丞改秩知饒州鄱陽縣監在京抵當所髙密廣平郡王府大小學教授鼎州教授內王府教授省罷案宋職官志宗學教授之名始于太宗至道元年至英宗時詔年十五以上者三百九人增置教授五員即所謂大學教授也年十四以下者增置小學教授十二員至徽宗崇寧五年又改稱某王宫宗子博士則無復教授之名靖康之變宗學遂廢紹興四年始復置諸王宫大小學教授二員此書序孫藎為王府大小學教授在政和五年之後紹興三年之前乃仍蒙教授之稱則作傳者以舊名加之也書內似此者甚多又案此書稱為髙密廣平郡王大小學教授考宗室表徽宗第二子鄆王楷以崇寧元年封髙密郡王第二十一子捷以靖康元年封廣平郡王按之時代即此二人此書稱內惟王府省罷蓋據靖康之變宗學罷廢也餘皆以未上改差權通判台州以母憂不赴紹興三年差監尚書六部門權尚右郎官案宋職官志紹興二年置六部監門官一員元豐官制行置尚書左右選各一員紹興八年吕希常以監六部門兼權尚右郎官與㿩此職正同可以互證兼度支倉部出知興化軍知嚴州替奉祠起知真州秩滿知泰州就除淮南路轉運判官兼提刑知信州以壻樞密王綸帥建康避親丐祠其監尚書六部門上疏論今日用違所長不加曠官之責稱匪其人未坐繆舉之罰賞或及于無功祿不加于有德乞嚴察舉之科明黜陟之典知嚴州值大水聽民得預占髙阜及先具舟筏為備故水不為害朝廷以傳言之誤替歸將漕淮南以沿江盜賊出沒皆江海亡命徒黨衆多江流湍險非巡尉弓兵所能制乞下都統司令分差水軍二百人將官一員往來巡捕朝廷從之遂為定制自上饒歸不復出仕與後湖蘇聘君庠為詩酒之交年八十一紹興甲申嵗卒葬縣之馬鞍山即今大港之孫都潔字聖與丹徒人父郁字子文以易學為鄉里師終惠州教授潔少傳父學著周易説義張公九成為之序謂其有得于易異乎世之為説者晚又因左傳載晉蔡墨鄭遊吉等引易悟六位有定而卦變無窮著周易變體義十有六卷曽公幾為之序潔以宣和六年擢進士第紹興中以左朝請郎知德慶府實進易説義其後以左朝奉大夫為尚書吏部郎中進易變體義未幾以太府少卿為淮西總領時總司之權尚輕潔上言江東所屯見兵嵗費錢七百萬緡米七十萬石而監司守令恬不加意乞將弛慢之尤者按劾黜責以警其餘朝廷從之自是總司之權始重文移往復州郡無敢玩者楊樗年字茂良丹徒人娶吳越錢氏少師曽孫忱之女忱命以官監行在草料場兩浙轉運司幹官改秩知常州武進縣外除知秀州華亭縣華亭賦重加以嵗飢民不堪命樗年乃稍蠲賦入之無藝者縣計有闕則傾家資繼之曰吾不忍迫之羸民境多黃雀嵗醢以媚權要且百萬樗年至即嚴采捕之禁通判揚州代歸以母老丐便家得知真州至甫旬日以憂歸除喪奉祠尋知台州命未下改提舉福建市舶以老丐祠案周孚蠧齋鉛刀編有楊君行狀云子三人長樗年右宣教郎次櫟年承節郎次柏年此書不蕃樗年右宣教郎偶有所闕開禧元年卒年七十四樗年氣體魁梧言動詳雅為詩有清致尤工尺牘無一凡語事母孝嵗遇誕節集宗親鄉黨會者彌月楊氏族大樗年以禮率之月旦必具冠帶集其家擊鮮釃酒從容竟日四方士友欵門求見靡不納食客日不下十數來者衆而求者深故亦有觖望而去者樗年不創艾益招徠之其寬博好士亦人所難及云張扶字少持丹徒人博學有文為鄉先生所重遊太學年四十五紹興十二年始舉進士名在第四授明州教授再調太平州判官有薦者紹興二十四年春除權國子博士五月為直講六月兼權尚左郎官十月除監察御史二十五年春除右正言兼崇政殿説書十月除太常卿兼侍講執政以國朝之制太常例不除卿改國子祭酒案宋本紀紹興二十五年十月辛丑徙殿中侍御史徐嚞右正言張扶皆出為他官據此書則扶以右正言改國子祭酒與宋史所云出為他官異十一月以王珉等出使兼權禮部侍郎尋卒年六十自太平州判官回改宣教郎竟不及嗣嗣不競居官政治在朝奉請無一可考惟中興小記中見其嘗論曹冠則亦非専附秦者弟瑾字少瑜有俊才與扶同擢紹興十二年進士第為臨江軍司戶信州司理歸而不仕秦熺與之同年數從人寄聲欲見之義不往扶既貴亦勉其出仕輒顧而言他紹興三十年卒于里中吳大卿交如字亨會丹徒人性姿樂易重義而踈于財擢紹興十五年進士乙科為湖州烏程尉楚州鹽城簿紹興府嵊縣丞再中法科入為大理寺評事遷寺丞寺正除刑部郎官補外出知邵州民便安之會二弟俱沒丐祠歸葬郡人惜其去老幼遮道酌酒為别交如亦不忍違其民為之飲醮既别作懷民之詩以貽之郡人刻之石尋召赴行在再除刑部郎中遷大理少卿丐外除直祕閣提點兩浙東路刑獄公事未幾詔還舊著時朝廷以法令多所抵牾詔監司郡守疏所見來上建官設局重加定正大臣請主其事者上曰吳某長者可任大臣言其丐去甚力上曰宜勉留之明年淳熙書成復丐去大臣為言上曰吳某吉人安可使去居無何除大理卿明年囹圄空爾玉書嘉奬會刑部侍郎虛位上意有屬命且下而交如被病淳熙五年閏六月卒于位年六十一初交如之自邵州歸也倒囊得三千緡與門人丹陽朱商霖議所以營生朱言其里人孫生善治財可任交如即盡以緡錢委之孫以張肆未幾寖耗朱以為憂會交如過丹陽從容道所以且請過其家籍其見存者交如不答朱計窮俾孫生自以其意治具邀交如臨視朱因密啓交如酒三行則索簿籍點勘如前約交如唯唯酒三行朱目之不動卒席朱又目之顧而言他朱意其偶忘之也則顯言之不對朱恚而反至館問故交如曰子忍迫人于死乎朱曰何至是交如曰適與孫坐見其色窮辭沮奄奄然無生氣度其意甚慮吾輩及此若果及此孫不以憂死亦以愧死矣顧其家數口奈何錢物去來有分子無預焉可也時人服其長者霍箎字和卿丹徒人紹興初京口當戎馬之衝民窘于兵荒輕相賊殺箎父時為府史雞初鳴上府道遇婦人問府舍所在若將告變者箎父怪而問之不對則告之曰吾府史也汝有謁于府必介我然後達且天尚早麗譙未啓汝婦人旁皇其間能不為邏者執乎盍從我歸須辨色而入婦人以為然乃攜之歸屬其妻與為賔主私問之婦人具言本良家子失身為屠家婢其家常市婢數十閉之空室遇夜輒殺臠其肉以售而其徒不知也我幸以篤實見信待以家人誠不忍殺戮之慘故乘丙夜其家熟寐縱羣婢而來以謁于府幸府司聞而禁之箎父語之曰汝一朝釋十數人之死陰德實甚大但此事一白則是家無少長皆坐死又其家之親鄰及所與相賣買者皆不免無乃所活不足以酬所殺乎且汝意欲遏絶此事今其家以汝及羣婦之亡知事且露必遂遁去去此而遂之他則無所施矣是汝所活不可勝計陰德當十倍于前也婢以為然遂不詣府屠家亦逃去其患遂絶未幾生箎人以為陰德之報箎少力學敏慧過人年二十首鄉貢一上擢隆興進士第授揚州泰興簿以才稱秩滿解淮南節度推官後守以間言疏之時和好雖定而揚民懲創往事聞邊遽即張皇無固志會密院調兵京口增戌山陽道出郡下守以搖動人情為憂問計寮吏無對者咸云節推善謀守不得已延見問計箎曰此易耳盍以運糧為辭具船瓜州檄主帥令軍士到即登舟銜枚夜過守用其言軍至山陽人無知者守由是遂為知已詔舉亷吏守及部使者皆上其名召對改秩知秀州嘉興縣嘉興邑大事叢為浙右最令始至吏欲其厭事抱文案魚貫而進日晏不能竟如是者纍日箎識其意因下令吏辰起並抱文案立庭下須事竟乃退箎因隨事裁處飢即據案而食吏憊不自勝遂不敢㺯以事箎亦計慮深逺處事詳密吏莫測其端倪催科分期會為三聽民自輸過期乃追治先豪強而後貧弱由是吏不知勞民不知擾而賦入常先諸邑郡守有怙勢而來者督積負于諸邑皆唯唯聽命箎獨不可曰令可去積負不可得守亦不能奪其後諸邑皆坐苛斂罷箎獨免且以是知名代還進備邊十五策言當世急務除提轄左藏庫遷軍器監丞光宗即位再以急務進議者以其曲盡防邊之術將使次第行之除知盱眙軍以言者罷起知澧州遷利州路提點刑獄移成都府路轉運判官卒于官箎少脫場屋刻意為文尤長于詩有集田曉字就堯一字德充丹徒人父述為府推吏紹興丙子秋試郡守林大聲黨閩士冒舉論不能奪則欲以試日遏其入大聲知之自以輿衛擁其後士不勝忿羣起抗之以是罷舉大聲愧且怒士皆變服潛匿大聲搜城中得六人者械之獄欲甘心焉述謂衆怒激於一時非有結約罪不專在數人者大聲繩之急述應之愈緩竟以是得罪時大聲氣焰張甚官吏承命恐後微述數人者幾殆且根究株連無已時曉猶在童稚後四請鄉舉擢淳熙八年進士第人以為隂德之報初任秀州華亭買納鹽場次揚州録事參軍建康府教授性踈直不能唯阿逐物世道日薄士以升改為重有茫如捕風而汲汲營求死不知悔者曉之在金陵積舉員四或謂小屈意即及格曉笑曰窮達命也命乃在天雖屈意何為且以直道為不可行則吾向也既以是得五之四矣以為必可行也則前輩不遇者多矣獨我乎哉歸自金陵年方六十有五遂丐休致婆娑小園以夀終有文集藏于家初述既去吏六人者在獄僃嘗慘酷然皆以身任咎不外及一人後六人者皆名薦書其最著者錢弼字聖俞擬應洞明韜略科有進卷行于世特恩對策授迪功郎蒲圻縣尉卒二子亦連請舉入太學薑謙光字德明劉倬字顯道艾謙字益之向公慶字元卿並丹徒人公慶即文簡公之裔皆推于鄉為府學正謙光嚴毅倬深沈謙溫厚公慶修潔皆再舉于鄉倬業書為舉首餘三人者先後居詞賦首選其中程之文皆板行以惠學者謙光語尤壯雖不第皆有令子世其家云
